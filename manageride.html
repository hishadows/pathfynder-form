<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pathfynder — Ride</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0e1117;--surface:#161b27;--surface2:#1e2535;--border:#2a3348;
  --accent:#4f8ef7;--accent-dim:rgba(79,142,247,0.12);
  --green:#22c55e;--green-dim:rgba(34,197,94,0.10);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.12);
  --red:#ef4444;--red-dim:rgba(239,68,68,0.10);
  --purple:#a855f7;--purple-dim:rgba(168,85,247,0.10);
  --text:#e8edf5;--text-dim:#8a95a8;--text-muted:#4e5a6e;
  --r:12px;--fd:'Space Grotesk',sans-serif;--fb:'Inter',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);overflow-x:hidden}
#app{max-width:540px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh}

/* ── HEADER ── */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:11px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.hdr-logo{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-logo svg{width:19px;height:19px}
.hdr-brand{font-family:var(--fd);font-size:16px;font-weight:700;letter-spacing:-.3px;color:var(--text)}
.hdr-brand span{color:var(--accent)}
.hdr-status{margin-left:auto;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;display:none}
.sp-open   {background:var(--green-dim);border:1px solid rgba(34,197,94,.25);color:var(--green);display:flex}
.sp-started{background:var(--accent-dim);border:1px solid rgba(79,142,247,.25);color:var(--accent);display:flex}
.sp-closed,.sp-ended{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);display:flex}

/* ── SKELETON ── */
.skel{background:var(--surface);border:1px solid var(--border);border-radius:16px;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ══════════════════════════════
   HERO RIDE CARD
   Big, scannable, top of page
══════════════════════════════ */
.hero-card{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 16px 14px}

/* Driver avatar + name row */
.driver-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.drv-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;font-family:var(--fd)}
.drv-name{font-family:var(--fd);font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.drv-sub{font-size:12px;color:var(--text-muted);margin-top:1px}
.drv-time{margin-left:auto;text-align:right;flex-shrink:0}
.drv-time-big{font-family:var(--fd);font-size:26px;font-weight:700;color:var(--text);letter-spacing:-.5px;line-height:1}
.drv-time-date{font-size:11px;color:var(--text-muted);margin-top:3px;text-align:right}

/* Route visual */
.route-vis{display:flex;align-items:stretch;gap:12px;margin-bottom:14px}
.route-line-col{display:flex;flex-direction:column;align-items:center;padding:3px 0;flex-shrink:0}
.rl-dot-o{width:10px;height:10px;border-radius:50%;border:2px solid var(--text-muted);flex-shrink:0}
.rl-dot-d{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0}
.rl-dash{flex:1;width:2px;margin:3px 0;background:repeating-linear-gradient(to bottom,var(--accent) 0,var(--accent) 4px,transparent 4px,transparent 8px);opacity:.4}
.route-text-col{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between;gap:8px}
.rt-place{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rt-label{font-size:11px;color:var(--text-muted);margin-top:1px}

/* Seats strip */
.seats-strip{background:var(--surface2);border-radius:10px;padding:10px 13px;margin-bottom:12px}
.seats-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.seats-left{font-family:var(--fd);font-size:15px;font-weight:700;color:var(--text)}
.seats-joined{font-size:12px;font-weight:600;color:var(--green)}
.seats-bar{background:var(--border);border-radius:3px;height:5px;overflow:hidden}
.seats-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s}
.seats-sub{font-size:11px;color:var(--text-muted);margin-top:5px}

/* Notes */
.notes-pill{background:var(--amber-dim);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--amber);line-height:1.5}
.notes-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--amber);opacity:.7;margin-bottom:3px}

/* ══════════════════════════════
   PUBLIC ACTION BAR
   Single clear CTA for passenger
══════════════════════════════ */
.pub-actions{padding:12px 16px;display:flex;gap:8px;border-bottom:1px solid var(--border)}

/* ══════════════════════════════
   DRIVER ACTION BAR
   3 key actions, always visible
══════════════════════════════ */
.drv-actions{padding:12px 16px;display:flex;flex-direction:column;gap:8px;border-bottom:1px solid var(--border)}
.drv-row1{display:flex;gap:8px}
.drv-row2{display:flex;gap:8px}

/* ══════════════════════════════
   PASSENGER JOINED BANNER
   Only shows when > 0 passengers
══════════════════════════════ */
.pax-banner{margin:12px 16px 0;background:var(--green-dim);border:1px solid rgba(34,197,94,.2);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.pax-banner-num{font-family:var(--fd);font-size:28px;font-weight:700;color:var(--green);line-height:1;flex-shrink:0}
.pax-banner-text{font-size:13px;color:var(--green);font-weight:500;line-height:1.4}

/* ══════════════════════════════
   TABS
══════════════════════════════ */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:90}
.tab{flex:1;padding:11px 8px;font-size:13px;font-weight:500;color:var(--text-muted);text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ══════════════════════════════
   PASSENGER CARDS (driver view)
   Cleaner, more actionable
══════════════════════════════ */
.pax-list{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.pax-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.pax-card.picked{opacity:.5;border-style:dashed}
.pc-head{padding:13px 14px;display:flex;align-items:center;gap:11px}
.pc-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;font-family:var(--fd)}
.pc-info{flex:1;min-width:0}
.pc-name{font-size:14px;font-weight:600;color:var(--text);font-family:var(--fd)}
.pc-phone{font-size:12px;color:var(--text-muted);margin-top:2px}
.pc-time{flex-shrink:0;text-align:right}
.pc-time-big{font-family:var(--fd);font-size:16px;font-weight:700;color:var(--text)}
.pc-time-lbl{font-size:10px;color:var(--text-muted);margin-top:1px}
.pc-route{padding:0 14px 10px;display:flex;align-items:stretch;gap:10px}
.pc-rline{display:flex;flex-direction:column;align-items:center;padding:2px 0;width:10px;flex-shrink:0}
.pc-ro{width:6px;height:6px;border-radius:50%;border:1.5px solid var(--text-muted)}
.pc-rd{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.pc-rdash{flex:1;width:1.5px;background:repeating-linear-gradient(to bottom,var(--accent) 0,var(--accent) 3px,transparent 3px,transparent 6px);margin:2px 0;opacity:.4}
.pc-rlabels{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between;gap:6px}
.pc-rplace{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-rsub{font-size:10px;color:var(--text-muted)}
.pc-badges{padding:0 14px 10px;display:flex;gap:5px;flex-wrap:wrap}
.pc-actions{border-top:1px solid var(--border);display:flex}
.pc-btn{flex:1;height:40px;border:none;background:transparent;cursor:pointer;font-family:var(--fb);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .12s;color:var(--text-dim)}
.pc-btn:not(:last-child){border-right:1px solid var(--border)}
.pc-btn:active{background:var(--surface2)}
.pc-btn.wa{color:#25D366}
.pc-btn.done{color:var(--green)}
.pc-btn.rm{color:var(--red)}
.pc-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
/* expand detail */
.pc-detail{border-top:1px solid var(--border);padding:12px 14px;display:none;background:var(--bg)}
.pc-detail.open{display:block}
.pc-detail p{font-size:12px;color:var(--text-dim);line-height:1.6;white-space:pre-wrap;word-break:break-word}

/* ══════════════════════════════
   MATCHED CARDS
   Same structure as searchride
══════════════════════════════ */
.match-list{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.match-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.match-card.expanded{border-color:var(--accent)}
.mc-top{padding:12px 13px 10px}
.mc-row1{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.mc-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:var(--fd)}
.mc-name{font-size:13px;font-weight:600;color:var(--text);font-family:var(--fd);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-dist{background:var(--accent-dim);border:1px solid rgba(79,142,247,.25);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:600;color:var(--accent);white-space:nowrap;flex-shrink:0}
.mc-route{display:flex;align-items:stretch;gap:9px}
.mc-rline{display:flex;flex-direction:column;align-items:center;padding:2px 0;width:10px;flex-shrink:0}
.mc-ro{width:6px;height:6px;border-radius:50%;border:1.5px solid var(--text-muted)}
.mc-rd{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.mc-rdash{flex:1;width:1.5px;background:repeating-linear-gradient(to bottom,var(--accent) 0,var(--accent) 3px,transparent 3px,transparent 6px);margin:2px 0;opacity:.4}
.mc-rlabels{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between;gap:5px}
.mc-rplace{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-rsub{font-size:10px;color:var(--text-muted)}
.mc-meta{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.mc-time{font-family:var(--fd);font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.3px;line-height:1}
.mc-date{font-size:10px;color:var(--text-dim)}
.mc-footer{border-top:1px solid var(--border);display:flex}
.mc-btn{flex:1;height:40px;border:none;background:transparent;cursor:pointer;font-family:var(--fb);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .12s}
.mc-btn:not(:last-child){border-right:1px solid var(--border)}
.mc-btn:active{background:var(--surface2)}
.mc-btn.wa-mc{color:#25D366}
.mc-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.mc-detail{border-top:1px solid var(--border);padding:11px 13px;display:none;background:var(--bg)}
.mc-detail.open{display:block}
.mc-detail-lbl{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.mc-msg{font-size:12px;color:var(--text-dim);line-height:1.6;white-space:pre-wrap;word-break:break-word;max-height:100px;overflow:hidden;position:relative}
.mc-msg-fade{position:absolute;bottom:0;left:0;right:0;height:28px;background:linear-gradient(transparent,var(--bg));pointer-events:none}
.badge{font-size:9px;font-weight:600;padding:2px 6px;border-radius:20px;text-transform:uppercase;letter-spacing:.02em;display:inline-flex;align-items:center;gap:2px;white-space:nowrap}
.b-urgent   {background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.b-airport  {background:var(--purple-dim);color:var(--purple);border:1px solid rgba(168,85,247,.25)}
.b-pending  {background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
.b-shift    {background:var(--accent-dim);color:var(--accent);border:1px solid rgba(79,142,247,.25)}
.b-confirmed{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.b-pickedup {background:var(--surface2);color:var(--text-muted);border:1px solid var(--border)}

/* ══════════════════════════════
   BUTTONS
══════════════════════════════ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border-radius:10px;font-family:var(--fb);font-weight:600;cursor:pointer;border:none;transition:opacity .15s;white-space:nowrap;font-size:13px}
.btn:active{opacity:.8}
.btn:disabled{opacity:.4;cursor:default}
.btn-primary{background:var(--accent);color:#fff;padding:0 18px;height:44px}
.btn-green  {background:var(--green);color:#fff;padding:0 18px;height:44px}
.btn-ghost  {background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);padding:0 14px;height:44px}
.btn-wa     {background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.25);color:#25D366;padding:0 14px;height:44px}
.btn-amber  {background:var(--amber-dim);border:1px solid rgba(245,158,11,.3);color:var(--amber);padding:0 14px;height:40px}
.btn-red    {background:var(--red-dim);border:1px solid rgba(239,68,68,.25);color:var(--red);padding:0 12px;height:40px}
.btn-full   {width:100%}
.btn svg    {width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ══════════════════════════════
   JOIN FORM
══════════════════════════════ */
.join-wrap{padding:16px;display:flex;flex-direction:column;gap:12px}
.form-title{font-family:var(--fd);font-size:18px;font-weight:700;color:var(--text)}
.form-sub{font-size:13px;color:var(--text-muted);margin-top:2px}
.field{display:flex;flex-direction:column;gap:5px}
.field-lbl{font-size:12px;font-weight:500;color:var(--text-dim)}
.field-inp{width:100%;padding:11px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--fb);font-size:14px;outline:none;transition:border-color .15s;-webkit-appearance:none}
.field-inp:focus{border-color:var(--accent)}
.field-inp::placeholder{color:var(--text-muted)}
.field-inp.confirmed{border-color:var(--green)}
.sug-wrap{position:relative}
.suggestions{display:none;position:absolute;left:0;right:0;top:calc(100% + 4px);background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.suggestions.show{display:block}
.sug-item{padding:11px 13px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.sug-item:last-child{border:none}
.sug-item:hover{background:var(--surface)}
.sug-item.loading{cursor:default;font-size:12px;color:var(--text-muted);font-style:italic}
.sug-main{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sug-ctx{font-size:11px;color:var(--text-muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conf-tag{display:none;align-items:center;gap:6px;padding:5px 10px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:7px;font-size:11px;color:var(--green)}
.conf-tag.show{display:flex}
.conf-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer}
.toggle-lbl{font-size:13px;font-weight:500;color:var(--text)}
.toggle-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.tgl-track{width:38px;height:22px;border-radius:11px;background:var(--border);position:relative;transition:background .2s;flex-shrink:0}
.tgl-track.on{background:var(--accent)}
.tgl-thumb{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tgl-track.on .tgl-thumb{left:18px}
.note-box{background:var(--accent-dim);border:1px solid rgba(79,142,247,.2);border-radius:10px;padding:10px 13px;font-size:12px;color:var(--text-dim);line-height:1.55}
.note-box b{color:var(--accent)}
.err-box{display:none;padding:10px 13px;border-radius:9px;background:var(--red-dim);border:1px solid rgba(239,68,68,.2);color:var(--red);font-size:13px}
.err-box.show{display:block}

/* ══════════════════════════════
   CONFIRMED SCREEN
══════════════════════════════ */
.confirmed-wrap{padding:16px;display:flex;flex-direction:column;gap:12px}
.confirmed-hero{background:var(--green-dim);border:1px solid rgba(34,197,94,.2);border-radius:16px;padding:24px;text-align:center}
.confirmed-icon{font-size:40px;margin-bottom:10px}
.confirmed-title{font-family:var(--fd);font-size:20px;font-weight:700;color:var(--green);margin-bottom:4px}
.confirmed-sub{font-size:13px;color:var(--text-dim)}
.detail-block{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px}
.detail-row:last-child{border:none}
.detail-key{color:var(--text-muted)}
.detail-val{color:var(--text);font-weight:500;text-align:right;max-width:60%}
.detail-val.accent{color:var(--accent);font-weight:600}

/* ══════════════════════════════
   OTW BANNER
══════════════════════════════ */
.otw{background:var(--accent-dim);border-bottom:1px solid rgba(79,142,247,.2);padding:12px 16px;text-align:center}
.otw-title{font-family:var(--fd);font-size:14px;font-weight:600;color:var(--accent)}
.otw-sub{font-size:12px;color:var(--text-dim);margin-top:3px}

/* ══════════════════════════════
   EMPTY + ERROR STATES
══════════════════════════════ */
.empty{padding:40px 20px;text-align:center}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.empty-title{font-family:var(--fd);font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--text-dim);line-height:1.6}

/* ══════════════════════════════
   ADD PAX FORM
══════════════════════════════ */
.add-wrap{padding:16px;display:flex;flex-direction:column;gap:12px}

@media(max-width:380px){
  .drv-time-big{font-size:22px}
  .rt-place{font-size:14px}
}
</style>
</head>
<body>
<div id="app">

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="rgba(255,255,255,0.15)"/>
      <circle cx="12" cy="9" r="2.5" fill="#fff" stroke="none"/>
    </svg>
  </div>
  <div class="hdr-brand">Path<span>fynder</span></div>
  <div id="status-pill" class="hdr-status"></div>
</div>

<!-- LOADING -->
<div id="loading-view" style="padding:16px;display:flex;flex-direction:column;gap:10px">
  <div class="skel" style="height:220px"></div>
  <div class="skel" style="height:56px"></div>
</div>

<!-- MAIN (hidden until load) -->
<div id="main-view" style="display:none;flex:1;flex-direction:column"></div>

</div>

function todayStr(){var n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}
function tomorrowStr(){var n=new Date();n.setDate(n.getDate()+1);return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}
function timeAgo(iso){if(!iso)return'';var diff=Date.now()-new Date(iso).getTime(),mins=Math.floor(diff/60000),hours=Math.floor(mins/60),days=Math.floor(hours/24);if(mins<1)return'just now';if(mins<60)return mins+'m ago';if(hours<24)return hours+'h ago';return days+'d ago';}
function fmtDate(d){if(!d)return'—';if(d===todayStr())return'Today';if(d===tomorrowStr())return'Tomorrow';return new Date(d+'T00:00:00').toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'});}
function fmtTime(t){if(!t||t==='—')return'—';var h=parseInt(t.slice(0,2),10),m=parseInt(t.slice(3,5),10);var ap=h>=12?'PM':'AM',h12=h%12||12;return h12+':'+(m<10?'0':'')+m+' '+ap;}

function rideExpired(){var t=new Date();t.setHours(0,0,0,0);var r=new Date((ride.dates||'2000-01-01')+'T00:00:00');r.setHours(0,0,0,0);return r<t;}

function haversine(la1,ln1,la2,ln2){var R=6371,dL=(la2-la1)*Math.PI/180,dG=(ln2-ln1)*Math.PI/180,a=Math.pow(Math.sin(dL/2),2)+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.pow(Math.sin(dG/2),2);return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

/* ── LOAD ── */
async function load(){
  if(!RIDE_ID){showErr('No ride ID in URL.');return;}
  try{
    var r1=await db.from('driver_routines').select('*').eq('id',RIDE_ID).single();
    if(r1.error||!r1.data){showErr('Ride not found.');return;}
    ride=r1.data;
    isDriver=(SHARE_TK&&SHARE_TK===ride.share_token)||(TG_ID&&TG_ID===String(ride.telegram_chat_id||''));
    var r2=await db.from('passenger_requests').select('*').eq('ride_id',RIDE_ID).order('created_at',{ascending:true});
    passengers=r2.data||[];
    render();
  }catch(e){showErr(e.message);}
}

/* ── RENDER ── */
function render(){
  document.getElementById('loading-view').style.display='none';
  var mv=document.getElementById('main-view');
  mv.style.cssText='display:flex;flex:1;flex-direction:column';

  var st=ride.ride_status||'open';
  var pill=document.getElementById('status-pill');
  pill.textContent=st.charAt(0).toUpperCase()+st.slice(1);
  pill.className='hdr-status sp-'+st;

  if(rideExpired()&&st==='open'){mv.innerHTML=expiredHTML();return;}
  if(isDriver){renderDriver(mv);}
  else if(st==='started'){mv.innerHTML=otwHTML()+heroCardHTML()+pubBelowHTML(false,true);}
  else{mv.innerHTML=heroCardHTML()+pubBelowHTML(seatsLeft()===0,st==='closed'||st==='ended');wireJoin();}
}

      ?'<div class="pc-detail open"><p>'+

        (phone?'\n📱 '+phone:'')+

        '<div class="pc-info">'+

/* ══════════════════════════════
   MATCHED TAB
══════════════════════════════ */
async function renderMatchedTab(){
  var tc=document.getElementById('tab-content');if(!tc)return;
  tc.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Finding matches…</div></div>';

  if(!ride.pickup_lat||!ride.pickup_lng){
    tc.innerHTML='<div class="empty"><div class="empty-icon">📍</div><div class="empty-title">No location data</div><div class="empty-sub">This ride doesn\'t have coordinates — matched passengers unavailable.</div></div>';
    return;
  }
  try{
    var {data,error}=await db.rpc('find_matched_passengers',{
      p_driver_id:RIDE_ID,p_from_lat:ride.pickup_lat,p_from_lng:ride.pickup_lng,
      p_to_lat:ride.dropoff_lat||ride.pickup_lat,p_to_lng:ride.dropoff_lng||ride.pickup_lng,
      p_ride_date:ride.dates,p_radius_km:25
    });
    if(error)throw error;
    var matches=data||[];
    if(!matches.length){
      tc.innerHTML='<div class="empty"><div class="empty-icon">🗺️</div><div class="empty-title">No matches yet</div><div class="empty-sub">No passenger requests found near your route for today.</div></div>';
      return;
    }

    var shareUrl=rideUrl(false);
    var html='<div class="match-list">';
    matches.forEach(function(m,i){
      var av=avCol(i);
      var name=m.sender_name||'Passenger';
      var phone=m.sender_number?String(m.sender_number):'';
      var waNum=phone.replace(/\D/g,'');
      var rTime=fmtTime(m.pick_up_time);
      var rDate=fmtDate(m.pick_up_date);
      var dist=m.dist_km!=null?(m.dist_km===0?'Same area':(m.dist_km<1?'<1 km':m.dist_km.toFixed(1)+' km')):'';
      var imp=(m.important_ride||'').toLowerCase();
      var contactMsg=encodeURIComponent('Hi '+name+', I am driving from '+(ride.pickup_label||'')+' to '+(ride.dropoff_label||'')+' on '+fmtDate(ride.dates)+' at '+fmtTime(ride.departure_time)+'. Do you still need a ride? Join here: '+shareUrl);
      var eid='match-'+i;
      var isExp=expandedId===eid;

          '<button class="mc-btn" data-mid="'+eid+'" data-action="expand"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> '+(isExp?'Hide':'Message')+'</button>'+

async function submitJoin(shiftOn){
  var name=document.getElementById('j-name').value.trim();
  var phone=document.getElementById('j-phone').value.trim();
  var pu=document.getElementById('j-pu').value.trim();
  var doLoc=document.getElementById('j-do').value.trim();
  var time=document.getElementById('j-time').value;
  var err=document.getElementById('j-err');
  if(!name||!phone||!pu||!doLoc){err.textContent='Please fill in all required fields.';err.classList.add('show');return;}
  err.classList.remove('show');
  var btn=document.getElementById('j-submit');btn.disabled=true;btn.textContent='Booking…';
  try{
    var row={ride_id:RIDE_ID,passenger_name_web:name,passenger_phone_web:phone,passenger_wa_id:phone,
      passenger_name:name,pickup_label:pu,dropoff_label:doLoc,
      pickup_lat:geoCache['j-pu']?geoCache['j-pu'].lat:null,pickup_lng:geoCache['j-pu']?geoCache['j-pu'].lng:null,
      dropoff_lat:geoCache['j-do']?geoCache['j-do'].lat:null,dropoff_lng:geoCache['j-do']?geoCache['j-do'].lng:null,
      is_shift_start:shiftOn,status:'pending',platform:'web',date:ride.dates};
    if(time)row.pickup_time=time;
    if(TG_ID)row.telegram_chat_id=TG_ID;
    var {error}=await db.from('passenger_requests').insert(row);
    if(error)throw error;
    setSaved({name:name,phone:phone});
    var r2=await db.from('passenger_requests').select('*').eq('ride_id',RIDE_ID);
    passengers=r2.data||[];
    showConfirmed(name,pu,doLoc,time,shiftOn);
  }catch(e){btn.disabled=false;btn.textContent='Confirm my seat';err.textContent='Booking failed: '+e.message;err.classList.add('show');}
}

/* ══════════════════════════════
   MAPS
══════════════════════════════ */
function openMaps(){
  var conf=passengers.filter(function(p){return p.status!=='cancelled'&&p.pickup_lat&&p.pickup_lng;});
  if(!ride.dropoff_lat||!ride.dropoff_lng){alert('This ride does not have destination data yet.');return;}
  var mapsBtn=document.getElementById('d-maps');
  var origLabel=mapsBtn?mapsBtn.innerHTML:'';
  if(mapsBtn){mapsBtn.disabled=true;mapsBtn.innerHTML='Getting location…';}

  function buildAndGo(dLat,dLng){
    if(mapsBtn){mapsBtn.disabled=false;mapsBtn.innerHTML=origLabel;}
    var oLat=dLat!=null?dLat:ride.pickup_lat;
    var oLng=dLng!=null?dLng:ride.pickup_lng;
    var dest={lat:ride.dropoff_lat,lng:ride.dropoff_lng};
    var pickups=conf.map(function(p){return{lat:p.pickup_lat,lng:p.pickup_lng,dlat:p.dropoff_lat,dlng:p.dropoff_lng};});
    pickups.sort(function(a,b){return haversine(oLat,oLng,a.lat,a.lng)-haversine(oLat,oLng,b.lat,b.lng);});
    var lastLat=pickups.length?pickups[pickups.length-1].lat:oLat;
    var lastLng=pickups.length?pickups[pickups.length-1].lng:oLng;
    var dropoffs=conf.filter(function(p){return p.dropoff_lat&&p.dropoff_lng;}).map(function(p){return{lat:p.dropoff_lat,lng:p.dropoff_lng};});
    dropoffs.sort(function(a,b){return haversine(lastLat,lastLng,a.lat,a.lng)-haversine(lastLat,lastLng,b.lat,b.lng);});
    var wpts=pickups.map(function(p){return{lat:p.lat,lng:p.lng};}).concat(dropoffs);
    var url='https://www.google.com/maps/dir/?api=1&origin='+oLat+','+oLng+'&destination='+dest.lat+','+dest.lng+'&travelmode=driving';
    if(wpts.length)url+='&waypoints='+wpts.map(function(w){return w.lat+','+w.lng;}).join('|');
    if(/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)){location.href=url;}
    else{window.open(url,'_blank','noopener');}
  }

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      function(pos){buildAndGo(pos.coords.latitude,pos.coords.longitude);},
      function(){buildAndGo(null,null);},
      {timeout:10000,enableHighAccuracy:true,maximumAge:0}
    );
  } else {buildAndGo(null,null);}
}

/* ══════════════════════════════
   MAPBOX LOCATION
══════════════════════════════ */
function setupLoc(inputId,sugId,tagId,tagTxtId,cacheKey){
  var input=document.getElementById(inputId),sug=document.getElementById(sugId);
  if(!input||!sug)return;
  input.addEventListener('input',function(){
    geoCache[cacheKey]=null;input.classList.remove('confirmed');
    var tag=document.getElementById(tagId);if(tag)tag.classList.remove('show');
    clearTimeout(geoTimers[cacheKey]);
    var q=input.value.trim();
    if(q.length<3){sug.classList.remove('show');sug.innerHTML='';return;}
    sug.innerHTML='<div class="sug-item loading">Searching…</div>';sug.classList.add('show');
    if(!window._SB_SID)window._SB_SID='pf-'+Date.now();
    var sid=window._SB_SID;
    geoTimers[cacheKey]=setTimeout(function(){
      fetch('https://api.mapbox.com/search/searchbox/v1/suggest?q='+encodeURIComponent(q)+'&access_token='+MAPBOX_TOKEN+'&session_token='+sid+'&language=en&limit=6&country=CA,US&proximity=-79.3832,43.6532')
        .then(function(r){return r.json();})
        .then(function(d){
          sug.innerHTML='';var items=(d&&d.suggestions)||[];
          if(!items.length){sug.innerHTML='<div class="sug-item loading">No results</div>';return;}
          items.forEach(function(item){
            var name=item.name||'',ctx=item.place_formatted||item.full_address||'';
            if(ctx.toLowerCase().startsWith(name.toLowerCase()+', '))ctx=ctx.slice(name.length+2);
            var el=document.createElement('div');el.className='sug-item';
            el.innerHTML='<div class="sug-main">'+name+'</div>'+(ctx?'<div class="sug-ctx">'+ctx+'</div>':'');
            el.addEventListener('click',function(){
              input.value=name+(ctx?', '+ctx:'');sug.classList.remove('show');sug.innerHTML='';
              fetch('https://api.mapbox.com/search/searchbox/v1/retrieve/'+item.mapbox_id+'?access_token='+MAPBOX_TOKEN+'&session_token='+sid)
                .then(function(r){return r.json();})
                .then(function(rd){
                  var f=rd.features&&rd.features[0],c=f&&f.geometry&&f.geometry.coordinates;
                  if(!c)return;
                  geoCache[cacheKey]={lat:c[1],lng:c[0],label:name+(ctx?', '+ctx:'')};
                  input.classList.add('confirmed');
                  var t2=document.getElementById(tagId);if(t2)t2.classList.add('show');
                  var tt=document.getElementById(tagTxtId);if(tt)tt.textContent=name;
                });
            });
            sug.appendChild(el);
          });
          sug.classList.add('show');
        })
        .catch(function(){sug.innerHTML='<div class="sug-item loading">Connection error</div>';});
    },400);
  });
  document.addEventListener('click',function(e){if(!input.contains(e.target)&&!sug.contains(e.target))sug.classList.remove('show');});
}
