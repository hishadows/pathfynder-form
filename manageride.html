<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pathfynder — Ride</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

/* ── DESIGN TOKENS — dark (default) ── */
:root {
  --bg: #0b0d10;
  --surface: #14161a;
  --surface2: #1b1e23;
  --border: rgba(255,255,255,0.06);
  --border-soft: rgba(255,255,255,0.04);
  --accent: #5b9cf7;
  --accent-dim: rgba(91,156,247,0.14);
  --accent-hover: #79aefa;
  --green: #34d399;
  --green-dim: rgba(52,211,153,0.13);
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,0.13);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.13);
  --purple: #c084fc;
  --purple-dim: rgba(192,132,252,0.13);
  --text: #f3f4f6;
  --text-dim: #9aa1ac;
  --text-muted: #676e79;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.24);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.28);
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;
}

[data-theme="light"] {
  --bg: #f6f6f4;
  --surface: #ffffff;
  --surface2: #f1f1ef;
  --border: rgba(20,20,20,0.06);
  --border-soft: rgba(20,20,20,0.04);
  --accent: #3b7ce8;
  --accent-dim: rgba(59,124,232,0.09);
  --accent-hover: #2e6bd4;
  --green: #16a34a;
  --green-dim: rgba(22,163,74,0.09);
  --amber: #d97706;
  --amber-dim: rgba(217,119,6,0.09);
  --red: #dc2626;
  --red-dim: rgba(220,38,38,0.09);
  --purple: #9333ea;
  --purple-dim: rgba(147,51,234,0.09);
  --text: #17181a;
  --text-dim: #6b7280;
  --text-muted: #a1a7b0;
  --shadow: 0 1px 2px rgba(20,20,20,0.04), 0 8px 24px rgba(20,20,20,0.06);
  --shadow-sm: 0 1px 3px rgba(20,20,20,0.05);
}

/* ── BASE ── */
html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); -webkit-font-smoothing: antialiased; transition: background .2s ease; }
#app { max-width: 520px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

/* ── HEADER ── */
.header {
  background: var(--bg);
  padding: 20px 20px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  flex-shrink: 0;
}
.logo {
  width: 34px; height: 34px;
  background: var(--accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo svg { width: 17px; height: 17px; }
.brand { font-family: var(--font-display); font-size: 16px; font-weight: 600; letter-spacing: -0.2px; color: var(--text); }
.brand span { color: var(--accent); }
.status-pill {
  margin-left: auto;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px; font-weight: 600;
  display: none;
  letter-spacing: 0.01em;
}
.sp-open    { background: var(--green-dim); color: var(--green); }
.sp-started { background: var(--accent-dim); color: var(--accent); }
.sp-closed  { background: var(--surface2); color: var(--text-muted); }
.sp-ended   { background: var(--surface2); color: var(--text-muted); }

#theme-toggle {
  background: var(--surface2) !important;
  border: none !important;
  border-radius: 10px !important;
  color: var(--text-dim) !important;
  transition: background .15s ease;
}
#theme-toggle:active { transform: scale(0.94); }

/* ── CONTENT AREA ── */
.content { padding: 4px 20px 20px; display: flex; flex-direction: column; gap: 14px; }

/* ── RIDE CARD (hero) — soft elevation, no heavy border ── */
.ride-card {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.card-top { padding: 20px 20px 18px; }
.card-row1 { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.pax-info { display: flex; align-items: center; gap: 11px; min-width: 0; }
.av {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600;
  flex-shrink: 0;
  font-family: var(--font-display);
}
.pax-name { font-size: 14px; font-weight: 600; color: var(--text); font-family: var(--font-display); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; letter-spacing: -0.1px; }
.pax-sub  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.badges { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; justify-content: flex-end; max-width: 170px; }
.badge {
  font-size: 10px; font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.01em;
  display: inline-flex; align-items: center; gap: 3px;
  white-space: nowrap;
}
.b-open     { background: var(--green-dim); color: var(--green); }
.b-started  { background: var(--accent-dim); color: var(--accent); }
.b-closed   { background: var(--surface2); color: var(--text-muted); }
.b-ended    { background: var(--surface2); color: var(--text-muted); }
.b-confirmed{ background: var(--green-dim); color: var(--green); }
.b-shift    { background: var(--accent-dim); color: var(--accent); }
.b-pickedup { background: var(--green-dim); color: var(--green); }
.b-urgent   { background: var(--red-dim); color: var(--red); }
.b-airport  { background: var(--purple-dim); color: var(--purple); }
.b-km       { background: var(--accent-dim); color: var(--accent); font-weight: 600; font-size: 10px; }

/* ── ROUTE STRIP ── */
.route-strip { display: flex; align-items: stretch; gap: 14px; }
.route-nodes { display: flex; flex-direction: column; align-items: center; padding: 3px 0; width: 8px; flex-shrink: 0; }
.nd-o { width: 7px; height: 7px; border-radius: 50%; border: 1.5px solid var(--text-muted); flex-shrink: 0; }
.nd-d { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.nd-line { flex: 1; width: 1px; background: var(--border); margin: 4px 0; min-height: 18px; }
.route-labels { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: space-between; gap: 10px; }
.route-place { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.route-sub   { font-size: 10px; color: var(--text-muted); margin-top: 1px; text-transform: uppercase; letter-spacing: 0.04em; }
.route-meta  { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; gap: 4px; }
.ride-time   { font-size: 22px; font-weight: 700; color: var(--text); font-family: var(--font-display); letter-spacing: -0.5px; line-height: 1; }
.ride-date   { font-size: 11px; color: var(--text-muted); text-align: right; }

/* ── SEATS STRIP ── */
.seats-strip { margin-top: 18px; background: var(--surface2); border-radius: var(--radius-sm); padding: 14px 16px; }
.seats-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; }
.seats-count { font-size: 13px; font-weight: 600; color: var(--text); font-family: var(--font-display); }
.seats-joining { font-size: 11px; color: var(--green); font-weight: 600; }
.seats-bar { background: var(--border); border-radius: 3px; height: 4px; overflow: hidden; }
.seats-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }
.seats-taken { font-size: 10px; color: var(--text-muted); margin-top: 7px; }

/* ── NOTES PILL ── */
.notes-pill {
  display: flex; align-items: flex-start; gap: 8px;
  background: var(--amber-dim);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-top: 10px;
  font-size: 12px; color: var(--amber); line-height: 1.55;
}
.notes-pill .notes-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; opacity: 0.9; }

/* ── CARD FOOTER ── */
.card-footer { border-top: 1px solid var(--border-soft); display: flex; align-items: center; }
.footer-chips { flex: 1; padding: 14px 20px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.f-chip { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); white-space: nowrap; }
.f-chip svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
.footer-actions { display: flex; gap: 6px; padding: 10px 14px; }
.fa-btn {
  min-width: 68px; height: 36px;
  border: none; background: var(--surface2);
  border-radius: 10px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
  font-size: 12px; font-weight: 600; font-family: var(--font-body);
  transition: opacity .15s;
  padding: 0 14px;
}
.fa-btn:active { opacity: 0.6; }
.fa-btn svg { width: 15px; height: 15px; }
.fa-btn-wa  { color: var(--green); }
.fa-btn-share { color: var(--accent); }

/* ── PICKED UP BANNER ── */
.picked-banner {
  background: var(--green-dim);
  border-radius: var(--radius-sm);
  padding: 13px 16px;
  font-size: 12px; font-weight: 600; color: var(--green);
}

/* ── OTW CARD ── */
.otw-banner {
  background: var(--green-dim);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
}
.otw-title { font-size: 15px; font-weight: 600; color: var(--green); margin-bottom: 4px; }
.otw-sub   { font-size: 12px; color: var(--text-dim); }

.otw-card {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.otw-hero {
  padding: 32px 20px 26px;
  text-align: center;
}
.otw-car-anim {
  font-size: 38px;
  margin-bottom: 14px;
  display: block;
  animation: carBounce 2.4s ease-in-out infinite;
}
@keyframes carBounce {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-5px); }
}
.otw-heading {
  font-family: var(--font-display);
  font-size: 19px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 5px;
  letter-spacing: -0.2px;
}
.otw-driver-name {
  font-size: 13px;
  color: var(--text-muted);
}
.otw-progress {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 18px 20px;
  border-top: 1px solid var(--border-soft);
  border-bottom: 1px solid var(--border-soft);
}
.otw-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
  flex: 1;
}
.otw-step-dot {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  font-weight: 600;
}
.otw-step-dot.done { background: var(--green-dim); color: var(--green); }
.otw-step-dot.active { background: var(--accent); color: #fff; }
.otw-step-dot.pending { background: var(--surface2); color: var(--text-muted); }
.otw-step-label { font-size: 9px; color: var(--text-muted); text-align: center; font-weight: 500; letter-spacing: 0.02em; }
.otw-step-line { flex: 1; height: 1px; background: var(--border); margin-bottom: 17px; }
.otw-step-line.done { background: var(--green); }
.otw-details {
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.otw-detail-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
}
.otw-detail-label { color: var(--text-muted); }
.otw-detail-val   { color: var(--text); font-weight: 500; }
.otw-wa-btn {
  margin: 0 20px 20px;
  height: 46px;
  background: var(--green-dim);
  border: none;
  border-radius: var(--radius-sm);
  color: var(--green);
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-family: var(--font-body);
  width: calc(100% - 40px);
  transition: opacity .15s;
}
.otw-wa-btn:active { opacity: 0.7; }

/* ── ACTION STRIP ── */
.action-strip { background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); }
.action-row { display: flex; gap: 1px; background: var(--border-soft); }
.action-row + .action-row { border-top: 1px solid var(--border-soft); }
.act-btn {
  flex: 1; height: 52px;
  border: none; background: var(--surface);
  cursor: pointer;
  font-family: var(--font-body); font-size: 13px; font-weight: 600;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: opacity .15s;
  color: var(--text-dim);
}
.act-btn:active { opacity: 0.6; }
.act-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
.act-btn-share { color: var(--green); }
.act-btn-maps  { color: var(--accent); }
.act-btn-start { background: var(--green); color: #fff; }
.act-btn-close { color: var(--amber); }
.act-btn-reopen{ color: var(--accent); }
.act-btn-end   { background: var(--red); color: #fff; flex: 1; }

/* ── TABS ── */
.tabs {
  display: flex;
  background: var(--bg);
  border-bottom: 1px solid var(--border-soft);
  position: sticky;
  top: 74px;
  z-index: 90;
  flex-shrink: 0;
  padding: 0 20px;
  gap: 24px;
}
.tab {
  padding: 14px 0 12px;
  font-size: 13px; font-weight: 500;
  color: var(--text-muted);
  text-align: center; cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color .15s;
}
.tab.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 600; }

/* ── PASSENGER CARD ── */
.pax-card { background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; box-shadow: var(--shadow-sm); }
.pax-card.done { opacity: .55; }
.pax-actions { display: flex; gap: 8px; padding: 14px 20px 18px; border-top: 1px solid var(--border-soft); }
.pax-btn {
  flex: 1; height: 40px;
  border-radius: var(--radius-sm); border: none;
  font-family: var(--font-body); font-size: 12px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: opacity .15s;
}
.pax-btn:active { opacity: .6; }
.pax-btn:disabled { opacity: .4; cursor: default; }
.pax-btn-remove { background: var(--surface2); color: var(--red); flex: 0 0 auto; padding: 0 16px; }
.pax-btn-outside{ background: var(--amber-dim); color: var(--amber); }
.pax-btn-pickup { background: var(--green-dim); color: var(--green); }
.pax-btn-onboard{ background: transparent; border: none; color: var(--green); font-size: 12px; font-weight: 600; cursor: default; }

/* ── MATCHED CARD ── */
.match-card { background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; box-shadow: var(--shadow-sm); }
.match-footer { display: flex; gap: 8px; padding: 14px 20px 18px; border-top: 1px solid var(--border-soft); }
.match-btn {
  flex: 1; height: 40px;
  border-radius: var(--radius-sm);
  font-family: var(--font-body); font-size: 12px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: opacity .15s; border: none;
}
.match-btn:active { opacity: .6; }
.match-btn-contact { background: var(--green-dim); color: var(--green); }
.match-btn-msg    { background: var(--surface2); color: var(--text-dim); }
.msg-box {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin: 0 20px 16px;
  max-height: 160px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: none;
}
.msg-box.open { display: block; }
.msg-box p { font-size: 12.5px; color: var(--text-dim); line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
.det-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }

/* ── FORMS ── */
.form-card { background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); }
.form-inner { padding: 24px 20px; display: flex; flex-direction: column; gap: 18px; }
.field { display: flex; flex-direction: column; gap: 7px; position: relative; }
.field label { font-size: 13px; font-weight: 500; color: var(--text-dim); }
.field-wrap { position: relative; }
.fi {
  width: 100%; padding: 13px 15px;
  background: var(--surface2); border: none;
  border-radius: var(--radius-sm); color: var(--text);
  font-family: var(--font-body); font-size: 14px;
  outline: none; transition: box-shadow .15s;
  -webkit-appearance: none;
}
.fi:focus { box-shadow: 0 0 0 2px var(--accent); }
.fi::placeholder { color: var(--text-muted); }
.fi.confirmed { box-shadow: 0 0 0 2px var(--green); }
input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(.5); opacity: 0.6; }

/* ── SUGGESTIONS ── */
.suggestions {
  display: none; position: absolute;
  left: 0; right: 0; top: calc(100% + 6px);
  background: var(--surface);
  border-radius: var(--radius-sm); overflow: hidden;
  z-index: 9999; box-shadow: var(--shadow);
  border: 1px solid var(--border-soft);
}
.suggestions.show { display: block; }
.sug-item { padding: 13px 15px; cursor: pointer; transition: background .1s; }
.sug-item + .sug-item { border-top: 1px solid var(--border-soft); }
.sug-item:hover { background: var(--surface2); }
.sug-item.loading { cursor: default; font-size: 12px; color: var(--text-muted); font-style: italic; }
.sug-main { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sug-ctx  { font-size: 11px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── CONFIRMED TAG ── */
.conf-tag { display: none; align-items: center; gap: 8px; padding: 9px 14px; border-radius: var(--radius-sm); font-size: 12px; color: var(--green); background: var(--green-dim); }
.conf-tag.show { display: flex; }
.conf-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

/* ── TOGGLE ── */
.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 15px 16px; background: var(--surface2); border-radius: var(--radius-sm); cursor: pointer; }
.toggle-lbl { font-size: 13px; font-weight: 500; color: var(--text); }
.toggle-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
.toggle-track { width: 38px; height: 22px; border-radius: 11px; background: var(--border); position: relative; transition: background .2s; flex-shrink: 0; }
.toggle-track.on { background: var(--accent); }
.toggle-thumb { width: 18px; height: 18px; border-radius: 50%; background: #fff; position: absolute; top: 2px; left: 2px; transition: left .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
.toggle-track.on .toggle-thumb { left: 18px; }

/* ── NOTE BOX ── */
.note-box { background: var(--accent-dim); border-radius: var(--radius-sm); padding: 14px 16px; font-size: 12.5px; color: var(--text-dim); line-height: 1.6; }
.note-box b { color: var(--accent); }

/* ── BUTTONS ── */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; border-radius: var(--radius-sm); font-family: var(--font-body); font-weight: 600; cursor: pointer; border: none; transition: opacity .15s; white-space: nowrap; }
.btn:active { opacity: .7; }
.btn:disabled { opacity: .4; cursor: default; }
.btn-green  { background: var(--green); color: #fff; }
.btn-ghost  { background: var(--surface2); color: var(--text-dim); }
.btn-amber  { background: var(--amber-dim); color: var(--amber); }
.btn-red    { background: var(--red-dim); color: var(--red); }
.btn-full   { width: 100%; height: 50px; font-size: 14px; }
.btn-fullsm { width: 100%; height: 42px; font-size: 13px; }
.btn-dashed { width: 100%; height: 46px; font-size: 13px; border: 1.5px dashed var(--border); color: var(--accent); background: transparent; }

/* ── ERR BOX ── */
.err-box { display: none; padding: 12px 15px; border-radius: var(--radius-sm); background: var(--red-dim); color: var(--red); font-size: 13px; line-height: 1.5; }
.err-box.show { display: block; }

/* ── STATUS SCREENS ── */
.status-screen { text-align: center; padding: 52px 24px; }
.status-icon  { font-size: 40px; margin-bottom: 18px; opacity: 0.85; }
.status-title { font-family: var(--font-display); font-size: 19px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.status-sub   { font-size: 13px; color: var(--text-dim); line-height: 1.65; }

/* ── CONFIRMED CARD ── */
.confirmed-card { background: var(--green-dim); border-radius: var(--radius); padding: 28px 20px; text-align: center; }
.confirmed-card-title { font-family: var(--font-display); font-size: 17px; font-weight: 600; color: var(--green); margin-bottom: 5px; }
.confirmed-card-sub   { font-size: 12.5px; color: var(--text-dim); }

/* ── ALREADY JOINED ── */
.already-joined { background: var(--green-dim); border-radius: var(--radius); padding: 32px 24px; text-align: center; }
.aj-icon  { font-size: 32px; margin-bottom: 14px; }
.aj-title { font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--green); margin-bottom: 5px; }
.aj-sub   { font-size: 12.5px; color: var(--text-dim); }

/* ── DETAILS LIST ── */
.detail-list { display: flex; flex-direction: column; gap: 12px; }
.dl-row { display: flex; justify-content: space-between; font-size: 13px; }
.dl-label { color: var(--text-muted); flex-shrink: 0; }
.dl-val   { color: var(--text); text-align: right; max-width: 58%; }
.dl-val.accent { color: var(--accent); font-weight: 600; }
.divider { height: 1px; background: var(--border-soft); }

/* ── SKELETONS ── */
.skel { background: var(--surface); border-radius: var(--radius); animation: pulse 1.6s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

/* ── SECTIONS ── */
.sec { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 12px; }
.sec-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; padding: 6px 0 4px; }

@media (max-width: 520px) { .content { padding: 4px 16px 20px; } .header { padding: 18px 16px 14px; } .tabs { padding: 0 16px; } .sec { padding: 0 16px 20px; } }

</style>

// ════════════════════════════════════════════════════════════

var ride       = null;

var isDriver   = false;

// ════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════
var AV_COLORS = [
  {bg:'rgba(79,142,247,.15)',c:'#4f8ef7'},
  {bg:'rgba(34,197,94,.12)',c:'#22c55e'},
  {bg:'rgba(245,158,11,.12)',c:'#f59e0b'},
  {bg:'rgba(239,68,68,.12)',c:'#ef4444'},
  {bg:'rgba(168,85,247,.12)',c:'#a855f7'},
];
function avCol(i) { return AV_COLORS[i % AV_COLORS.length]; }
function initials(n) { return (n||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase(); }

function fmtTime(t) {
  if (!t) return '—';
  var h = parseInt(t.slice(0,2),10), m = parseInt(t.slice(3,5),10);
  var ap = h >= 12 ? 'PM' : 'AM', h12 = h % 12 || 12;
  return h12 + ':' + (m < 10 ? '0' : '') + m + ' ' + ap;
}

function fmtDate(d) {
  if (!d) return '—';
  var n = new Date(); n.setHours(0,0,0,0);
  var r = new Date(d + 'T00:00:00'); r.setHours(0,0,0,0);
  var diff = Math.round((r - n) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  return r.toLocaleDateString('en-CA', {weekday:'short', month:'short', day:'numeric'});
}

function timeAgo(iso) {
  if (!iso) return '';
  var diff = Date.now() - new Date(iso).getTime();
  var mins = Math.floor(diff / 60000);
  var hours = Math.floor(mins / 60);
  var days = Math.floor(hours / 24);
  if (mins < 1)  return 'just now';
  if (mins < 60) return mins + 'm ago';
  if (hours < 24) return hours + 'h ago';
  return days + 'd ago';
}

// haversine — MUST use Math.pow, not ** (older mobile browsers crash)
function haversine(la1, ln1, la2, ln2) {
  var R  = 6371;
  var dL = (la2 - la1) * Math.PI / 180;
  var dG = (ln2 - ln1) * Math.PI / 180;
  var a  = Math.pow(Math.sin(dL/2), 2) +
           Math.cos(la1 * Math.PI / 180) * Math.cos(la2 * Math.PI / 180) *
           Math.pow(Math.sin(dG/2), 2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function fmtKm(km) {
  if (km === null || km === undefined) return '';
  if (km === 0) return 'Same area';
  if (km < 1)   return '< 1 km';
  return km.toFixed(1) + ' km';
}

function seatsLeft() {
  var taken = passengers.filter(function(p){ return p.status !== 'cancelled'; }).length;
  return Math.max(0, (ride.available_seats || 4) - taken);
}

function rideExpired() {
  if (!ride.dates) return false;
  var t = new Date(); t.setHours(0,0,0,0);
  var r = new Date(ride.dates + 'T00:00:00'); r.setHours(0,0,0,0);
  return r < t;
}

function rideUrl(withToken) {
  var u = SITE_URL + '/manageride.html?id=' + ride.id;
  if (withToken && ride.share_token) u += '&token=' + ride.share_token;
  return u;
}

function copyText(t) {
  if (navigator.clipboard) { navigator.clipboard.writeText(t); return; }
  var el = document.createElement('textarea'); el.value = t;
  document.body.appendChild(el); el.select(); document.execCommand('copy');
  document.body.removeChild(el);
}

function isMobile() {
  return /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
}

function doShare(url, text) {
  if (navigator.share) {
    navigator.share({title:'Pathfynder Ride', text:text, url:url}).catch(function(){});
  } else {
    copyText(url);
    alert('Link copied!');
  }
}

// ════════════════════════════════════════════════════════════
// LOAD DATA
// ════════════════════════════════════════════════════════════
async function load() {
  if (!RIDE_ID) { showErr('No ride ID in URL.'); return; }
  try {
    var r1 = await db.from('driver_routines').select('*').eq('id', RIDE_ID).single();
    if (r1.error || !r1.data) { showErr('Ride not found.'); return; }
    ride = r1.data;

    isDriver = (SHARE_TK && SHARE_TK === ride.share_token) ||
               (TG_ID && TG_ID === String(ride.telegram_chat_id || ''));

    var r2 = await db.from('passenger_requests')
      .select('*').eq('ride_id', RIDE_ID)
      .order('created_at', {ascending: true});
    passengers = r2.data || [];

    render();
  } catch(e) { showErr(e.message); }
}

// ════════════════════════════════════════════════════════════
// RENDER ROUTER
// ════════════════════════════════════════════════════════════
function render() {
  document.getElementById('loading-view').style.display = 'none';
  var mv = document.getElementById('main-view');
  mv.style.display = '';

  // Update status pill
  var st = ride.ride_status || 'open';
  var pill = document.getElementById('status-pill');
  pill.textContent = st.charAt(0).toUpperCase() + st.slice(1);
  pill.className = 'status-pill sp-' + st;
  pill.style.display = '';
  // Set page title
  var ptEl = document.getElementById('page-title');
  if (ptEl) ptEl.textContent = isDriver ? 'Manage Ride' : 'Ride Available';

  if (rideExpired() && st === 'open') {
    mv.innerHTML = '<div class="content">' + expiredHTML() + '</div>';
    return;
  }

  if (isDriver) {
    renderDriver(mv);
  } else {
    renderPublic(mv);
  }
}

  return '<div class="ride-card">' +

    });

// ════════════════════════════════════════════════════════════
// PUBLIC VIEW
// ════════════════════════════════════════════════════════════
function renderPublic(mv) {
  var st     = ride.ride_status || 'open';
  var left   = seatsLeft();
  var full   = left === 0;
  var closed = st === 'closed' || st === 'ended';

  // Picked-up count for public view
  var pickedCount = passengers.filter(function(p){ return p.status === 'picked_up'; }).length;
  var pickedBanner = pickedCount > 0
    ? '<div class="picked-banner">✓ ' + pickedCount + ' passenger' + (pickedCount !== 1 ? 's' : '') + ' picked up so far</div>'
    : '';

  // Already joined check
 var saved = getSaved();
var alreadyJoined = saved && String(saved.joined_ride) === String(RIDE_ID);
  var savedPu  = saved && saved.last_pickup  || '';
  var savedDro = saved && saved.last_dropoff || '';
  var savedPt  = saved && saved.last_pickup_time || '';

      '<div class="aj-title">You\'re already on this ride</div>' +
      '<div class="aj-sub">Driver will contact you on WhatsApp before departure</div>' +
     (savedPu ? '<div style="margin-top:12px;background:rgba(0,0,0,.2);border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;gap:8px;text-align:left">' +
  '<div style="display:flex;justify-content:space-between;align-items:flex-start;font-size:12px;gap:12px"><span style="color:rgba(34,197,94,.7);flex-shrink:0">Pickup</span><span style="color:#e8edf5;text-align:right">' + savedPu + '</span></div>' +
  (savedDro ? '<div style="display:flex;justify-content:space-between;align-items:flex-start;font-size:12px;gap:12px"><span style="color:rgba(34,197,94,.7);flex-shrink:0">Dropoff</span><span style="color:#e8edf5;text-align:right">' + savedDro + '</span></div>' : '') +
  (savedPt ? '<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;gap:12px"><span style="color:rgba(34,197,94,.7);flex-shrink:0">Time</span><span style="color:#22c55e;font-weight:700;font-size:13px">' + savedPt + '</span></div>' : '') +
'</div>' : '') +
    '</div>';
  } else if (alreadyJoined && st === 'started') {
    var driverPhone = (ride.driver_phone||'').replace(/\D/g,'');
    // Check what we know about this passenger from localStorage
    var sv = getSaved();
    var paxPu  = (sv && sv.last_pickup)  || '';
    var paxPt  = (sv && sv.last_pickup_time) || fmtTime(ride.departure_time);
    joinArea =
      '<div class="otw-card">' +
        '<div class="otw-hero">' +
          '<span class="otw-car-anim">🚗</span>' +
          '<div class="otw-heading">Your driver is on the way</div>' +
          '<div class="otw-driver-name">' + (ride.driver_name||'Driver') + ' is heading to pick you up</div>' +
        '</div>' +
        '<div class="otw-details">' +
  '<div class="otw-detail-row"><span class="otw-detail-label">Pickup</span><span class="otw-detail-val">' + (ride.pickup_label||'—') + '</span></div>' +
  '<div class="otw-detail-row"><span class="otw-detail-label">Dropoff</span><span class="otw-detail-val">' + (ride.dropoff_label||'—') + '</span></div>' +
  '<div class="otw-detail-row"><span class="otw-detail-label">Date</span><span class="otw-detail-val">' + fmtDate(ride.dates) + '</span></div>' +
  '<div class="otw-detail-row"><span class="otw-detail-label">Time</span><span class="otw-detail-val">' + fmtTime(ride.departure_time) + '</span></div>' +
'</div>' +
        (driverPhone ? '<button class="otw-wa-btn" id="otw-wa-btn" data-phone="' + driverPhone + '">Message driver on WhatsApp</button>' : '') +
      '</div>';

    joinArea = '<button class="btn btn-full" disabled style="background:var(--amber-dim);border:1px solid rgba(245,158,11,.3);color:var(--amber)">Ride Full</button>';
  } else if (closed) {
    joinArea = '<button class="btn btn-full btn-ghost" disabled>Ride Closed</button>';
  } else {
    joinArea = '<button class="btn btn-full btn-green" id="btn-join">Join this ride</button>';
  }

  mv.innerHTML = '<div class="content">' +
    heroCardHTML(true) +
    pickedBanner +
    joinArea +
  '</div>';

  wireHeroFooter();
  var otwWa = document.getElementById('otw-wa-btn');
  if (otwWa) otwWa.addEventListener('click', function() { window.open('https://wa.me/' + this.dataset.phone, '_blank'); });

  var joinBtn = document.getElementById('btn-join');
  if (joinBtn) joinBtn.addEventListener('click', showJoinForm);
}

  var saved = getSaved();
  var prefillName  = (saved && saved.name)  || (tgUser ? ((tgUser.first_name||'') + (tgUser.last_name ? ' '+tgUser.last_name : '')).trim() : '');
  var prefillPhone = (saved && saved.phone) || '';

  var mv = document.getElementById('main-view');

        '<div class="toggle-row" id="j-shift-row">' +
          '<div><div class="toggle-lbl">Is this shift start time?</div><div class="toggle-sub">Driver will plan around your shift schedule</div></div>' +
          '<div class="toggle-track" id="j-shift-track"><div class="toggle-thumb"></div></div>' +

  var shiftOn = false;
  document.getElementById('j-shift-row').addEventListener('click', function() {

  });
  document.getElementById('j-back').addEventListener('click', render);

async function submitJoin(shiftOn) {
  var name  = document.getElementById('j-name').value.trim();
  var phone = document.getElementById('j-phone').value.trim();
  var pu    = document.getElementById('j-pu').value.trim();
  var dro   = document.getElementById('j-do').value.trim();
  var time  = document.getElementById('j-time').value;
  var err   = document.getElementById('j-err');

  if (!name || !phone || !pu || !dro) {
    err.textContent = 'Please fill in all required fields.';
    err.classList.add('show');
    return;
  }
  err.classList.remove('show');

  var btn = document.getElementById('j-submit');
  btn.disabled = true; btn.textContent = 'Booking…';

  var puGeo = geoCache['j-pu'] || null;
  var doGeo = geoCache['j-do'] || null;

  try {
    var row = {
      ride_id:             RIDE_ID,
      passenger_name_web:  name,
      passenger_phone_web: phone,
      passenger_wa_id:     phone,
      passenger_name:      name,
      pickup_label:        pu,
      dropoff_label:       dro,
      pickup_lat:          puGeo ? puGeo.lat : null,
      pickup_lng:          puGeo ? puGeo.lng : null,
      dropoff_lat:         doGeo ? doGeo.lat : null,
      dropoff_lng:         doGeo ? doGeo.lng : null,
      is_shift_start:      shiftOn,
      status:              'pending',    // constraint: pending/matched/cancelled/confirmed/picked_up
      platform:            'web',
      date:                ride.dates,
    };
    if (time) row.pickup_time = time;
    if (TG_ID) row.telegram_chat_id = TG_ID;

    var res = await db.from('passenger_requests').insert(row);
    if (res.error) throw res.error;

    setSaved({ name: name, phone: phone, joined_ride: RIDE_ID, last_pickup: pu, last_dropoff: dro, last_pickup_time: fmtTime((time||'00:00')+':00') });

    var r2 = await db.from('passenger_requests').select('*').eq('ride_id', RIDE_ID);
    passengers = r2.data || [];

    showConfirmed(name, pu, dro, time, shiftOn);
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Confirm my seat';
    err.textContent = 'Booking failed: ' + e.message;
    err.classList.add('show');
  }
}

function showConfirmed(name, pu, dro, time, shiftOn) {
  var confs = passengers.filter(function(p){ return p.status !== 'cancelled'; }).length;
  var st = ride.ride_status || 'open';

  var mv = document.getElementById('main-view');
  mv.innerHTML =
    '<div class="content">' +
      heroCardHTML(true) +
      '<div class="confirmed-card">' +
        '<div style="font-size:36px;margin-bottom:10px">✅</div>' +
        '<div class="confirmed-card-title">You\'re on this ride!</div>' +
        '<div class="confirmed-card-sub">Driver will contact you on WhatsApp before departure</div>' +
      '</div>' +
      '<div class="form-card"><div class="form-inner">' +
        '<div class="detail-list">' +
          '<div class="dl-row"><span class="dl-label">Name</span><span class="dl-val">' + name + '</span></div>' +
          '<div class="dl-row"><span class="dl-label">Pickup</span><span class="dl-val">' + pu + '</span></div>' +
          '<div class="dl-row"><span class="dl-label">Dropoff</span><span class="dl-val">' + dro + '</span></div>' +
          (time ? '<div class="dl-row"><span class="dl-label">Pickup time</span><span class="dl-val accent">' + fmtTime(time + ':00') + '</span></div>' : '') +
          (shiftOn ? '<div style="font-size:11px;color:var(--accent)">⚡ Marked as shift start time</div>' : '') +

        '<div class="divider"></div>' +
        '<div style="font-size:11px;color:var(--text-muted)">' + confs + ' person' + (confs !== 1 ? 's' : '') + ' joining this ride including you</div>' +

      (st === 'started'
        ? '<div class="otw-banner"><div class="otw-title">🚗 Your driver is on the way</div><div class="otw-sub">Be ready at your pickup location</div></div>'
        : '') +

  wireHeroFooter();
}

// ════════════════════════════════════════════════════════════
// DRIVER VIEW
// ════════════════════════════════════════════════════════════
function renderDriver(mv) {
  var st      = ride.ride_status || 'open';
  var started = st === 'started';

  mv.innerHTML =
    '<div class="content">' + heroCardHTML(false) + buildActionStrip(st, started) + '</div>' +
    '<div class="tabs" id="driver-tabs">' +
      '<div class="tab active" id="tab-pax">Passengers <span id="pax-count"></span></div>' +
      '<div class="tab" id="tab-match">Matched rides</div>' +
    '</div>' +
    '<div id="tab-content" class="sec" style="padding-top:10px"></div>';

  document.getElementById('tab-pax').addEventListener('click', function() { switchTab('passengers'); });
  document.getElementById('tab-match').addEventListener('click', function() { switchTab('matched'); });

  // Wire action strip buttons
  var dShare = document.getElementById('d-share');
  if (dShare) dShare.addEventListener('click', function() {
    var url = rideUrl(false);
    var msg = 'Join my ride from ' + (ride.pickup_label||'') + ' to ' + (ride.dropoff_label||'') + ' on ' + fmtDate(ride.dates) + ' at ' + fmtTime(ride.departure_time);
    doShare(url, msg);
  });
  var dMaps = document.getElementById('d-maps');
  if (dMaps) dMaps.addEventListener('click', openMaps);
  var dStart = document.getElementById('d-start');
  if (dStart) dStart.addEventListener('click', startRide);
  var dEnd = document.getElementById('d-end');
  if (dEnd) dEnd.addEventListener('click', endRide);
  var dClose = document.getElementById('d-close');
  if (dClose) dClose.addEventListener('click', toggleClose);

  renderTab();
}

function buildActionStrip(st, started) {
  var mapsIcon   = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>';
  var shareIcon  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>';

  var row2 = '';
  if (started) {
    row2 = '<div class="action-row"><button class="act-btn act-btn-end" id="d-end" style="border:none">&#9632; End Ride</button></div>';
  } else {
    var closeLabel = st === 'closed' ? 'Reopen Ride' : 'Close Ride';
    row2 = '<div class="action-row">' +
      '<button class="act-btn act-btn-close" id="d-close">' + closeLabel + '</button>' +
      '<button class="act-btn act-btn-start" id="d-start">&#9654; Start Ride</button>' +

  return '<div class="action-strip">' +

      '<button class="act-btn act-btn-share" id="d-share">' + shareIcon + ' Share ride link</button>' +

function switchTab(t) {
  activeTab = t;
  document.getElementById('tab-pax').classList.toggle('active', t === 'passengers');
  document.getElementById('tab-match').classList.toggle('active', t === 'matched');
  renderTab();
}

function renderTab() {
  if (activeTab === 'passengers') renderPaxTab();
  else renderMatchedTab();
}

// ════════════════════════════════════════════════════════════
// PASSENGERS TAB
// ════════════════════════════════════════════════════════════
function renderPaxTab() {
  var tc   = document.getElementById('tab-content');
  var conf = passengers.filter(function(p){ return p.status !== 'cancelled'; });

  var lbl = document.getElementById('pax-count');
  if (lbl) lbl.textContent = '(' + conf.length + ')';

  if (!conf.length) {
    tc.innerHTML =
      '<div style="text-align:center;padding:24px 0;font-size:13px;color:var(--text-muted)">No passengers yet.<br>Share your ride link to get bookings.</div>' +
      '<button class="btn-dashed" id="add-pax-btn">+ Add passenger manually</button>';
    document.getElementById('add-pax-btn').addEventListener('click', showAddPaxForm);
    return;
  }

  var pickedCount = conf.filter(function(p){ return p.status === 'picked_up'; }).length;
  var html = pickedCount > 0
    ? '<div class="picked-banner" style="margin-bottom:4px">✓ ' + pickedCount + ' passenger' + (pickedCount !== 1 ? 's' : '') + ' picked up</div>'
    : '';

  conf.forEach(function(p, i) {
    var av   = avCol(i + 1);
    var name = p.passenger_name_web || p.passenger_name || 'Passenger';
    var ph   = p.passenger_phone_web || p.passenger_wa_id || '';
    var phC  = ph.replace(/\D/g, '');
    var pu   = p.pickup_label  || '—';
    var dro  = p.dropoff_label || '—';
    var pt   = p.pickup_time ? fmtTime(p.pickup_time) : '—';
    var done = p.status === 'picked_up';

    // Distance from driver pickup to this passenger pickup
    var distBadge = '';
    if (ride.pickup_lat && ride.pickup_lng && p.pickup_lat && p.pickup_lng) {
      var km = haversine(ride.pickup_lat, ride.pickup_lng, p.pickup_lat, p.pickup_lng);
      distBadge = '<span class="badge b-km">' + fmtKm(km) + '</span>';
    }

    var badges = distBadge;
    if (p.is_shift_start) badges += '<span class="badge b-shift">⚡ shift</span>';
    if (done)             badges += '<span class="badge b-pickedup">✓ picked up</span>';
    else                  badges  = '<span class="badge b-confirmed">confirmed</span>' + badges;

    // Time since passenger joined
    var joinedAgo = timeAgo(p.created_at || '');

    var actionRow =
      '<div class="pax-actions">' +
        '<button class="pax-btn pax-btn-remove remove-pax" data-pid="' + p.id + '" title="Remove">✕</button>' +
        (phC ? '<button class="pax-btn pax-btn-outside outside-btn" data-phone="' + phC + '">💬 I\'m outside</button>' : '') +
        (!done
          ? '<button class="pax-btn pax-btn-pickup pickup-btn" data-pid="' + p.id + '">✓ Picked up</button>'
          : '<div class="pax-btn pax-btn-onboard">✓ On board</div>') +
      '</div>';

    html +=
      '<div class="pax-card' + (done ? ' done' : '') + '">' +
        '<div class="card-top">' +
          '<div class="card-row1">' +
            '<div class="pax-info">' +
              '<div class="av" style="background:' + av.bg + ';color:' + av.c + '">' + initials(name) + '</div>' +
              '<div>' +
                '<div class="pax-name">' + name + '</div>' +
                '<div class="pax-sub">' + joinedAgo + (ph ? ' · ' + ph : '') + '</div>' +
              '</div>' +
            '</div>' +
            '<div class="badges">' + badges + '</div>' +
          '</div>' +
          '<div class="route-strip">' +
            '<div class="route-nodes"><div class="nd-o"></div><div class="nd-line"></div><div class="nd-d"></div></div>' +
            '<div class="route-labels">' +
              '<div><div class="route-place">' + pu + '</div><div class="route-sub">Pickup</div></div>' +
              '<div><div class="route-place">' + dro + '</div><div class="route-sub">Dropoff</div></div>' +
            '</div>' +
            '<div class="route-meta"><div class="ride-time" style="font-size:16px">' + pt + '</div><div class="ride-date">' + fmtDate(p.date||ride.dates) + '</div></div>' +
          '</div>' +
        '</div>' +
        actionRow +
      '</div>';
  });

  html += '<button class="btn-dashed" id="add-pax-btn" style="margin-top:4px">+ Add passenger manually</button>';
  tc.innerHTML = html;

  // Wire outside buttons
  tc.querySelectorAll('.outside-btn').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      window.open('https://wa.me/' + this.dataset.phone + '?text=' + encodeURIComponent("I'm outside"), '_blank');
    });
  });

  // Wire pickup buttons
  tc.querySelectorAll('.pickup-btn').forEach(function(btn) {
    btn.addEventListener('click', async function(e) {
      e.stopPropagation();
      this.disabled = true; this.textContent = 'Saving…';
      await db.from('passenger_requests').update({status:'picked_up'}).eq('id', this.dataset.pid);
      var r = await db.from('passenger_requests').select('*').eq('ride_id', RIDE_ID);
      passengers = r.data || [];
      renderPaxTab();
    });
  });

  // Wire remove buttons
  tc.querySelectorAll('.remove-pax').forEach(function(btn) {
    btn.addEventListener('click', async function(e) {
      e.stopPropagation();
      if (!confirm('Remove this passenger?')) return;
      await db.from('passenger_requests').update({status:'cancelled'}).eq('id', this.dataset.pid);
      var r = await db.from('passenger_requests').select('*').eq('ride_id', RIDE_ID);
      passengers = r.data || [];
      renderPaxTab();
    });
  });

  document.getElementById('add-pax-btn').addEventListener('click', showAddPaxForm);
}

// ADD PASSENGER MANUALLY

function showAddPaxForm() {
  var tc = document.getElementById('tab-content');
  tc.innerHTML =

      '<div class="field"><label>Name *</label><div class="field-wrap"><input class="fi" id="ap-name" placeholder="Passenger name"></div></div>' +
      '<div class="field"><label>WhatsApp *</label><div class="field-wrap"><input class="fi" id="ap-phone" type="tel" placeholder="+1 416 555 0000"></div></div>' +
      '<div class="field"><label>Pickup location *</label><div class="field-wrap" style="position:relative"><input class="fi" id="ap-pu" placeholder="Pickup" autocomplete="off"><div class="suggestions" id="ap-pu-sug"></div></div><div class="conf-tag" id="ap-pu-tag"><div class="conf-dot"></div><span id="ap-pu-txt"></span></div></div>' +
      '<div class="field"><label>Dropoff location *</label><div class="field-wrap" style="position:relative"><input class="fi" id="ap-do" placeholder="Dropoff" autocomplete="off"><div class="suggestions" id="ap-do-sug"></div></div><div class="conf-tag" id="ap-do-tag"><div class="conf-dot"></div><span id="ap-do-txt"></span></div></div>' +
      '<div class="field"><label>Pickup time</label><div class="field-wrap"><input class="fi" id="ap-time" type="time"></div></div>' +
      '<div class="err-box" id="ap-err"></div>' +
      '<button class="btn btn-full" style="background:var(--accent);color:#fff" id="ap-submit">Add passenger</button>' +
      '<button class="btn btn-fullsm btn-ghost" id="ap-back" style="margin-top:4px">← Back</button>' +
    '</div></div>';

  setupLocField('ap-pu', 'ap-pu-sug', 'ap-pu-tag', 'ap-pu-txt');
  setupLocField('ap-do', 'ap-do-sug', 'ap-do-tag', 'ap-do-txt');

  document.getElementById('ap-back').addEventListener('click', function() {
    activeTab = 'passengers'; renderPaxTab();
  });
  document.getElementById('ap-submit').addEventListener('click', async function() {
    var name = document.getElementById('ap-name').value.trim();
    var ph   = document.getElementById('ap-phone').value.trim();
    var pu   = document.getElementById('ap-pu').value.trim();
    var dro  = document.getElementById('ap-do').value.trim();
    var t    = document.getElementById('ap-time').value;
    var err  = document.getElementById('ap-err');
    if (!name || !ph || !pu || !dro) { err.textContent = 'All fields required.'; err.classList.add('show'); return; }
    err.classList.remove('show');
    this.disabled = true; this.textContent = 'Adding…';
    var puG = geoCache['ap-pu'] || null;
    var doG = geoCache['ap-do'] || null;
    await db.from('passenger_requests').insert({
      ride_id: RIDE_ID, passenger_name_web: name, passenger_phone_web: ph,
      passenger_wa_id: ph, passenger_name: name,
      pickup_label: pu, dropoff_label: dro,
      pickup_lat:  puG ? puG.lat : null, pickup_lng:  puG ? puG.lng : null,
      dropoff_lat: doG ? doG.lat : null, dropoff_lng: doG ? doG.lng : null,
      pickup_time: t || null, status: 'confirmed', platform: 'web', date: ride.dates,
    });
    var r = await db.from('passenger_requests').select('*').eq('ride_id', RIDE_ID);
    passengers = r.data || [];
    activeTab = 'passengers';
    renderPaxTab();
  });
}

// ════════════════════════════════════════════════════════════
// MATCHED RIDES TAB
// ════════════════════════════════════════════════════════════
async function renderMatchedTab() {
  var tc = document.getElementById('tab-content');
  tc.innerHTML = '<div style="padding:20px 0;text-align:center;font-size:12px;color:var(--text-muted)">Finding matched passengers…</div>';

  if (!ride.pickup_lat || !ride.pickup_lng) {
    tc.innerHTML = '<div style="padding:20px 0;text-align:center;font-size:13px;color:var(--text-muted)">No location data for this ride.</div>';
    return;
  }

  try {
    var res = await db.rpc('find_matched_passengers', {
      p_driver_id: RIDE_ID,
      p_from_lat:  ride.pickup_lat,
      p_from_lng:  ride.pickup_lng,
      p_to_lat:    ride.dropoff_lat || ride.pickup_lat,
      p_to_lng:    ride.dropoff_lng || ride.pickup_lng,
      p_ride_date: ride.dates,
      p_radius_km: 25,
    });
    if (res.error) throw res.error;

    var matches = res.data || [];
    if (!matches.length) {
      tc.innerHTML = '<div style="padding:24px 0;text-align:center;font-size:13px;color:var(--text-muted)">No matched passengers found for this date.</div>';
      return;
    }

    var shareUrl = rideUrl(false);
    var html = '';

    matches.forEach(function(m, i) {
      var av    = avCol(i);
      var name  = m.sender_name || 'Passenger';
      var ph    = m.sender_number ? String(m.sender_number) : '';
      var phC   = ph.replace(/\D/g, '');
      var rTime = fmtTime(m.pick_up_time);
      var rDate = fmtDate(m.pick_up_date);
      var dist  = m.dist_km != null ? fmtKm(m.dist_km) : '';
      var posted = timeAgo(m.created_at || '');
      var origMsg = m.original_message || '';
      var imp   = (m.important_ride || '').toLowerCase();

      var contactMsg = 'Hi ' + name + ', I am driving from ' + (ride.pickup_label||'') + ' to ' + (ride.dropoff_label||'') + ' on ' + fmtDate(ride.dates) + ' at ' + fmtTime(ride.departure_time) + '. Do you still need a ride? Join here: ' + shareUrl;

      var badges = '';
      if (imp === 'urgent')  badges += '<span class="badge b-urgent">urgent</span>';
      if (imp === 'airport') badges += '<span class="badge b-airport">airport</span>';
      // Pickup distance from driver pickup
      if (dist) badges += '<span class="badge b-km">📍 ' + dist + ' pickup</span>';
      // Dropoff distance from driver dropoff
      if (ride.dropoff_lat && ride.dropoff_lng && m.dropoff_lat && m.dropoff_lng) {
        var dKm = haversine(ride.dropoff_lat, ride.dropoff_lng, m.dropoff_lat, m.dropoff_lng);
        var dDist = fmtKm(dKm);
        if (dDist) badges += '<span class="badge" style="background:var(--purple-dim);color:var(--purple);border:1px solid rgba(168,85,247,.25)">🏁 ' + dDist + ' dropoff</span>';
      }

      html +=
        '<div class="match-card" id="match-' + i + '">' +
          '<div class="card-top">' +
            '<div class="card-row1">' +
              '<div class="pax-info">' +
                '<div class="av" style="background:' + av.bg + ';color:' + av.c + '">' + initials(name) + '</div>' +
                '<div>' +
                  '<div class="pax-name">' + name + '</div>' +
                  '<div class="pax-sub">' + posted + '</div>' +
                '</div>' +
              '</div>' +
              '<div class="badges">' + badges + '</div>' +
            '</div>' +
            '<div class="route-strip">' +
              '<div class="route-nodes"><div class="nd-o"></div><div class="nd-line"></div><div class="nd-d"></div></div>' +
              '<div class="route-labels">' +
                '<div><div class="route-place">' + (m.pickup_label||'—') + '</div><div class="route-sub">Pickup</div></div>' +
                '<div><div class="route-place">' + (m.dropoff_label||'—') + '</div><div class="route-sub">Dropoff</div></div>' +
              '</div>' +
              '<div class="route-meta"><div class="ride-time" style="font-size:15px">' + rTime + '</div><div class="ride-date">' + rDate + '</div></div>' +
            '</div>' +
          '</div>' +
          // Original message — hidden, toggled inline by button click
          '<div class="match-footer">' +
            (origMsg ? '<button class="match-btn match-btn-msg" data-idx="' + i + '">View message</button>' : '<div></div>') +
            (phC ? '<button class="match-btn match-btn-contact" data-num="' + phC + '" data-msg="' + encodeURIComponent(contactMsg) + '">Contact</button>' : '') +
          '</div>' +
          (origMsg
            ? '<div class="msg-box" id="msgbox-' + i + '">' +
                '<div class="det-label">Original message</div>' +
                '<p>' + origMsg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</p>' +
              '</div>'
            : '') +
        '</div>';
    });

    tc.innerHTML = html;

    // Wire "View message" buttons — toggle inline, NO re-render, NO e.preventDefault on card
    tc.querySelectorAll('.match-btn-msg').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var idx = this.dataset.idx;
        var box = document.getElementById('msgbox-' + idx);
        if (!box) return;
        var opening = !box.classList.contains('open');
        // Close all others
        tc.querySelectorAll('.msg-box').forEach(function(b) { b.classList.remove('open'); });
        tc.querySelectorAll('.match-btn-msg').forEach(function(b) { b.textContent = 'View message'; });
        if (opening) {
          box.classList.add('open');
          this.textContent = 'Hide message';
        }
      });
    });

    // Wire Contact buttons
    tc.querySelectorAll('.match-btn-contact').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        window.open('https://wa.me/' + this.dataset.num + '?text=' + this.dataset.msg, '_blank');
      });
    });

  } catch(e) {
    tc.innerHTML = '<div style="padding:16px;font-size:12px;color:var(--red)">Error loading matches: ' + e.message + '</div>';
  }
}

// ════════════════════════════════════════════════════════════
// OPEN IN MAPS
// Route: driver GPS → sorted pax pickups → sorted pax dropoffs → ride destination
// ════════════════════════════════════════════════════════════
function openMaps() {
  var btn = document.getElementById('d-maps');
  var origLabel = btn ? btn.innerHTML : '';
  if (btn) { btn.disabled = true; btn.innerHTML = 'Getting location…'; }

  function restore() { if (btn) { btn.disabled = false; btn.innerHTML = origLabel; } }

  function buildAndOpen(dLat, dLng) {
    restore();

    var oLat = dLat != null ? dLat : ride.pickup_lat;
    var oLng = dLng != null ? dLng : ride.pickup_lng;

    if (!ride.dropoff_lat || !ride.dropoff_lng) {
      alert('No destination data for this ride.');
      return;
    }

    var confPax = passengers.filter(function(p) {
      return p.status !== 'cancelled' && p.pickup_lat && p.pickup_lng;
    });

    // Step 1: sort pickups by distance from driver
    var pickups = confPax.map(function(p) {
      return { lat: p.pickup_lat, lng: p.pickup_lng, dlat: p.dropoff_lat, dlng: p.dropoff_lng };
    });
    pickups.sort(function(a, b) {
      return haversine(oLat, oLng, a.lat, a.lng) - haversine(oLat, oLng, b.lat, b.lng);
    });

    // Step 2: sort dropoffs from last pickup position
    var lastLat = pickups.length ? pickups[pickups.length-1].lat : oLat;
    var lastLng = pickups.length ? pickups[pickups.length-1].lng : oLng;
    var dropoffs = confPax
      .filter(function(p) { return p.dropoff_lat && p.dropoff_lng; })
      .map(function(p) { return { lat: p.dropoff_lat, lng: p.dropoff_lng }; });
    dropoffs.sort(function(a, b) {
      return haversine(lastLat, lastLng, a.lat, a.lng) - haversine(lastLat, lastLng, b.lat, b.lng);
    });

    // Step 3: build waypoints array
    var wpts = pickups.map(function(p) { return p.lat + ',' + p.lng; })
                      .concat(dropoffs.map(function(p) { return p.lat + ',' + p.lng; }));

    var dest = ride.dropoff_lat + ',' + ride.dropoff_lng;

    var url = 'https://www.google.com/maps/dir/?api=1' +
              '&origin=' + oLat + ',' + oLng +
              '&destination=' + dest +
              '&travelmode=driving' +
              (wpts.length ? '&waypoints=' + wpts.join('|') : '');

    // Mobile: location.href (never blocked). Desktop: new tab.
    if (isMobile()) {
      location.href = url;
    } else {
      window.open(url, '_blank', 'noopener');
    }
  }

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      function(pos) { buildAndOpen(pos.coords.latitude, pos.coords.longitude); },
      function()    { buildAndOpen(null, null); },
      { timeout: 10000, enableHighAccuracy: true, maximumAge: 0 }
    );
  } else {
    buildAndOpen(null, null);
  }
}

// ════════════════════════════════════════════════════════════
// RIDE STATUS ACTIONS
// ════════════════════════════════════════════════════════════
async function startRide() {
  var btn = document.getElementById('d-start');
  if (btn) { btn.disabled = true; btn.textContent = 'Starting…'; }
  await db.from('driver_routines').update({ride_status:'started'}).eq('id', RIDE_ID);
  ride.ride_status = 'started';
  render();
}

async function endRide() {
  if (!confirm('End this ride?')) return;
  await db.from('driver_routines').update({ride_status:'ended'}).eq('id', RIDE_ID);
  ride.ride_status = 'ended';
  render();
}

async function toggleClose() {
  var newSt = ride.ride_status === 'closed' ? 'open' : 'closed';
  await db.from('driver_routines').update({ride_status:newSt}).eq('id', RIDE_ID);
  ride.ride_status = newSt;
  render();
}

// ════════════════════════════════════════════════════════════
// MAPBOX LOCATION FIELD — same session token pattern as index.html
// ════════════════════════════════════════════════════════════
function setupLocField(inputId, sugId, tagId, tagTxtId) {
  var input = document.getElementById(inputId);
  var sug   = document.getElementById(sugId);
  if (!input || !sug) return;

  // Single session token per page load, reused across all suggest+retrieve calls
  if (!window._SB_SID) window._SB_SID = 'pf-' + Date.now();
  var sid = window._SB_SID;

  input.addEventListener('input', function() {
    geoCache[inputId] = null;
    input.classList.remove('confirmed');
    var tag = document.getElementById(tagId); if (tag) tag.classList.remove('show');
    clearTimeout(geoTimers[inputId]);

    var q = input.value.trim();
    if (q.length < 3) { sug.classList.remove('show'); sug.innerHTML = ''; return; }

    sug.innerHTML = '<div class="sug-item loading">Searching…</div>';
    sug.classList.add('show');

    geoTimers[inputId] = setTimeout(function() {
      fetch('https://api.mapbox.com/search/searchbox/v1/suggest?q=' + encodeURIComponent(q) +
            '&access_token=' + MAPBOX_TOKEN +
            '&session_token=' + sid +
            '&language=en&limit=6&country=CA,US&proximity=-79.3832,43.6532')
        .then(function(r) { return r.json(); })
        .then(function(d) {
          sug.innerHTML = '';
          var items = (d && d.suggestions) || [];
          if (!items.length) { sug.innerHTML = '<div class="sug-item loading">No results</div>'; return; }
          items.forEach(function(item) {
            var name = item.name || '';
            var ctx  = item.place_formatted || item.full_address || '';
            if (ctx.toLowerCase().startsWith(name.toLowerCase() + ', ')) ctx = ctx.slice(name.length + 2);
            var el = document.createElement('div');
            el.className = 'sug-item';
            el.innerHTML = '<div class="sug-main">' + name + '</div>' + (ctx ? '<div class="sug-ctx">' + ctx + '</div>' : '');
            el.addEventListener('click', function() {
              input.value = name + (ctx ? ', ' + ctx : '');
              sug.classList.remove('show'); sug.innerHTML = '';
              fetch('https://api.mapbox.com/search/searchbox/v1/retrieve/' + item.mapbox_id +
                    '?access_token=' + MAPBOX_TOKEN + '&session_token=' + sid)
                .then(function(r) { return r.json(); })
                .then(function(rd) {
                  var f = rd.features && rd.features[0];
                  var c = f && f.geometry && f.geometry.coordinates;
                  if (!c) return;
                  geoCache[inputId] = { lat: c[1], lng: c[0], label: name + (ctx ? ', ' + ctx : '') };
                  input.classList.add('confirmed');
                  var tag2 = document.getElementById(tagId); if (tag2) tag2.classList.add('show');
                  var tt   = document.getElementById(tagTxtId); if (tt) tt.textContent = name;
                });
            });
            sug.appendChild(el);
          });
          sug.classList.add('show');
        })
        .catch(function() { sug.innerHTML = '<div class="sug-item loading">Connection error</div>'; });
    }, 400);
  });

  document.addEventListener('click', function(e) {
    if (!input.contains(e.target) && !sug.contains(e.target)) sug.classList.remove('show');
  });
}

function showErr(msg) {
  document.getElementById('loading-view').style.display = 'none';
  var mv = document.getElementById('main-view');
  mv.style.display = '';
  mv.innerHTML = '<div class="content"><div class="ride-card"><div class="status-screen">' +
    '<div class="status-icon">🔍</div>' +
    '<div class="status-title">Ride not found</div>' +
    '<div class="status-sub">' + msg + '</div>' +

}

// ════════════════════════════════════════════════════════════
// THEME TOGGLE
// ════════════════════════════════════════════════════════════
(function() {
  var saved = localStorage.getItem('pf_theme') || 'dark';
  if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
  var btn = document.getElementById('theme-toggle');
  if (btn) {
    btn.textContent = saved === 'light' ? '☀️' : '🌙';
    btn.addEventListener('click', function() {
      var cur = document.documentElement.getAttribute('data-theme');
      var next = cur === 'light' ? 'dark' : 'light';
      if (next === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
      localStorage.setItem('pf_theme', next);
      btn.textContent = next === 'light' ? '☀️' : '🌙';
    });
  }
})();
