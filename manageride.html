<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pathfynder — Ride</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0e1117;--surface:#161b27;--surface2:#1e2535;--border:#2a3348;
  --accent:#4f8ef7;--accent-dim:rgba(79,142,247,0.12);--accent-hover:#6ba3ff;
  --green:#22c55e;--green-dim:rgba(34,197,94,0.10);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.12);
  --red:#ef4444;--red-dim:rgba(239,68,68,0.10);
  --purple:#a855f7;--purple-dim:rgba(168,85,247,0.10);
  --text:#e8edf5;--text-dim:#8a95a8;--text-muted:#4e5a6e;
  --radius:12px;--font-display:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);overflow-x:hidden}
#app{max-width:520px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh}

/* ── HEADER ── */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;flex-shrink:0}
.logo{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:20px;height:20px}
.brand{font-family:var(--font-display);font-size:17px;font-weight:700;letter-spacing:-.3px}
.brand span{color:var(--accent)}
.status-pill{margin-left:auto;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;display:none}
.sp-open{background:var(--green-dim);border:1px solid rgba(34,197,94,.25);color:var(--green)}
.sp-started{background:var(--accent-dim);border:1px solid rgba(79,142,247,.25);color:var(--accent)}
.sp-closed,.sp-ended{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted)}

/* ── EXACT searchride.html CARD CSS ── */
.ride-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.ride-card:active{opacity:.9}
.ride-card.expanded{border-color:var(--accent)}
.ride-card.card-urgent{border-color:rgba(239,68,68,0.4)}
.ride-card.card-urgent.expanded{border-color:var(--red)}
.card-top{padding:11px 13px 9px}
.card-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.pax-info{display:flex;align-items:center;gap:8px;min-width:0}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:var(--font-display)}
.pax-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;font-family:var(--font-display)}
.time-ago{font-size:10px;color:var(--text-muted);margin-top:1px}
.badges{display:flex;align-items:center;gap:3px;flex-wrap:wrap;justify-content:flex-end;max-width:145px}
.badge{font-size:9px;font-weight:600;padding:2px 6px;border-radius:20px;text-transform:uppercase;letter-spacing:.02em;display:flex;align-items:center;gap:2px;white-space:nowrap}
.badge svg{width:8px;height:8px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.b-pending  {background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,0.25)}
.b-matched  {background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,0.2)}
.b-onetime  {background:var(--surface2);color:var(--text-dim);border:1px solid var(--border)}
.b-urgent   {background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,0.3)}
.b-airport  {background:var(--purple-dim);color:var(--purple);border:1px solid rgba(168,85,247,0.25)}
.b-recurring{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(79,142,247,0.25)}
.b-shift    {background:var(--accent-dim);color:var(--accent);border:1px solid rgba(79,142,247,0.25)}
.b-confirmed{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,0.2)}
.b-driver   {background:var(--accent-dim);color:var(--accent);border:1px solid rgba(79,142,247,0.25)}
.route-strip{display:flex;align-items:stretch;gap:9px}
.route-nodes{display:flex;flex-direction:column;align-items:center;padding:2px 0;width:12px;flex-shrink:0}
.nd-o{width:7px;height:7px;border-radius:50%;border:1.5px solid var(--text-muted)}
.nd-d{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.nd-line{flex:1;width:1.5px;background:repeating-linear-gradient(to bottom,var(--accent) 0px,var(--accent) 3px,transparent 3px,transparent 6px);margin:2px 0;min-height:12px;opacity:.45}
.route-labels{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between;gap:5px}
.route-place{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.route-sub{font-size:10px;color:var(--text-muted)}
.route-meta{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;gap:3px}
.ride-time{font-size:17px;font-weight:700;color:var(--text);font-family:var(--font-display);letter-spacing:-.5px;line-height:1}
.ride-date{font-size:10px;color:var(--text-dim);text-align:right}
.card-footer{display:flex;align-items:center;border-top:1px solid var(--border)}
.footer-info{flex:1;padding:7px 13px;display:flex;align-items:center;gap:9px}
.f-chip{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text-muted)}
.f-chip svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.contact-btns{display:flex;border-left:1px solid var(--border)}
.c-btn{width:42px;height:38px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s}
.c-btn:first-child{border-right:1px solid var(--border)}
.c-btn:active{background:var(--surface2)}
.c-btn svg{width:19px;height:19px}
.icon-wa{fill:none;stroke:#25D366;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.icon-share{fill:none;stroke:var(--accent);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.icon-dim{fill:none;stroke:var(--border);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.card-detail{border-top:1px solid var(--border);padding:11px 13px;display:none}
.card-detail.open{display:block}
.det-label{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;display:flex;align-items:center;gap:4px}
.det-label svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.msg-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-bottom:8px;max-height:80px;overflow:hidden;position:relative}
.msg-box p{font-size:12px;color:var(--text-dim);line-height:1.55;white-space:pre-wrap;word-break:break-word}
.msg-fade{position:absolute;bottom:0;left:0;right:0;height:24px;background:linear-gradient(transparent,var(--bg));pointer-events:none}

/* ── SEATS BAR ── */
.seats-bar-wrap{background:var(--surface2);border-radius:8px;padding:10px 13px;margin-top:6px}
.seats-bar{background:var(--border);border-radius:3px;height:6px;overflow:hidden;margin:6px 0 5px}
.seats-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.seats-row-info{display:flex;justify-content:space-between;align-items:center}
.seats-count{font-size:13px;font-weight:600;color:var(--text);font-family:var(--font-display)}
.seats-sub{font-size:11px;color:var(--text-muted)}

/* ── PASSENGERS JOINED HIGHLIGHT ── */
.pax-joined-banner{background:var(--green-dim);border:1px solid rgba(34,197,94,.25);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:4px}
.paj-num{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--green);flex-shrink:0}
.paj-text{font-size:12px;color:var(--green);font-weight:500;line-height:1.4}

/* ── NOTES BOX (always open) ── */
.notes-box{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 13px;font-size:12px;color:var(--text-dim);line-height:1.55;margin-top:6px}
.notes-label{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}

/* ── DRIVER ACTION ROW ── */
.action-strip{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:4px}
.action-row{padding:10px 12px;display:flex;gap:7px;border-bottom:1px solid var(--border)}
.action-row:last-child{border:none}

/* ── TABS ── */
.tabs{background:var(--surface);border-bottom:1px solid var(--border);display:flex;position:sticky;top:60px;z-index:90;flex-shrink:0}
.tab{flex:1;padding:11px 8px;font-size:12px;font-weight:500;color:var(--text-muted);text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── CONTENT SECTIONS ── */
.sec{padding:12px 12px 0}
.sec-label{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.card-list{display:flex;flex-direction:column;gap:8px;padding:0 12px 16px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:9px;font-family:var(--font-body);font-weight:600;cursor:pointer;border:none;transition:opacity .15s;white-space:nowrap}
.btn:active{opacity:.8}
.btn:disabled{opacity:.4;cursor:default}
.btn-primary{background:var(--accent);color:#fff;padding:0 14px;height:36px;font-size:12px}
.btn-green  {background:var(--green);color:#fff;padding:0 14px;height:36px;font-size:12px}
.btn-ghost  {background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);padding:0 12px;height:36px;font-size:12px}
.btn-wa     {background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.25);color:#25D366;padding:0 12px;height:36px;font-size:12px}
.btn-amber  {background:var(--amber-dim);border:1px solid rgba(245,158,11,.3);color:var(--amber);padding:0 12px;height:34px;font-size:12px}
.btn-red    {background:var(--red-dim);border:1px solid rgba(239,68,68,.25);color:var(--red);padding:0 10px;height:30px;font-size:11px}
.btn-sm     {height:30px;font-size:11px;padding:0 10px}
.btn-full   {width:100%;height:44px;font-size:14px;border-radius:10px}
.btn-full-sm{width:100%;height:38px;font-size:13px;border-radius:9px}

/* ── FORM (same as index.html) ── */
.field{display:flex;flex-direction:column;gap:6px;position:relative}
.field label{font-size:13px;font-weight:500;color:var(--text-dim)}
.input-wrap{position:relative}
.field-input{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:border-color .15s;-webkit-appearance:none}
.field-input:focus{border-color:var(--accent)}
.field-input::placeholder{color:var(--text-muted)}
.field-input.confirmed{border-color:var(--green)}
input[type="time"]::-webkit-calendar-picker-indicator{filter:invert(0.5)}
.suggestions{display:none;position:absolute;left:0;right:0;top:calc(100% + 4px);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.suggestions.show{display:block}
.suggestion-item{padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.suggestion-item:last-child{border:none}
.suggestion-item:hover{background:var(--surface)}
.suggestion-item.loading-item{cursor:default;font-size:12px;color:var(--text-muted);font-style:italic}
.sug-main{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sug-ctx{font-size:11px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.confirmed-tag{display:none;align-items:center;gap:7px;padding:7px 12px;border-radius:8px;font-size:12px;color:var(--green);background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2)}
.confirmed-tag.show{display:flex}
.confirmed-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;cursor:pointer}
.toggle-lbl{font-size:13px;font-weight:500;color:var(--text)}
.toggle-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.toggle-track{width:36px;height:20px;border-radius:10px;background:var(--border);position:relative;transition:background .2s;flex-shrink:0}
.toggle-track.on{background:var(--accent)}
.toggle-thumb{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle-track.on .toggle-thumb{left:18px}
.note-box-join{background:var(--accent-dim);border:1px solid rgba(79,142,247,.2);border-radius:9px;padding:10px 13px;font-size:12px;color:var(--text-dim);line-height:1.55}
.note-box-join b{color:var(--accent)}
.err-box{display:none;padding:10px 13px;border-radius:9px;background:var(--red-dim);border:1px solid rgba(239,68,68,.2);color:var(--red);font-size:13px;line-height:1.5}
.err-box.show{display:block}

/* ── OTW ── */
.otw-banner{background:var(--green-dim);border:1px solid rgba(34,197,94,.25);border-radius:12px;padding:14px 16px;text-align:center;margin:12px 12px 0}
.otw-title{font-size:14px;font-weight:600;color:var(--green);margin-bottom:3px}
.otw-sub{font-size:12px;color:var(--text-dim)}

/* ── SKELETONS ── */
.skel{background:var(--surface);border:1px solid var(--border);border-radius:14px;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div id="app">

<div class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="rgba(255,255,255,0.15)"/>
      <circle cx="12" cy="9" r="2.5" fill="#fff" stroke="none"/>
    </svg>
  </div>
  <div class="brand">Path<span>fynder</span></div>
  <div id="status-pill" class="status-pill"></div>
</div>

<div id="loading-view" style="padding:12px;display:flex;flex-direction:column;gap:10px">
  <div class="skel" style="height:210px"></div>
  <div class="skel" style="height:80px"></div>
</div>

<div id="main-view" style="display:none;flex:1;display:none;flex-direction:column"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var SUPABASE_URL  = 'https://omussxfyrztjahbdrrpi.supabase.co';
var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tdXNzeGZ5cnp0amFoYmRycnBpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MjI1NjAsImV4cCI6MjA5NTk5ODU2MH0.ySigym7uOaFIQm01nErPfn4kE6j4MOVKoNntt_Mosak';
var MAPBOX_TOKEN  = 'pk.eyJ1IjoicHJhbmF5MDA3MSIsImEiOiJjbXF2aXJ0YzUxNXR3MnNwc2l6dnZ5dDkzIn0.g6DyGowXYxDSFO4ZWdpcEw';
var db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

var urlP     = new URLSearchParams(location.search);
var RIDE_ID  = urlP.get('id');
var SHARE_TK = urlP.get('token');
var tg       = window.Telegram&&window.Telegram.WebApp?window.Telegram.WebApp:null;
if(tg){tg.ready();tg.expand();}
var tgUser   = tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user?tg.initDataUnsafe.user:null;
var TG_ID    = tgUser?String(tgUser.id):null;

var ride=null, passengers=[], isDriver=false, activeTab='passengers';
var geoCache={}, geoTimers={}, expandedMatchId=null;

/* ── HELPERS (same as searchride.html) ── */
var AV=[{bg:'rgba(79,142,247,0.15)',c:'#4f8ef7'},{bg:'rgba(34,197,94,0.12)',c:'#22c55e'},{bg:'rgba(245,158,11,0.12)',c:'#f59e0b'},{bg:'rgba(239,68,68,0.12)',c:'#ef4444'},{bg:'rgba(168,85,247,0.12)',c:'#a855f7'}];
function avCol(i){return AV[i%AV.length];}
function initials(n){return (n||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();}
function todayStr(){var n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}
function tomorrowStr(){var n=new Date();n.setDate(n.getDate()+1);return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}
function timeAgo(iso){if(!iso)return '';var diff=Date.now()-new Date(iso).getTime(),mins=Math.floor(diff/60000),hours=Math.floor(mins/60),days=Math.floor(hours/24);if(mins<1)return 'just now';if(mins<60)return mins+'m ago';if(hours<24)return hours+'h ago';return days+'d ago';}
function fmtDate(d){if(!d)return '—';if(d===todayStr())return 'Today';if(d===tomorrowStr())return 'Tomorrow';return new Date(d+'T00:00:00').toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'});}
function fmtTime(t){if(!t||t==='—')return '—';var h=parseInt(t.slice(0,2),10),m=parseInt(t.slice(3,5),10);var ap=h>=12?'PM':'AM',h12=h%12||12;return h12+':'+(m<10?'0':'')+m+' '+ap;}
function seatsLeft(){return Math.max(0,(ride.available_seats||4)-passengers.filter(function(p){return p.status!=='cancelled';}).length);}
function rideExpired(){var t=new Date();t.setHours(0,0,0,0);var r=new Date((ride.dates||'2000-01-01')+'T00:00:00');r.setHours(0,0,0,0);return r<t;}
function rideUrl(withToken){var u=location.origin+location.pathname.replace(/[^/]*$/,'')+'manageride.html?id='+ride.id;if(withToken&&ride.share_token)u+='&token='+ride.share_token;return u;}
function haversine(la1,ln1,la2,ln2){var R=6371,dL=(la2-la1)*Math.PI/180,dG=(ln2-ln1)*Math.PI/180,a=Math.pow(Math.sin(dL/2),2)+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.pow(Math.sin(dG/2),2);return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function isIOS(){return /iPhone|iPad|iPod/i.test(navigator.userAgent);}
function getSaved(){try{return JSON.parse(localStorage.getItem('pf_passenger_v1')||'null');}catch(e){return null;}}
function setSaved(p){try{localStorage.setItem('pf_passenger_v1',JSON.stringify(p));}catch(e){}}

function doShare(url, text){
  if(navigator.share){navigator.share({title:'Pathfynder Ride',text:text,url:url}).catch(function(){});}
  else{if(navigator.clipboard)navigator.clipboard.writeText(url);else{var el=document.createElement('textarea');el.value=url;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);}alert('Link copied!');}
}

/* ── LOAD ── */
async function load(){
  if(!RIDE_ID){showErr('No ride ID in URL.');return;}
  try{
    var r1=await db.from('driver_routines').select('*').eq('id',RIDE_ID).single();
    if(r1.error||!r1.data){showErr('Ride not found.');return;}
    ride=r1.data;
    isDriver=(SHARE_TK&&SHARE_TK===ride.share_token)||(TG_ID&&TG_ID===String(ride.telegram_chat_id||''));
    var r2=await db.from('passenger_requests').select('*').eq('ride_id',RIDE_ID).order('created_at',{ascending:true});
    passengers=r2.data||[];
    render();
  }catch(e){showErr(e.message);}
}

/* ── RENDER ── */
function render(){
  document.getElementById('loading-view').style.display='none';
  var mv=document.getElementById('main-view');
  mv.style.display='flex';

  var st=ride.ride_status||'open';
  var pill=document.getElementById('status-pill');
  pill.textContent=st.charAt(0).toUpperCase()+st.slice(1);
  pill.className='status-pill sp-'+st;
  pill.style.display='';

  if(rideExpired()&&st==='open'){
    mv.innerHTML='<div style="padding:12px">'+expiredHTML()+'</div>';
    return;
  }

  if(isDriver){
    renderDriverView(mv);
  } else if(st==='started'){
    mv.innerHTML='<div class="otw-banner"><div class="otw-title">🚗 Your driver is on the way</div><div class="otw-sub">'+(ride.driver_name||'Driver')+' has started the ride</div></div>'+
      '<div style="padding:12px">'+rideCardHTML()+'</div>';
  } else {
    mv.innerHTML='<div style="padding:12px;display:flex;flex-direction:column;gap:10px">'+rideCardHTML()+publicBelowHTML()+'</div>';
    wirePublicCard();
  }
}

/* ══════════════════════════════════════════
   RIDE CARD — exact searchride.html structure
══════════════════════════════════════════ */
function rideCardHTML(){
  var left=seatsLeft(), total=ride.available_seats||4, taken=total-left;
  var pct=Math.round((taken/total)*100);
  var av=avCol(0);
  var rTime=fmtTime(ride.departure_time);
  var rDate=fmtDate(ride.dates);
  var confs=passengers.filter(function(p){return p.status!=='cancelled';}).length;

  var badges='<span class="badge b-driver">Driver</span>';
  if(confs>0)badges+='<span class="badge b-confirmed">'+confs+' joined</span>';

  // WA contact button
  var waBtn=ride.driver_phone
    ?'<button class="c-btn wa-btn-driver" aria-label="Contact driver"><svg viewBox="0 0 24 24" class="icon-wa"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></button>'
    :'<button class="c-btn" style="opacity:0.25" aria-label="No contact"><svg viewBox="0 0 24 24" class="icon-dim"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></button>';

  var shareBtn='<button class="c-btn main-share-btn" aria-label="Share"><svg viewBox="0 0 24 24" class="icon-share" width="19" height="19"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></button>';

  // Seats bar + passengers joined highlight — always visible (not tapped)
  var seatsSection=
    '<div class="seats-bar-wrap">'+
      '<div class="seats-row-info">'+
        '<span class="seats-count">'+left+' / '+total+' seats left</span>'+
        (confs>0?'<span style="font-size:11px;color:var(--green);font-weight:600">'+confs+' joining</span>':'<span style="font-size:11px;color:var(--text-muted)">No bookings yet</span>')+
      '</div>'+
      '<div class="seats-bar"><div class="seats-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="seats-sub">'+taken+' of '+total+' seats taken</div>'+
    '</div>';

  // Notes — always visible if present
  var notesSection=ride.notes
    ?'<div class="notes-box"><div class="notes-label">Notes from driver</div>'+ride.notes+'</div>'
    :'';

  return '<div class="ride-card" id="main-ride-card">'+
    '<div class="card-top">'+
      '<div class="card-row1">'+
        '<div class="pax-info">'+
          '<div class="av" style="background:'+av.bg+';color:'+av.c+'">'+initials(ride.driver_name)+'</div>'+
          '<div><div class="pax-name">'+(ride.driver_name||'Driver')+'</div><div class="time-ago">Sharing a ride</div></div>'+
        '</div>'+
        '<div class="badges">'+badges+'</div>'+
      '</div>'+
      '<div class="route-strip">'+
        '<div class="route-nodes"><div class="nd-o"></div><div class="nd-line"></div><div class="nd-d"></div></div>'+
        '<div class="route-labels">'+
          '<div><div class="route-place">'+(ride.pickup_label||'—')+'</div><div class="route-sub">Pickup</div></div>'+
          '<div><div class="route-place">'+(ride.dropoff_label||'—')+'</div><div class="route-sub">Dropoff</div></div>'+
        '</div>'+
        '<div class="route-meta"><div class="ride-time">'+rTime+'</div><div class="ride-date">'+rDate+'</div></div>'+
      '</div>'+
      seatsSection+
      notesSection+
    '</div>'+
    '<div class="card-footer">'+
      '<div class="footer-info">'+
        '<div class="f-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'+rDate+'</div>'+

    '</div>'+

}

function wirePublicCard(){
  var waBtn=document.querySelector('.wa-btn-driver');
  if(waBtn)waBtn.addEventListener('click',function(){if(ride.driver_phone)window.open('https://wa.me/'+ride.driver_phone.replace(/\D/g,''),'_blank');});
  var shareBtn=document.querySelector('.main-share-btn');
  if(shareBtn)shareBtn.addEventListener('click',function(){doShare(rideUrl(false),'Join my ride from '+(ride.pickup_label||'')+' to '+(ride.dropoff_label||'')+' on '+fmtDate(ride.dates)+' at '+fmtTime(ride.departure_time));});
}

/* ── PUBLIC BELOW CARD ── */
function publicBelowHTML(){
  var left=seatsLeft(), st=ride.ride_status||'open';
  var full=left===0, closed=st==='closed'||st==='ended'||st==='started';
  if(full)return '<button class="btn btn-full" disabled style="background:var(--amber-dim);border:1px solid rgba(245,158,11,.3);color:var(--amber)">Ride Full</button>';
  if(closed)return '<button class="btn btn-full" disabled style="background:var(--surface2);border:1px solid var(--border);color:var(--text-muted)">Ride Closed</button>';
  return '<button class="btn btn-green btn-full" id="btn-join">Join this ride</button>';
}

/* ══════════════════════════════════════════
   DRIVER VIEW — card + actions + tabs below
══════════════════════════════════════════ */
function buildActionStrip(started, st){
  var shareIcon='<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>';
  var mapIcon='<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>';
  var row1='<button class="btn btn-wa" id="d-share" style="flex:1">'+shareIcon+' Share ride link</button>'+
           '<button class="btn btn-ghost" id="d-maps" style="flex:1">'+mapIcon+' Open in Maps</button>';
  var startBtn='<button class="btn btn-green" id="d-start" style="flex:1">&#9654; Start Ride</button>';
  var endBtn='<button class="btn btn-red" id="d-end" style="flex:1">&#9632; End Ride</button>';
  var closeLabel=st==='closed'?'Reopen Ride':'Close Ride';
  var closeBtn='<button class="btn btn-amber" id="d-close">'+closeLabel+'</button>';
  var row2=(started?endBtn:startBtn+closeBtn);

    '<div class="action-row">'+row1+'</div>'+

}

function renderDriverView(mv){
  var st=ride.ride_status||'open';
  var started=st==='started';
  var confs=passengers.filter(function(p){return p.status!=='cancelled';}).length;

  // Passengers joined highlight banner
  var paxBanner=confs>0
    ?'<div class="pax-joined-banner"><div class="paj-num">'+confs+'</div><div class="paj-text">passenger'+(confs!==1?'s':'')+' joined<br>'+seatsLeft()+' seat'+(seatsLeft()!==1?'s':'')+' remaining</div></div>'
    :'';

  mv.innerHTML=
    // Top section: ride card + passengers banner + action strip
    '<div style="padding:12px;display:flex;flex-direction:column;gap:8px">'+
      rideCardHTML()+
      paxBanner+
      buildActionStrip(started,st)+
    '</div>'+
    // TABS
    '<div class="tabs">'+
      '<div class="tab active" id="tab-pax" onclick="switchTab(\'passengers\')">Passengers <span id="pax-count-lbl"></span></div>'+
      '<div class="tab" id="tab-match" onclick="switchTab(\'matched\')">Matched rides</div>'+
    '</div>'+
    // TAB CONTENT
    '<div id="tab-content" style="flex:1"></div>';

  wirePublicCard();
  document.getElementById('d-share').onclick=function(){doShare(rideUrl(false),'Join my ride from '+(ride.pickup_label||'')+' to '+(ride.dropoff_label||'')+' on '+fmtDate(ride.dates)+' at '+fmtTime(ride.departure_time));};
  var dmaps=document.getElementById('d-maps');
  if(dmaps){dmaps.onclick=function(e){e.preventDefault();e.stopPropagation();openMaps();};}
  var ds=document.getElementById('d-start');if(ds)ds.onclick=function(e){e.preventDefault();startRide();};
  var de=document.getElementById('d-end');if(de)de.onclick=function(e){e.preventDefault();endRide();};
  var dc=document.getElementById('d-close');if(dc)dc.onclick=function(e){e.preventDefault();toggleClose();};

  renderTab();
}

function switchTab(t){
  activeTab=t;
  document.getElementById('tab-pax').classList.toggle('active',t==='passengers');
  document.getElementById('tab-match').classList.toggle('active',t==='matched');
  renderTab();
}
function renderTab(){if(activeTab==='passengers')renderPaxTab();else renderMatchedTab();}

/* ── PASSENGERS TAB ── */
function renderPaxTab(){
  var tc=document.getElementById('tab-content');
  if(!tc)return;
  var conf=passengers.filter(function(p){return p.status!=='cancelled';});
  var lbl=document.getElementById('pax-count-lbl');
  if(lbl)lbl.textContent='('+conf.length+')';

  if(!conf.length){
    tc.innerHTML='<div style="padding:24px;text-align:center;font-size:13px;color:var(--text-muted)">No passengers yet.<br>Share your ride link to get bookings.</div>'+
      '<div style="padding:0 12px 16px"><button class="btn btn-ghost btn-full" id="d-add-btn" style="border-style:dashed;color:var(--accent);border-color:rgba(79,142,247,.3)">+ Add passenger manually</button></div>';

    var waBtn=phone
      ?'<button class="c-btn wa-btn-pax" data-phone="'+phone.replace(/\D/g,'')+'" aria-label="WhatsApp"><svg viewBox="0 0 24 24" class="icon-wa"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></button>'
      :'<button class="c-btn" style="opacity:.3"><svg viewBox="0 0 24 24" class="icon-dim"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></button>';

    // Expand: shows actions + details (like original message in searchride)
    var expId='pax-'+p.id;
    var isExp=expandedMatchId===expId;
    var expHtml=isExp
      ?'<div class="card-detail open">'+
        '<div class="det-label"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>Passenger details</div>'+
        '<div class="msg-box"><p>📍 Pickup: '+pu+'\n🏁 Dropoff: '+dro+'\n🕐 Time: '+pt+(p.is_shift_start?'\n⚡ Shift start time':'')+(phone?'\n📱 '+phone:'')+'</p><div class="msg-fade"></div></div>'+
        '<div style="display:flex;gap:7px;flex-wrap:wrap">'+
          (phone?'<button class="btn btn-wa btn-sm outside-btn" data-phone="'+phone.replace(/\D/g,'')+'" style="flex:1">💬 I\'m outside</button>':'')+
          (!done?'<button class="btn btn-ghost btn-sm pickup-btn" data-pid="'+p.id+'" style="color:var(--green);border-color:rgba(34,197,94,.3);background:var(--green-dim)">✓ Picked up</button>':'')+
          '<button class="btn btn-red btn-sm remove-btn" data-pid="'+p.id+'">Remove</button>'+

            '<div class="av" style="background:'+av.bg+';color:'+av.c+'">'+initials(name)+'</div>'+
            '<div><div class="pax-name">'+name+'</div><div class="time-ago">tap for details</div></div>'+
          '</div>'+
          '<div class="badges">'+badges+'</div>'+
        '</div>'+
        '<div class="route-strip">'+
          '<div class="route-nodes"><div class="nd-o"></div><div class="nd-line"></div><div class="nd-d"></div></div>'+
          '<div class="route-labels">'+
            '<div><div class="route-place">'+pu+'</div><div class="route-sub">Pickup</div></div>'+

          '</div>'+

    card.addEventListener('click',function(e){
      if(e.target.closest('.c-btn')||e.target.closest('.btn'))return;
      var eid='pax-'+card.dataset.paxId;
      expandedMatchId=(expandedMatchId===eid)?null:eid;
      renderPaxTab();
    });
    var waBtn=card.querySelector('.wa-btn-pax');
    if(waBtn)waBtn.addEventListener('click',function(e){e.stopPropagation();window.open('https://wa.me/'+this.dataset.phone+'?text='+encodeURIComponent("I'm outside"),'_blank');});

    if(puBtn)puBtn.addEventListener('click',async function(e){e.stopPropagation();await db.from('passenger_requests').update({status:'picked_up'}).eq('id',this.dataset.pid);var r=await db.from('passenger_requests').select('*').eq('ride_id',RIDE_ID);passengers=r.data||[];renderPaxTab();});

/* ── MATCHED TAB — exact searchride card style ── */
async function renderMatchedTab(){
  var tc=document.getElementById('tab-content');
  if(!tc)return;
  tc.innerHTML='<div style="padding:20px;text-align:center;font-size:12px;color:var(--text-muted)">Finding matched passengers…</div>';

  if(!ride.pickup_lat||!ride.pickup_lng){
    tc.innerHTML='<div style="padding:24px;text-align:center;font-size:13px;color:var(--text-muted)">No location data for this ride — matched passengers unavailable.</div>';
    return;
  }
  try{
    var {data,error}=await db.rpc('find_matched_passengers',{
      p_driver_id:RIDE_ID,
      p_from_lat:ride.pickup_lat,p_from_lng:ride.pickup_lng,
      p_to_lat:ride.dropoff_lat||ride.pickup_lat,
      p_to_lng:ride.dropoff_lng||ride.pickup_lng,
      p_ride_date:ride.dates,p_radius_km:25
    });
    if(error)throw error;
    var matches=data||[];
    if(!matches.length){
      tc.innerHTML='<div style="padding:24px;text-align:center;font-size:13px;color:var(--text-muted)">No matched passengers found near your route for this date.</div>';
      return;
    }

    var shareUrl=rideUrl(false);
    var html='<div class="card-list">';
    matches.forEach(function(m,i){
      var av=avCol(i);
      var name=m.sender_name||'Passenger';
      var phone=m.sender_number?String(m.sender_number):'';
      var waNum=phone.replace(/\D/g,'');
      var rTime=fmtTime(m.pick_up_time);
      var rDate=fmtDate(m.pick_up_date);
      // dist_km from DB — show as X.X km away
      var distKm=m.dist_km!=null?m.dist_km:null;
      var distLabel=distKm!=null?(distKm===0?'Same area':(distKm<1?'< 1 km away':distKm.toFixed(1)+' km away')):'';

      var imp=(m.important_ride||'').toLowerCase();
      var badges='';
      if(imp==='urgent')badges+='<span class="badge b-urgent"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>urgent</span>';
      if(imp==='airport')badges+='<span class="badge b-airport">airport</span>';
      if(distLabel)badges+='<span class="badge b-driver">'+distLabel+'</span>';
      badges+='<span class="badge b-pending">pending</span>';

      var contactMsg='Hi '+name+', I am driving from '+(ride.pickup_label||'')+' to '+(ride.dropoff_label||'')+' on '+fmtDate(ride.dates)+' at '+fmtTime(ride.departure_time)+'. Do you still need a ride? Join here: '+shareUrl;

      // Two buttons: Contact WA + Share link — same c-btn style as searchride
      var waBtnHtml=waNum
        ?'<button class="c-btn match-wa-btn" data-num="'+waNum+'" data-msg="'+encodeURIComponent(contactMsg)+'" aria-label="WhatsApp"><svg viewBox="0 0 24 24" class="icon-wa"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></button>'
        :'<button class="c-btn" style="opacity:.3"><svg viewBox="0 0 24 24" class="icon-dim"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></button>';


      // Original message — always rendered in DOM, toggled open/closed via CSS
      var expId='match-'+i;
      var isExp=expandedMatchId===expId;
      var origMsg=m.original_message||'(no message)';
      var expHtml='<div class="card-detail'+(isExp?' open':'')+'">'+
        '<div class="det-label"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Original message</div>'+
        '<div class="msg-box"><p>'+origMsg.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</p><div class="msg-fade"></div></div>'+
      '</div>';

      html+='<div class="ride-card'+(isExp?' expanded':'')+'" data-match-id="'+expId+'">'+

              '<div><div class="pax-name">'+name+'</div><div class="time-ago">tap to see message</div></div>'+
            '</div>'+

          '</div>'+
          '<div class="route-strip">'+
            '<div class="route-nodes"><div class="nd-o"></div><div class="nd-line"></div><div class="nd-d"></div></div>'+
            '<div class="route-labels">'+
              '<div><div class="route-place">'+(m.pickup_label||'—')+'</div><div class="route-sub">Pickup</div></div>'+
              '<div><div class="route-place">'+(m.dropoff_label||'—')+'</div><div class="route-sub">Dropoff</div></div>'+
            '</div>'+
            '<div class="route-meta"><div class="ride-time">'+rTime+'</div><div class="ride-date">'+rDate+'</div></div>'+
          '</div>'+
        '</div>'+
        '<div class="card-footer">'+
          '<div class="footer-info">'+
            '<div class="f-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'+rDate+'</div>'+
            '<div class="f-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'+rTime+'</div>'+
          '</div>'+
          '<div class="contact-btns">'+waBtnHtml+'</div>'+
        '</div>'+
        expHtml+
      '</div>';
    });
    html+='</div>';
    tc.innerHTML=html;

    // Wire match card clicks — toggle inline without re-rendering (prevents scroll to top)
    tc.querySelectorAll('[data-match-id]').forEach(function(card){
      card.addEventListener('click',function(e){
        if(e.target.closest('.c-btn'))return;
        var mid=card.dataset.matchId;
        var detail=card.querySelector('.card-detail');
        if(!detail)return;
        var opening=!detail.classList.contains('open');
        // Close all others first
        tc.querySelectorAll('.card-detail').forEach(function(d){d.classList.remove('open');});
        tc.querySelectorAll('.ride-card').forEach(function(rc){rc.classList.remove('expanded');});
        if(opening){
          detail.classList.add('open');
          card.classList.add('expanded');
        }
        expandedMatchId=opening?mid:null;
      });
      var waBtn=card.querySelector('.match-wa-btn');
      if(waBtn)waBtn.addEventListener('click',function(e){e.stopPropagation();window.open('https://wa.me/'+this.dataset.num+'?text='+this.dataset.msg,'_blank');});

    });
  }catch(e){
    tc.innerHTML='<div style="padding:16px;font-size:12px;color:var(--red)">Error loading matches: '+e.message+'</div>';
  }
}

async function submitJoin(shiftOn){
  var name=document.getElementById('j-name').value.trim();
  var phone=document.getElementById('j-phone').value.trim();
  var pu=document.getElementById('j-pu').value.trim();
  var doLoc=document.getElementById('j-do').value.trim();
  var time=document.getElementById('j-time').value;
  var err=document.getElementById('j-err');
  if(!name||!phone||!pu||!doLoc){err.textContent='Please fill in all required fields.';err.classList.add('show');return;}
  err.classList.remove('show');
  var btn=document.getElementById('j-submit');btn.disabled=true;btn.textContent='Booking…';
  try{
    var row={ride_id:RIDE_ID,passenger_name_web:name,passenger_phone_web:phone,passenger_wa_id:phone,
      passenger_name:name,pickup_label:pu,dropoff_label:doLoc,
      pickup_lat:geoCache['j-pu']?geoCache['j-pu'].lat:null,pickup_lng:geoCache['j-pu']?geoCache['j-pu'].lng:null,
      dropoff_lat:geoCache['j-do']?geoCache['j-do'].lat:null,dropoff_lng:geoCache['j-do']?geoCache['j-do'].lng:null,
      is_shift_start:shiftOn,status:'pending',platform:'web',date:ride.dates};
    if(time)row.pickup_time=time;
    if(TG_ID)row.telegram_chat_id=TG_ID;
    var {error}=await db.from('passenger_requests').insert(row);
    if(error)throw error;
    setSaved({name:name,phone:phone});
    var r2=await db.from('passenger_requests').select('*').eq('ride_id',RIDE_ID);
    passengers=r2.data||[];
    showConfirmed(name,pu,doLoc,time,shiftOn);

}

/* ── MAPS ── */
function openMaps(){
  var conf=passengers.filter(function(p){
    return p.status!=='cancelled'&&p.pickup_lat&&p.pickup_lng;
  });

  if(!ride.dropoff_lat||!ride.dropoff_lng){
    alert('This ride does not have destination data yet.');
    return;
  }

  function buildURL(dLat,dLng){
    // Origin = driver GPS or ride pickup
    var oLat=dLat!=null?dLat:ride.pickup_lat;
    var oLng=dLng!=null?dLng:ride.pickup_lng;

    // Final destination = ride dropoff (always last stop)
    var dest={lat:ride.dropoff_lat,lng:ride.dropoff_lng};

    // ROUTE ORDER:
    // 1. Sort passenger PICKUPS by distance from driver (closest first)
    // 2. Then sort passenger DROPOFFS by distance from last pickup (closest first)
    // 3. Final stop = ride destination (driver's dropoff)
    var pickups=conf.map(function(p){
      return {lat:p.pickup_lat,lng:p.pickup_lng,id:p.id,
              dLat:p.dropoff_lat,dLng:p.dropoff_lng};
    });
    pickups.sort(function(a,b){
      return haversine(oLat,oLng,a.lat,a.lng)-haversine(oLat,oLng,b.lat,b.lng);
    });

    // Dropoffs sorted from last pickup position
    var lastLat=pickups.length?pickups[pickups.length-1].lat:oLat;
    var lastLng=pickups.length?pickups[pickups.length-1].lng:oLng;
    var dropoffs=conf
      .filter(function(p){return p.dropoff_lat&&p.dropoff_lng;})
      .map(function(p){return {lat:p.dropoff_lat,lng:p.dropoff_lng};});
    dropoffs.sort(function(a,b){
      return haversine(lastLat,lastLng,a.lat,a.lng)-haversine(lastLat,lastLng,b.lat,b.lng);
    });

    // All waypoints: pickups first, then dropoffs, then ride dest is the final destination
    var wpts=pickups.map(function(p){return {lat:p.lat,lng:p.lng};})
               .concat(dropoffs);

    return {oLat:oLat,oLng:oLng,dest:dest,wpts:wpts};
  }

  function openURL(dLat,dLng){
    var r=buildURL(dLat,dLng);
    var url;
    if(isIOS()){
      url='http://maps.apple.com/?saddr='+r.oLat+','+r.oLng+'&dirflg=d';
      if(r.wpts.length){
        url+='&daddr='+r.wpts.map(function(w){return w.lat+','+w.lng;}).join('+to:')+'+to:'+r.dest.lat+','+r.dest.lng;
      } else {
        url+='&daddr='+r.dest.lat+','+r.dest.lng;
      }
    } else {
      url='https://www.google.com/maps/dir/?api=1'+
        '&origin='+r.oLat+','+r.oLng+
        '&destination='+r.dest.lat+','+r.dest.lng+
        '&travelmode=driving';
      if(r.wpts.length){
        url+='&waypoints='+r.wpts.map(function(w){return w.lat+','+w.lng;}).join('|');
      }
    }
    // Open in new tab — avoids popup blocking and keeps the app open
    var a=document.createElement('a');
    a.href=url;
    a.target='_blank';
    a.rel='noopener';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      function(pos){openURL(pos.coords.latitude,pos.coords.longitude);},
      function(){openURL(null,null);},
      {timeout:6000,enableHighAccuracy:true}
    );
  } else {
    openURL(null,null);
  }
}

/* ── MAPBOX LOCATION ── */
function setupLoc(inputId,sugId,tagId,tagTxtId,cacheKey){
  var input=document.getElementById(inputId),sug=document.getElementById(sugId);
  if(!input||!sug)return;
  input.addEventListener('input',function(){
    geoCache[cacheKey]=null;input.classList.remove('confirmed');
    var tag=document.getElementById(tagId);if(tag)tag.classList.remove('show');
    clearTimeout(geoTimers[cacheKey]);
    var q=input.value.trim();
    if(q.length<3){sug.classList.remove('show');sug.innerHTML='';return;}
    sug.innerHTML='<div class="suggestion-item loading-item">Searching…</div>';sug.classList.add('show');
    if(!window._SB_SID)window._SB_SID='pf-'+Date.now();
    var sid=window._SB_SID;
    geoTimers[cacheKey]=setTimeout(function(){
      fetch('https://api.mapbox.com/search/searchbox/v1/suggest?q='+encodeURIComponent(q)+'&access_token='+MAPBOX_TOKEN+'&session_token='+sid+'&language=en&limit=6&country=CA,US&proximity=-79.3832,43.6532')
        .then(function(r){return r.json();})
        .then(function(d){
          sug.innerHTML='';var items=(d&&d.suggestions)||[];
          if(!items.length){sug.innerHTML='<div class="suggestion-item loading-item">No results</div>';return;}
          items.forEach(function(item){
            var name=item.name||'',ctx=item.place_formatted||item.full_address||'';
            if(ctx.toLowerCase().startsWith(name.toLowerCase()+', '))ctx=ctx.slice(name.length+2);
            var el=document.createElement('div');el.className='suggestion-item';
            el.innerHTML='<div class="sug-main">'+name+'</div>'+(ctx?'<div class="sug-ctx">'+ctx+'</div>':'');
            el.addEventListener('click',function(){
              input.value=name+(ctx?', '+ctx:'');sug.classList.remove('show');sug.innerHTML='';
              fetch('https://api.mapbox.com/search/searchbox/v1/retrieve/'+item.mapbox_id+'?access_token='+MAPBOX_TOKEN+'&session_token='+sid)
                .then(function(r){return r.json();})
                .then(function(rd){
                  var f=rd.features&&rd.features[0],c=f&&f.geometry&&f.geometry.coordinates;
                  if(!c)return;
                  geoCache[cacheKey]={lat:c[1],lng:c[0],label:name+(ctx?', '+ctx:'')};
                  input.classList.add('confirmed');
                  var t2=document.getElementById(tagId);if(t2)t2.classList.add('show');
                  var tt=document.getElementById(tagTxtId);if(tt)tt.textContent=name;
                });
            });
            sug.appendChild(el);
          });
          sug.classList.add('show');
        })
        .catch(function(){sug.innerHTML='<div class="suggestion-item loading-item">Connection error</div>';});
    },400);
  });
  document.addEventListener('click',function(e){if(!input.contains(e.target)&&!sug.contains(e.target))sug.classList.remove('show');});
}
