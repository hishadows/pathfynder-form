<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathfynder — Request a Ride</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e1117; --surface: #161b27; --surface2: #1e2535; --border: #2a3348;
    --accent: #4f8ef7; --accent-dim: rgba(79,142,247,0.12); --accent-hover: #6ba3ff;
    --red: #ef4444; --text: #e8edf5; --text-dim: #8a95a8; --text-muted: #4e5a6e;
    --radius: 12px; --font-display: 'Space Grotesk', sans-serif; --font-body: 'Inter', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 48px; }
  .header { width: 100%; max-width: 480px; margin-bottom: 28px; display: flex; align-items: center; gap: 12px; }
  .logo { width: 38px; height: 38px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo svg { width: 20px; height: 20px; }
  .brand { font-family: var(--font-display); font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .brand span { color: var(--accent); }
  .user-pill { margin-left: auto; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px 5px 8px; display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--text-dim); }
  .user-avatar { width: 22px; height: 22px; border-radius: 50%; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--accent); }
  .card { width: 100%; max-width: 480px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .role-toggle { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--border); }
  .role-btn { padding: 16px; background: none; border: none; cursor: pointer; font-family: var(--font-body); font-size: 14px; font-weight: 500; color: var(--text-dim); display: flex; flex-direction: column; align-items: center; gap: 6px; transition: all 0.18s; position: relative; }
  .role-btn .role-icon { font-size: 22px; }
  .role-btn.active { color: var(--accent); background: var(--accent-dim); }
  .role-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: var(--accent); }
  .role-btn:not(.active):hover { background: var(--surface2); color: var(--text); }
  .form-body { padding: 24px; display: flex; flex-direction: column; gap: 18px; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; color: var(--text-muted); text-transform: uppercase; margin-bottom: -8px; }
  .field { display: flex; flex-direction: column; gap: 6px; position: relative; }
  .field label { font-size: 13px; font-weight: 500; color: var(--text-dim); }
  .input-wrap { position: relative; }
  .input-wrap input {
    width: 100%; padding: 11px 14px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-family: var(--font-body); font-size: 14px;
    outline: none; transition: border-color 0.15s;
  }
  .input-wrap input:focus { border-color: var(--accent); }
  .input-wrap input::placeholder { color: var(--text-muted); }
  .input-wrap input.confirmed { border-color: #22c55e; }

  /* Dropdown */
  .suggestions {
    display: none; position: absolute; left: 0; right: 0; top: calc(100% + 4px);
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .suggestions.show { display: block; }
  .suggestion-item {
    padding: 11px 14px; font-size: 13px; color: var(--text-dim);
    cursor: pointer; display: flex; align-items: flex-start; gap: 10px;
    border-bottom: 1px solid var(--border); transition: background 0.12s;
    line-height: 1.4;
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: var(--accent-dim); color: var(--text); }
  .suggestion-item.loading-item { cursor: default; color: var(--text-muted); font-style: italic; }
  .suggestion-item.loading-item:hover { background: none; }
  .suggestion-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .suggestion-name { font-weight: 500; color: var(--text); }
  .suggestion-detail { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* Confirmed tag */
  .confirmed-tag {
    display: none; align-items: center; gap: 7px; padding: 7px 12px; border-radius: 8px;
    font-size: 12px; color: #22c55e; background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2);
  }
  .confirmed-tag.show { display: flex; }
  .confirmed-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .seats-row { display: flex; gap: 8px; }
  .seat-btn { flex: 1; padding: 9px 4px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text-dim); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; text-align: center; }
  .seat-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .seat-btn:hover:not(.active) { border-color: var(--text-muted); color: var(--text); }
  .submit-btn { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: var(--radius); color: #fff; font-family: var(--font-body); font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 4px; }
  .submit-btn:hover { background: var(--accent-hover); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
  .submit-btn.loading .spinner { display: block; }
  .submit-btn.loading .btn-text { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-banner { display: none; padding: 10px 14px; border-radius: 8px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: var(--red); font-size: 13px; line-height: 1.5; }
  .error-banner.show { display: block; }
  .success-screen { display: none; flex-direction: column; align-items: center; gap: 16px; padding: 40px 24px; text-align: center; }
  .success-screen.show { display: flex; }
  .success-icon { width: 64px; height: 64px; border-radius: 50%; background: rgba(34,197,94,0.12); border: 2px solid rgba(34,197,94,0.3); display: flex; align-items: center; justify-content: center; font-size: 28px; }
  .success-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; }
  .success-sub { font-size: 14px; color: var(--text-dim); line-height: 1.6; max-width: 300px; }
  .warn-box { width: 100%; max-width: 480px; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: var(--radius); padding: 14px 16px; font-size: 13px; color: #f87171; line-height: 1.6; margin-bottom: 16px; display: none; }
  .warn-box.show { display: block; }
  input[type="date"]::-webkit-calendar-picker-indicator,
  input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
  @media (max-width: 520px) { .form-body { padding: 16px; } .row { grid-template-columns: 1fr; } }
  input[type="date"], input[type="time"] { min-width: 0; width: 100%; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
      <circle cx="12" cy="9" r="2.5"/>
    </svg>
  </div>
  <div class="brand">Path<span>fynder</span></div>
  <div class="user-pill" id="userPill" style="display:none">
    <div class="user-avatar" id="userInitial">?</div>
    <span id="userName">-</span>
  </div>
</div>

<div class="warn-box" id="warnBox">
  This form should be opened from the Pathfynder bot on Telegram. Your identity could not be detected.
</div>

<div class="card">
  <div class="role-toggle">
    <button class="role-btn active" id="btnPassenger" data-role="passenger">
      <span class="role-icon">🙋</span>I need a ride
    </button>
    <button class="role-btn" id="btnDriver" data-role="driver">
      <span class="role-icon">🚗</span>I'm offering a ride
    </button>
  </div>

  <form class="form-body" id="mainForm">
    <div class="section-label">Route</div>

    <!-- Pickup -->
    <div class="field">
      <label for="pickupInput">From</label>
      <div class="input-wrap">
        <input type="text" id="pickupInput" placeholder="Start typing a location..." autocomplete="off">
        <div class="suggestions" id="pickupSuggestions"></div>
      </div>
      <div class="confirmed-tag" id="pickupConfirmed">
        <div class="confirmed-dot"></div>
        <span id="pickupConfirmedText"></span>
      </div>
    </div>

    <!-- Dropoff -->
    <div class="field">
      <label for="dropoffInput">To</label>
      <div class="input-wrap">
        <input type="text" id="dropoffInput" placeholder="Start typing a location..." autocomplete="off">
        <div class="suggestions" id="dropoffSuggestions"></div>
      </div>
      <div class="confirmed-tag" id="dropoffConfirmed">
        <div class="confirmed-dot"></div>
        <span id="dropoffConfirmedText"></span>
      </div>
    </div>

    <div class="section-label">Schedule</div>
    <div class="row">
      <div class="field">
        <label for="dateInput">Date</label>
        <div class="input-wrap"><input type="date" id="dateInput" required></div>
      </div>
      <div class="field">
        <label for="timeInput" id="timeLabel">Time</label>
        <div class="input-wrap"><input type="time" id="timeInput" required></div>
      </div>
    </div>

    <div class="field" id="seatsField" style="display:none">
      <label>Available seats</label>
      <div class="seats-row">
        <button type="button" class="seat-btn" data-seat="1">1</button>
        <button type="button" class="seat-btn active" data-seat="2">2</button>
        <button type="button" class="seat-btn" data-seat="3">3</button>
        <button type="button" class="seat-btn" data-seat="4">4</button>
        <button type="button" class="seat-btn" data-seat="5">5</button>
      </div>
    </div>

    <div class="error-banner" id="errorBanner"></div>
    <button type="submit" class="submit-btn" id="submitBtn">
      <div class="spinner"></div>
      <span class="btn-text">Submit request</span>
    </button>
  </form>

  <div class="success-screen" id="successScreen">
    <div class="success-icon">✓</div>
    <div class="success-title" id="successTitle">Request received!</div>
    <div class="success-sub" id="successSub">We'll notify you on Telegram as soon as we find a match.</div>
  </div>
</div>

<script>
var SUPABASE_URL = 'https://omussxfyrztjahbdrrpi.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tdXNzeGZ5cnp0amFoYmRycnBpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MjI1NjAsImV4cCI6MjA5NTk5ODU2MH0.ySigym7uOaFIQm01nErPfn4kE6j4MOVKoNntt_Mosak';

var params   = new URLSearchParams(location.search);
var chatId   = params.get('chat_id') || '';
var userName = params.get('name') || '';
var role         = 'passenger';
var selectedSeat = 2;
var geoCache     = { pickup: null, dropoff: null };
var geoTimers    = { pickup: null, dropoff: null };

// Init
var today = new Date().toISOString().split('T')[0];
document.getElementById('dateInput').min   = today;
document.getElementById('dateInput').value = today;

if (userName) {
  document.getElementById('userName').textContent    = userName;
  document.getElementById('userInitial').textContent = userName[0].toUpperCase();
  document.getElementById('userPill').style.display  = 'flex';
}
if (!chatId) { document.getElementById('warnBox').classList.add('show'); }

// Role buttons
document.getElementById('btnPassenger').addEventListener('click', function() { setRole('passenger'); });
document.getElementById('btnDriver').addEventListener('click', function() { setRole('driver'); });

function setRole(r) {
  role = r;
  document.getElementById('btnPassenger').classList.toggle('active', r === 'passenger');
  document.getElementById('btnDriver').classList.toggle('active', r === 'driver');
  document.getElementById('seatsField').style.display = r === 'driver' ? '' : 'none';
  document.getElementById('timeLabel').textContent = r === 'driver' ? 'Departure time' : 'Time';
  document.getElementById('submitBtn').querySelector('.btn-text').textContent =
    r === 'passenger' ? 'Submit request' : 'Register route';
}

// Seat buttons
var seatBtns = document.querySelectorAll('.seat-btn');
seatBtns.forEach(function(btn) {
  btn.addEventListener('click', function() {
    selectedSeat = parseInt(btn.getAttribute('data-seat'));
    seatBtns.forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
  });
});

// Location inputs
setupLocationField('pickup');
setupLocationField('dropoff');

function setupLocationField(which) {
  var input       = document.getElementById(which + 'Input');
  var suggestions = document.getElementById(which + 'Suggestions');

  input.addEventListener('input', function() {
    geoCache[which] = null;
    document.getElementById(which + 'Confirmed').classList.remove('show');
    input.classList.remove('confirmed');
    clearTimeout(geoTimers[which]);
    var query = input.value.trim();
    if (query.length < 3) { suggestions.classList.remove('show'); suggestions.innerHTML = ''; return; }
    suggestions.innerHTML = '<div class="suggestion-item loading-item"><span class="suggestion-icon">⏳</span>Searching...</div>';
    suggestions.classList.add('show');
    geoTimers[which] = setTimeout(function() { fetchSuggestions(which, query); }, 500);
  });

  // Close dropdown when clicking outside
  document.addEventListener('click', function(e) {
    if (!input.contains(e.target) && !suggestions.contains(e.target)) {
      suggestions.classList.remove('show');
    }
  });
}

function fetchSuggestions(which, query) {
  var suggestions = document.getElementById(which + 'Suggestions');
  var url = 'https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(query) + '&format=json&limit=5&addressdetails=1';

  fetch(url, { headers: { 'User-Agent': 'Pathfynder/1.0' } })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    suggestions.innerHTML = '';
    if (!data || !data.length) {
      suggestions.innerHTML = '<div class="suggestion-item loading-item"><span class="suggestion-icon">❌</span>No results — try a different name</div>';
      return;
    }
    data.forEach(function(place) {
      var parts = place.display_name.split(',');
      var name   = parts.slice(0, 2).join(',').trim();
      var detail = parts.slice(2, 4).join(',').trim();
      var icon   = getPlaceIcon(place.type || place.class);

      var item = document.createElement('div');
      item.className = 'suggestion-item';
      item.innerHTML =
        '<span class="suggestion-icon">' + icon + '</span>' +
        '<div><div class="suggestion-name">' + name + '</div>' +
        (detail ? '<div class="suggestion-detail">' + detail + '</div>' : '') +
        '</div>';

      item.addEventListener('click', function() {
        selectPlace(which, place, name);
      });

      suggestions.appendChild(item);
    });
    suggestions.classList.add('show');
  })
  .catch(function() {
    suggestions.innerHTML = '<div class="suggestion-item loading-item"><span class="suggestion-icon">⚠️</span>Connection error</div>';
  });
}

function selectPlace(which, place, displayName) {
  var input       = document.getElementById(which + 'Input');
  var suggestions = document.getElementById(which + 'Suggestions');
  var confirmed   = document.getElementById(which + 'Confirmed');
  var confirmedTx = document.getElementById(which + 'ConfirmedText');

  geoCache[which] = {
    lat:   parseFloat(place.lat),
    lng:   parseFloat(place.lon),
    label: place.display_name.split(',').slice(0, 3).join(',').trim()
  };

  input.value = displayName;
  input.classList.add('confirmed');
  suggestions.classList.remove('show');
  suggestions.innerHTML = '';
  confirmedTx.textContent = geoCache[which].label;
  confirmed.classList.add('show');
}

function getPlaceIcon(type) {
  var icons = {
    city: '🏙️', town: '🏘️', village: '🏡', suburb: '🏘️',
    road: '🛣️', street: '🛣️', highway: '🛣️',
    station: '🚉', airport: '✈️', bus_stop: '🚌',
    hospital: '🏥', school: '🏫', university: '🎓',
    restaurant: '🍽️', hotel: '🏨', park: '🌳',
    residential: '🏠', building: '🏢'
  };
  return icons[type] || '📍';
}

// Submit
document.getElementById('mainForm').addEventListener('submit', function(e) {
  e.preventDefault();
  hideError();

  if (!geoCache.pickup || !geoCache.dropoff) {
    showError('Please select both pickup and dropoff locations from the dropdown.');
    return;
  }

  var dateVal = document.getElementById('dateInput').value;
  var timeVal = document.getElementById('timeInput').value;
  if (!dateVal || !timeVal) { showError('Please fill in date and time.'); return; }

  var dtLocal  = dateVal + 'T' + timeVal + ':00';
  var tzOffset = new Date().getTimezoneOffset();
  var sign     = tzOffset <= 0 ? '+' : '-';
  var absOff   = Math.abs(tzOffset);
  var hh       = String(Math.floor(absOff / 60)).padStart(2, '0');
  var mm       = String(absOff % 60).padStart(2, '0');
  var dtISO    = dtLocal + sign + hh + ':' + mm;

  function wkt(lat, lng) { return 'POINT(' + lng + ' ' + lat + ')'; }

  setLoading(true);

  var table, payload;
  var table, payload;
  if (role === 'passenger') {
    table = 'passenger_requests';
    payload = {
      telegram_chat_id:   chatId || null,
      passenger_name:     userName || null,
      pickup_lat:         geoCache.pickup.lat,
      pickup_lng:         geoCache.pickup.lng,
      pickup_label:       geoCache.pickup.label,
      dropoff_lat:        geoCache.dropoff.lat,
      dropoff_lng:        geoCache.dropoff.lng,
      dropoff_label:      geoCache.dropoff.label,
      requested_datetime: dtISO,
      date:               dateVal,
      time:               timeVal + ':00+00',
      source_geo:         wkt(geoCache.pickup.lat,  geoCache.pickup.lng),
      destination_geo:    wkt(geoCache.dropoff.lat, geoCache.dropoff.lng),
      platform:           'telegram',
      status:             'pending'
    };
  } else {
    table = 'driver_routines';
    payload = {
      telegram_chat_id:   chatId || null,
      driver_name:        userName || null,
      pickup_lat:         geoCache.pickup.lat,
      pickup_lng:         geoCache.pickup.lng,
      pickup_label:       geoCache.pickup.label,
      dropoff_lat:        geoCache.dropoff.lat,
      dropoff_lng:        geoCache.dropoff.lng,
      dropoff_label:      geoCache.dropoff.label,
      departure_time:     timeVal + ':00',
      departure_datetime: dtISO,
      dates:              dateVal,
      available_seats:    selectedSeat,
      source_geo:         wkt(geoCache.pickup.lat,  geoCache.pickup.lng),
      destination_geo:    wkt(geoCache.dropoff.lat, geoCache.dropoff.lng),
      platform:           'telegram',
      is_active:          true
    };
  }

  fetch(SUPABASE_URL + '/rest/v1/' + table, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json', 'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY, 'Prefer': 'return=minimal'
    },
    body: JSON.stringify(payload)
  })
  .then(function(res) {
    if (!res.ok) { return res.json().then(function(err) { throw new Error(err.message || err.details || 'HTTP ' + res.status); }); }
    document.getElementById('mainForm').style.display = 'none';
    document.getElementById('successScreen').classList.add('show');
    if (role === 'driver') {
      document.getElementById('successTitle').textContent = 'Route registered!';
      document.getElementById('successSub').textContent = "Your route is live. We'll message you if there's match";
    }
  })
  .catch(function(err) { showError('Something went wrong: ' + err.message); })
  .finally(function() { setLoading(false); });
});

function setLoading(on) {
  var btn = document.getElementById('submitBtn');
  btn.disabled = on;
  btn.classList.toggle('loading', on);
}
function showError(msg) {
  var el = document.getElementById('errorBanner');
  el.textContent = msg;
  el.classList.add('show');
}
function hideError() { document.getElementById('errorBanner').classList.remove('show'); }
</script>
</body>
</html>
