<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathfynder — Request a Ride</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script id="search-js" defer src="https://api.mapbox.com/search-js/v1.0.0/web.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #0e1117; --surface: #161b27; --surface2: #1e2535; --border: #2a3348; --accent: #4f8ef7; --accent-dim: rgba(79,142,247,0.12); --accent-hover: #6ba3ff; --red: #ef4444; --text: #e8edf5; --text-dim: #8a95a8; --text-muted: #4e5a6e; --radius: 12px; --font-display: 'Space Grotesk', sans-serif; --font-body: 'Inter', sans-serif; }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 48px; overflow-x: hidden; }
.card { width: 100%; max-width: 480px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: visible; }
.role-toggle { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--border); }
.role-btn { padding: 16px 8px; background: none; border: none; cursor: pointer; font-family: var(--font-body); font-size: 14px; font-weight: 500; color: var(--text-dim); display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; }
.role-btn.active { color: var(--accent); background: var(--accent-dim); }
.form-body { padding: 24px; display: flex; flex-direction: column; gap: 18px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 13px; font-weight: 500; color: var(--text-dim); }
/* Mapbox Styling to match your theme */
mapbox-search-box { width: 100%; }
mapbox-search-box::part(input) { width: 100%; padding: 11px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font-body); font-size: 16px; outline: none; }
mapbox-search-box::part(input):focus { border-color: var(--accent); }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.input-wrap input { width: 100%; padding: 11px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 16px; }
.submit-btn { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: var(--radius); color: #fff; font-weight: 600; cursor: pointer; }
.error-banner { display: none; padding: 10px; margin-top: 10px; border-radius: 8px; background: rgba(239,68,68,0.1); color: var(--red); font-size: 13px; }
.error-banner.show { display: block; }
</style>
</head>

<body>

<div class="card">
  <div class="role-toggle">
    <button class="role-btn active" id="btnPassenger" type="button">🙋 I need a ride</button>
    <button class="role-btn" id="btnDriver" type="button">🚗 I'm offering a ride</button>
  </div>

  <form class="form-body" id="mainForm">
    <div class="field">
      <label>From</label>
      <mapbox-search-box id="pickup-search" access-token="pk.eyJ1IjoicHJhbmF5MDA3MSIsImEiOiJjbXE2M29yZTYwYnNkMnpvcnQ3cTdtcnVhIn0.eUnsJguXqX48RGUxfDyD5g" placeholder="Start typing a location..."></mapbox-search-box>         // token
    </div>

    <div class="field">
      <label>To</label>
      <mapbox-search-box id="dropoff-search" access-token="pk.eyJ1IjoicHJhbmF5MDA3MSIsImEiOiJjbXE2M29yZTYwYnNkMnpvcnQ3cTdtcnVhIn0.eUnsJguXqX48RGUxfDyD5g" placeholder="Start typing a location..."></mapbox-search-box>
    </div>

    <div class="row">
      <div class="field"><label>Date</label><input type="date" id="dateInput" required></div>
      <div class="field"><label>Time</label><input type="time" id="timeInput" required></div>
    </div>

    <div class="error-banner" id="errorBanner"></div>
    <button type="submit" class="submit-btn" id="submitBtn">Submit request</button>
  </form>
</div>

<script>
var N8N_WEBHOOK_URL = 'https://pathy.dpdns.org/webhook/telegram-ride-submit';
var geoCache = { pickup: null, dropoff: null };
var tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

// Mapbox Listeners
function setupSearch(id, key) {
  const el = document.getElementById(id);
  el.addEventListener('retrieve', (e) => {
    const f = e.detail.features[0];
    geoCache[key] = { lat: f.geometry.coordinates[1], lng: f.geometry.coordinates[0], label: f.properties.full_address };
  });
}
setupSearch('pickup-search', 'pickup');
setupSearch('dropoff-search', 'dropoff');

document.getElementById('mainForm').addEventListener('submit', function(e) {
  e.preventDefault();
  if (!geoCache.pickup || !geoCache.dropoff) {
    document.getElementById('errorBanner').textContent = "Please select both locations from the dropdown.";
    document.getElementById('errorBanner').classList.add('show');
    return;
  }
  
  var payload = {
    pickup_lat: geoCache.pickup.lat,
    pickup_lng: geoCache.pickup.lng,
    pickup_label: geoCache.pickup.label,
    dropoff_lat: geoCache.dropoff.lat,
    dropoff_lng: geoCache.dropoff.lng,
    dropoff_label: geoCache.dropoff.label,
    date: document.getElementById('dateInput').value,
    time: document.getElementById('timeInput').value
  };

  fetch(N8N_WEBHOOK_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) })
  .then(() => { alert('Success!'); })
  .catch((err) => { alert('Error: ' + err.message); });
});
</script>
</body>
</html>
