<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pathfynder — Ride</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0e1117;
  --surface: #161b27;
  --surface2: #1e2535;
  --border: #2a3348;
  --accent: #4f8ef7;
  --accent-dim: rgba(79,142,247,0.12);
  --accent-hover: #6ba3ff;
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.10);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.12);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.10);
  --purple: #a855f7;
  --purple-dim: rgba(168,85,247,0.10);
  --text: #e8edf5;
  --text-dim: #8a95a8;
  --text-muted: #4e5a6e;
  --radius: 12px;
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0 60px;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  width: 100%;
  max-width: 520px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  width: 36px;
  height: 36px;
  background: var(--accent);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.logo svg { width: 20px; height: 20px; }

.brand {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.brand span { color: var(--accent); }

.status-pill {
  margin-left: auto;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  display: none;
}
.status-open    { background: var(--green-dim); border: 1px solid rgba(34,197,94,.25); color: var(--green); }
.status-started { background: var(--accent-dim); border: 1px solid rgba(79,142,247,.25); color: var(--accent); }
.status-closed  { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); }
.status-ended   { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); }

/* ── CONTENT WRAPPER ── */
.content {
  width: 100%;
  max-width: 520px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── CARDS ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.card-body { padding: 16px; }
.card-footer {
  border-top: 1px solid var(--border);
  padding: 10px 14px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* ── ROUTE STRIP ── */
.route-strip {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 10px 0 6px;
}
.nd-o { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid var(--text-muted); flex-shrink: 0; }
.nd-line { flex: 1; height: 1.5px; background: repeating-linear-gradient(to right, var(--accent) 0, var(--accent) 4px, transparent 4px, transparent 8px); opacity: .5; }
.nd-d { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.route-labels { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; }

/* ── CHIPS ── */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-dim);
  white-space: nowrap;
}
.chip.green  { background: var(--green-dim); border-color: rgba(34,197,94,.25); color: var(--green); }
.chip.amber  { background: var(--amber-dim); border-color: rgba(245,158,11,.25); color: var(--amber); }
.chip.blue   { background: var(--accent-dim); border-color: rgba(79,142,247,.25); color: var(--accent); }
.chip.red    { background: var(--red-dim); border-color: rgba(239,68,68,.25); color: var(--red); }
.meta-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }

/* ── SEATS BAR ── */
.seats-bar-wrap { margin: 10px 0 4px; }
.seats-bar { background: var(--surface2); border-radius: 3px; height: 5px; overflow: hidden; }
.seats-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }
.seats-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border-radius: 9px;
  font-family: var(--font-body);
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: opacity .15s;
  white-space: nowrap;
  text-decoration: none;
}
.btn:active { opacity: .8; }
.btn-primary  { background: var(--accent); color: #fff; padding: 0 16px; height: 40px; font-size: 13px; }
.btn-green    { background: var(--green); color: #fff; padding: 0 16px; height: 40px; font-size: 13px; }
.btn-ghost    { background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); padding: 0 14px; height: 40px; font-size: 12px; }
.btn-amber    { background: var(--amber-dim); border: 1px solid rgba(245,158,11,.3); color: var(--amber); padding: 0 12px; height: 36px; font-size: 12px; }
.btn-red      { background: var(--red-dim); border: 1px solid rgba(239,68,68,.25); color: var(--red); padding: 0 10px; height: 32px; font-size: 11px; }
.btn-wa       { background: rgba(37,211,102,.1); border: 1px solid rgba(37,211,102,.25); color: #25D366; padding: 0 14px; height: 40px; font-size: 12px; }
.btn-icon     { width: 40px; height: 40px; padding: 0; flex-shrink: 0; }
.btn-sm       { height: 32px; font-size: 11px; padding: 0 10px; }
.btn-full     { width: 100%; height: 44px; font-size: 14px; margin-top: 4px; }
.btn:disabled { opacity: .4; cursor: default; }

/* ── FORM FIELDS (same style as index.html) ── */
.field { display: flex; flex-direction: column; gap: 6px; position: relative; }
.field label { font-size: 13px; font-weight: 500; color: var(--text-dim); }
.input-wrap { position: relative; }
.input-wrap input, .field-input {
  width: 100%;
  padding: 11px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  outline: none;
  transition: border-color .15s;
  -webkit-appearance: none;
}
.input-wrap input:focus, .field-input:focus { border-color: var(--accent); }
.input-wrap input::placeholder, .field-input::placeholder { color: var(--text-muted); }
.input-wrap input.confirmed { border-color: var(--green); }
input[type="time"] { cursor: pointer; }
input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }

/* ── SUGGESTIONS (same as index.html) ── */
.suggestions {
  display: none;
  position: absolute;
  left: 0; right: 0;
  top: calc(100% + 4px);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  z-index: 9999;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
}
.suggestions.show { display: block; }
.suggestion-item {
  padding: 11px 14px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.suggestion-item:last-child { border-bottom: none; }
.suggestion-item:hover { background: var(--surface); }
.suggestion-item.loading-item { cursor: default; font-size: 12px; color: var(--text-muted); font-style: italic; }
.sug-main { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sug-ctx  { font-size: 11px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── CONFIRMED TAG (same as index.html) ── */
.confirmed-tag {
  display: none;
  align-items: center;
  gap: 7px;
  padding: 7px 12px;
  border-radius: 8px;
  font-size: 12px;
  color: var(--green);
  background: rgba(34,197,94,0.08);
  border: 1px solid rgba(34,197,94,0.2);
}
.confirmed-tag.show { display: flex; }
.confirmed-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

/* ── TOGGLE ── */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 9px;
  cursor: pointer;
}
.toggle-label { font-size: 13px; font-weight: 500; color: var(--text); }
.toggle-sub   { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.toggle-track { width: 36px; height: 20px; border-radius: 10px; background: var(--border); position: relative; transition: background .2s; flex-shrink: 0; }
.toggle-track.on { background: var(--accent); }
.toggle-thumb { width: 16px; height: 16px; border-radius: 50%; background: #fff; position: absolute; top: 2px; left: 2px; transition: left .2s; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
.toggle-track.on .toggle-thumb { left: 18px; }

/* ── NOTE BOX ── */
.note-box {
  background: var(--accent-dim);
  border: 1px solid rgba(79,142,247,.2);
  border-radius: 9px;
  padding: 10px 13px;
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.55;
}
.note-box b { color: var(--accent); }

/* ── AVATAR ── */
.av {
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-family: var(--font-display);
  flex-shrink: 0;
}

/* ── PASSENGER CARD ── */
.pax-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px;
  margin-bottom: 8px;
}
.pax-card.picked-up { opacity: .5; border-style: dashed; }
.pax-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.pax-info { flex: 1; min-width: 0; }
.pax-name  { font-size: 13px; font-weight: 600; color: var(--text); }
.pax-phone { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.pax-route { font-size: 11px; color: var(--text-dim); margin: 5px 0 8px; line-height: 1.5; }
.pax-actions { display: flex; gap: 6px; flex-wrap: wrap; }

/* ── MATCH CARD ── */
.match-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 8px;
}
.match-header { display: flex; align-items: center; gap: 9px; margin-bottom: 5px; }
.dist-badge {
  margin-left: auto;
  background: var(--accent-dim);
  border: 1px solid rgba(79,142,247,.25);
  border-radius: 5px;
  padding: 2px 7px;
  font-size: 10px;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
}
.match-route { font-size: 11px; color: var(--text-dim); margin-bottom: 8px; }
.match-actions { display: flex; gap: 6px; }

/* ── TABS ── */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  width: 100%;
  max-width: 520px;
  background: var(--surface);
  position: sticky;
  top: 61px;
  z-index: 90;
}
.tab {
  flex: 1;
  padding: 12px 8px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  text-align: center;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .15s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── STATUS SCREENS ── */
.status-screen { text-align: center; padding: 36px 20px; }
.status-icon  { font-size: 44px; margin-bottom: 14px; }
.status-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.status-sub   { font-size: 13px; color: var(--text-dim); line-height: 1.6; }

/* ── ON THE WAY BANNER ── */
.otw-banner {
  background: var(--green-dim);
  border: 1px solid rgba(34,197,94,.25);
  border-radius: 10px;
  padding: 14px 16px;
  text-align: center;
}
.otw-title { font-size: 14px; font-weight: 600; color: var(--green); margin-bottom: 3px; }
.otw-sub   { font-size: 12px; color: var(--text-dim); }

/* ── LINK BOX (success after join) ── */
.link-section { padding: 0 16px 16px; }
.link-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }
.link-url {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 13px;
  font-size: 12px;
  color: var(--text-dim);
  word-break: break-all;
  margin-bottom: 8px;
  font-family: monospace;
}

/* ── SKELETONS ── */
.skel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  animation: pulse 1.4s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.skel-lg { height: 200px; }
.skel-sm { height: 80px; margin-bottom: 8px; }

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border); margin: 8px 0; }

/* ── ERROR ── */
.err-box {
  display: none;
  padding: 10px 14px;
  border-radius: 9px;
  background: var(--red-dim);
  border: 1px solid rgba(239,68,68,.2);
  color: var(--red);
  font-size: 13px;
  line-height: 1.5;
  margin-bottom: 8px;
}
.err-box.show { display: block; }

/* ── STOP LIST ── */
.stop-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.stop-item:last-child { border: none; }
.stop-letter { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0; margin-top: 1px; }
.stop-place { font-size: 12px; font-weight: 500; color: var(--text); }
.stop-time  { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

@media (max-width: 520px) {
  .content { padding: 12px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="rgba(255,255,255,0.15)"/>
      <circle cx="12" cy="9" r="2.5" fill="#fff" stroke="none"/>
    </svg>
  </div>
  <div class="brand">Path<span>fynder</span></div>

</div>

<!-- LOADING -->
<div class="content" id="loading-view">
  <div class="skel skel-lg"></div>
  <div class="skel skel-sm"></div>
  <div class="skel skel-sm"></div>
</div>

<!-- MAIN CONTENT (hidden until loaded) -->
<div id="main-view" style="display:none;width:100%;max-width:520px;display:none">
  <!-- injected by JS -->
</div>

<!-- TABS (driver only, shown after load) -->
<div class="tabs" id="tabs" style="display:none">
  <div class="tab active" id="tab-pax" onclick="switchTab('passengers')">Passengers <span id="tab-pax-count"></span></div>
  <div class="tab" id="tab-match" onclick="switchTab('matched')">Matched</div>
</div>
<div class="content" id="tab-content" style="display:none"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>

// CONFIG
// ═══════════════════════════════════════════
var SUPABASE_URL  = 'https://omussxfyrztjahbdrrpi.supabase.co';

var params   = new URLSearchParams(location.search);

// ═══════════════════════════════════════════

// ═══════════════════════════════════════════

function setSaved(p) { try { localStorage.setItem('pf_passenger_v1', JSON.stringify(p)); } catch(e) {} }

// ═══════════════════════════════════════════

  {bg:'rgba(34,197,94,0.12)',c:'#22c55e'},

function initials(n) { return (n||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase(); }

function fmtTime(t) {
  if (!t) return '—';
  var h = parseInt(t.slice(0,2),10), m = parseInt(t.slice(3,5),10);
  var ap = h >= 12 ? 'PM' : 'AM', h12 = h % 12 || 12;
  return h12 + ':' + (m < 10 ? '0' : '') + m + ' ' + ap;
}
function fmtDate(d) {
  if (!d) return '—';
  var today = new Date(); today.setHours(0,0,0,0);
  var rd = new Date(d + 'T00:00:00'); rd.setHours(0,0,0,0);
  var diff = (rd - today) / 86400000;
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  return rd.toLocaleDateString('en-CA', {weekday:'short', month:'short', day:'numeric'});
}
function seatsLeft() {
  var taken = passengers.filter(function(p){ return p.status !== 'cancelled'; }).length;
  return Math.max(0, (ride.available_seats || 4) - taken);
}
function rideExpired() {
  if (!ride.dates) return false;
  var today = new Date(); today.setHours(0,0,0,0);
  var rd = new Date(ride.dates + 'T00:00:00'); rd.setHours(0,0,0,0);

function copyText(t) {

function rideUrl(withToken) {

  if (withToken && ride.share_token) u += '&token=' + ride.share_token;
  return u;
}
function haversine(la1,ln1,la2,ln2) {
  var R=6371, dL=(la2-la1)*Math.PI/180, dG=(ln2-ln1)*Math.PI/180;
  var a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function isIOS() { return /iPhone|iPad|iPod/i.test(navigator.userAgent); }

// ═══════════════════════════════════════════
// LOAD
// ═══════════════════════════════════════════
async function load() {
  if (!RIDE_ID) { showError('No ride ID in URL.'); return; }
  try {
    var res1 = await db.from('driver_routines').select('*').eq('id', RIDE_ID).single();
    if (res1.error || !res1.data) { showError('Ride not found.'); return; }
    ride = res1.data;

    isDriver = (SHARE_TK && SHARE_TK === ride.share_token)
            || (TG_ID && TG_ID === String(ride.telegram_chat_id || ''));

    var res2 = await db.from('passenger_requests').select('*').eq('ride_id', RIDE_ID).order('created_at', {ascending:true});
    passengers = res2.data || [];

    render();
  } catch(e) { showError(e.message); }
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render() {
  document.getElementById('loading-view').style.display = 'none';
  document.getElementById('main-view').style.display = '';
  var mv = document.getElementById('main-view');

  // Status pill
  var pill = document.getElementById('status-pill');
  var st = ride.ride_status || 'open';
  pill.textContent = st.charAt(0).toUpperCase() + st.slice(1);
  pill.className = 'status-pill status-' + st;
  pill.style.display = '';

  if (rideExpired() && st === 'open') { mv.innerHTML = expiredHTML(); return; }

  if (isDriver) {
    renderDriverTop(mv);
    document.getElementById('tabs').style.display = '';
    document.getElementById('tab-content').style.display = '';
    renderTab();
  } else if (st === 'started') {
    mv.innerHTML = otwHTML() + rideCardHTML();
    document.getElementById('tabs').style.display = 'none';
    document.getElementById('tab-content').style.display = 'none';
  } else {
    mv.innerHTML = rideCardHTML() + publicActionsHTML();
    document.getElementById('tabs').style.display = 'none';
    document.getElementById('tab-content').style.display = 'none';
    wirePublic();
  }
}

async function submitJoin(shiftOn) {
  var name  = document.getElementById('j-name').value.trim();
  var phone = document.getElementById('j-phone').value.trim();
  var pu    = document.getElementById('j-pu').value.trim();
  var doLoc = document.getElementById('j-do').value.trim();
  var time  = document.getElementById('j-time').value;
  var err   = document.getElementById('j-err');

  if (!name || !phone || !pu || !doLoc) { err.textContent='Please fill in all required fields.'; err.classList.add('show'); return; }
  err.classList.remove('show');

  var btn = document.getElementById('j-submit');
  btn.disabled = true; btn.textContent = 'Booking…';

  var puGeo = geoCache['j-pu'] || null;
  var doGeo = geoCache['j-do'] || null;

  try {
    var row = {
      ride_id:             RIDE_ID,
      passenger_name_web:  name,
      passenger_phone_web: phone,
      passenger_wa_id:     phone,
      passenger_name:      name,
      pickup_label:        pu,
      dropoff_label:       doLoc,
      pickup_lat:          puGeo ? puGeo.lat : null,
      pickup_lng:          puGeo ? puGeo.lng : null,
      dropoff_lat:         doGeo ? doGeo.lat : null,
      dropoff_lng:         doGeo ? doGeo.lng : null,
      is_shift_start:      shiftOn,
      status:              'confirmed',
      platform:            'web',
      date:                ride.dates,
    };
    if (time) row.pickup_time = time;
    if (TG_ID) row.telegram_chat_id = TG_ID;

    var { error } = await db.from('passenger_requests').insert(row);
    if (error) throw error;

    setSaved({ name: name, phone: phone });

    var res2 = await db.from('passenger_requests').select('*').eq('ride_id', RIDE_ID);
    passengers = res2.data || [];

    showConfirmed(name, pu, doLoc, time);
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Confirm my seat';
    err.textContent = 'Booking failed: ' + e.message; err.classList.add('show');
  }
}

// ── PASSENGERS TAB ──
function renderPaxTab() {
  var tc   = document.getElementById('tab-content');
  var conf = passengers.filter(function(p){ return p.status !== 'cancelled'; });
  document.getElementById('tab-pax-count').textContent = '(' + conf.length + ')';

  if (!conf.length) {
    tc.innerHTML = '<div style="text-align:center;padding:28px 20px;font-size:13px;color:var(--text-muted)">No passengers yet.<br>Share your ride link to get bookings.</div>' +
      '<button class="btn btn-ghost btn-full" id="d-add-pax" style="border-style:dashed;color:var(--accent);border-color:rgba(79,142,247,.3);margin-top:0">+ Add passenger manually</button>';
    document.getElementById('d-add-pax').onclick = showAddPaxForm;
    return;
  }

  var html = '';
  conf.forEach(function(p, i) {
    var av   = avCol(i);
    var name = p.passenger_name_web || p.passenger_name || 'Passenger';
    var ph   = p.passenger_phone_web || p.passenger_wa_id || '';
    var pu   = p.pickup_label || '—';
    var dro  = p.dropoff_label || '—';
    var pt   = p.pickup_time ? fmtTime(p.pickup_time) : '—';
    var done = p.status === 'picked_up';

    html += '<div class="pax-card '+(done?'picked-up':'')+'">' +
      '<div class="pax-header">' +
        '<div class="av" style="width:32px;height:32px;font-size:11px;background:'+av.bg+';color:'+av.c+'">'+initials(name)+'</div>' +
        '<div class="pax-info">' +
          '<div class="pax-name">'+name+'</div>' +
          '<div class="pax-phone">'+ph+(pt!=='—'?' · '+pt+' pickup':'')+'</div>' +
        '</div>' +
        (p.is_shift_start ? '<span class="chip blue" style="font-size:9px">Work shift</span>' : '') +
      '</div>' +
      '<div class="pax-route">📍 '+pu+' → '+dro+'</div>' +
      '<div class="pax-actions">' +
        (ph ? '<button class="btn btn-wa btn-sm" data-phone="'+ph.replace(/\D/g,'')+'" data-action="outside" style="flex:1">💬 I\'m outside</button>' : '') +
        (!done ? '<button class="btn btn-ghost btn-sm" data-pid="'+p.id+'" data-action="pickup" style="color:var(--green);border-color:rgba(34,197,94,.3);background:var(--green-dim)">✓ Picked up</button>' : '<span style="font-size:10px;color:var(--green);padding:0 6px">✓ Done</span>') +
        '<button class="btn btn-red btn-sm" data-pid="'+p.id+'" data-action="remove">Remove</button>' +
      '</div>' +
    '</div>';
  });
  html += '<button class="btn btn-ghost btn-full" id="d-add-pax" style="border-style:dashed;color:var(--accent);border-color:rgba(79,142,247,.3)">+ Add passenger manually</button>';
  tc.innerHTML = html;

  // Wire actions
  tc.querySelectorAll('[data-action="outside"]').forEach(function(btn) {
    btn.onclick = function() { window.open('https://wa.me/'+this.dataset.phone+'?text='+encodeURIComponent("I'm outside"), '_blank'); };
  });
  tc.querySelectorAll('[data-action="pickup"]').forEach(function(btn) {
    btn.onclick = async function() {
      await db.from('passenger_requests').update({status:'picked_up'}).eq('id', this.dataset.pid);
      var r = await db.from('passenger_requests').select('*').eq('ride_id', RIDE_ID);
      passengers = r.data || [];
      renderPaxTab();
    };
  });
  tc.querySelectorAll('[data-action="remove"]').forEach(function(btn) {
    btn.onclick = async function() {
      if (!confirm('Remove this passenger?')) return;
      await db.from('passenger_requests').update({status:'cancelled'}).eq('id', this.dataset.pid);
      var r = await db.from('passenger_requests').select('*').eq('ride_id', RIDE_ID);
      passengers = r.data || [];
      renderPaxTab();
    };
  });
  var addBtn = document.getElementById('d-add-pax');
  if (addBtn) addBtn.onclick = showAddPaxForm;
}

      '<div class="field"><label>WhatsApp number *</label><div class="input-wrap"><input class="field-input" id="ap-phone" type="tel" placeholder="+1 416 555 0000"></div></div>' +
      '<div class="field"><label>Pickup location *</label><div class="input-wrap" style="position:relative"><input class="field-input" id="ap-pu" placeholder="Pickup location" autocomplete="off"><div class="suggestions" id="ap-pu-sug"></div></div><div class="confirmed-tag" id="ap-pu-tag"><div class="confirmed-dot"></div><span id="ap-pu-txt"></span></div></div>' +
      '<div class="field"><label>Dropoff location *</label><div class="input-wrap" style="position:relative"><input class="field-input" id="ap-do" placeholder="Dropoff location" autocomplete="off"><div class="suggestions" id="ap-do-sug"></div></div><div class="confirmed-tag" id="ap-do-tag"><div class="confirmed-dot"></div><span id="ap-do-txt"></span></div></div>' +
      '<div class="field"><label>Pickup time</label><div class="input-wrap"><input class="field-input" id="ap-time" type="time"></div></div>' +
      '<div class="err-box" id="ap-err"></div>' +
      '<button class="btn btn-primary btn-full" id="ap-submit">Add passenger</button>' +
      '<button class="btn btn-ghost btn-full" id="ap-back" style="margin-top:4px">← Back</button>' +
    '</div></div>';

  setupLocField('ap-pu','ap-pu-sug','ap-pu-tag','ap-pu-txt','ap-pu');
  setupLocField('ap-do','ap-do-sug','ap-do-tag','ap-do-txt','ap-do');

  document.getElementById('ap-back').onclick = function() { activeTab='passengers'; renderTab(); };
  document.getElementById('ap-submit').onclick = async function() {
    var name=document.getElementById('ap-name').value.trim();
    var ph=document.getElementById('ap-phone').value.trim();
    var pu=document.getElementById('ap-pu').value.trim();
    var dro=document.getElementById('ap-do').value.trim();
    var t=document.getElementById('ap-time').value;
    var err=document.getElementById('ap-err');
    if(!name||!ph||!pu||!dro){err.textContent='All fields required.';err.classList.add('show');return;}
    err.classList.remove('show');
    this.disabled=true;this.textContent='Adding…';
    var puG=geoCache['ap-pu']||null, doG=geoCache['ap-do']||null;
    await db.from('passenger_requests').insert({
      ride_id:RIDE_ID,passenger_name_web:name,passenger_phone_web:ph,
      passenger_wa_id:ph,passenger_name:name,
      pickup_label:pu,dropoff_label:dro,
      pickup_lat:puG?puG.lat:null,pickup_lng:puG?puG.lng:null,
      dropoff_lat:doG?doG.lat:null,dropoff_lng:doG?doG.lng:null,
      pickup_time:t||null,status:'confirmed',platform:'web',date:ride.dates
    });
    var r=await db.from('passenger_requests').select('*').eq('ride_id',RIDE_ID);
    passengers=r.data||[];
    activeTab='passengers';
    renderDriverTop(document.getElementById('main-view'));
    renderPaxTab();
  };
}

// ── MATCHED TAB ──
async function renderMatchedTab() {
  var tc = document.getElementById('tab-content');
  tc.innerHTML = '<div style="padding:20px;text-align:center;font-size:12px;color:var(--text-muted)">Finding matched passengers…</div>';

  if (!ride.pickup_lat || !ride.pickup_lng) {
    tc.innerHTML = '<div style="padding:20px;text-align:center;font-size:13px;color:var(--text-muted)">No location data on this ride — matched passengers unavailable.</div>';
    return;
  }

  try {
    var { data, error } = await db.rpc('find_matched_passengers', {
      p_driver_id: RIDE_ID,
      p_from_lat:  ride.pickup_lat,
      p_from_lng:  ride.pickup_lng,
      p_to_lat:    ride.dropoff_lat,
      p_to_lng:    ride.dropoff_lng,
      p_ride_date: ride.dates,
      p_radius_km: 15
    });
    if (error) throw error;

    var matches = data || [];
    if (!matches.length) {
      tc.innerHTML = '<div style="padding:24px;text-align:center;font-size:13px;color:var(--text-muted)">No matched passengers found near your route for this date.</div>';
      return;
    }

    var shareUrl = rideUrl(false);
    var html = '';
    matches.forEach(function(m, i) {
      var av   = avCol(i);
      var name = m.sender_name || 'Passenger';
      var ph   = m.sender_number ? String(m.sender_number) : '';
      var dist = m.dist_km ? m.dist_km + ' km away' : '';
      var msg  = 'Hi '+name+', I am driving from '+(ride.pickup_label||'')+' to '+(ride.dropoff_label||'')+' on '+fmtDate(ride.dates)+' at '+fmtTime(ride.departure_time)+'. Do you still need a ride? Join here: '+shareUrl;
      html +=
        '<div class="match-card">' +
          '<div class="match-header">' +
            '<div class="av" style="width:28px;height:28px;font-size:10px;background:'+av.bg+';color:'+av.c+'">'+initials(name)+'</div>' +
            '<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:var(--text)">'+name+'</div></div>' +
            (dist ? '<span class="dist-badge">'+dist+'</span>' : '') +
          '</div>' +
          '<div class="match-route">'+( m.pickup_label||'—')+' → '+(m.dropoff_label||'—')+' · '+fmtTime(m.pick_up_time)+'</div>' +
          '<div class="match-actions">' +
            (ph ? '<button class="btn btn-wa btn-sm" style="flex:1" onclick="window.open(\'https://wa.me/'+ph.replace(/\D/g,'')+'?text='+encodeURIComponent(msg)+'\',\'_blank\')">Contact</button>' : '') +
            '<button class="btn btn-primary btn-sm" style="flex:1" onclick="shareWith(\''+name.replace(/'/g,"\\'")+'\',\''+ph.replace(/\D/g,'')+'\')">Share link</button>' +
          '</div>' +
        '</div>';
    });
    tc.innerHTML = html;
  } catch(e) {
    tc.innerHTML = '<div style="padding:16px;font-size:12px;color:var(--red)">Error: '+e.message+'</div>';
  }
}

function shareWith(name, ph) {
  var url = rideUrl(false);
  var msg = 'Hi '+name+', do you still need a ride? I\'m driving from '+(ride.pickup_label||'')+' to '+(ride.dropoff_label||'')+' on '+fmtDate(ride.dates)+' at '+fmtTime(ride.departure_time)+'. Join here: '+url;
  if (ph) window.open('https://wa.me/'+ph+'?text='+encodeURIComponent(msg),'_blank');
  else { copyText(url); alert('Link copied!'); }
}

// ═══════════════════════════════════════════
// MAPS
// ═══════════════════════════════════════════
function openMaps() {
  if (!navigator.geolocation) { alert('Location access not available.'); return; }
  navigator.geolocation.getCurrentPosition(function(pos) {
    var dLat = pos.coords.latitude, dLng = pos.coords.longitude;
    var stops = passengers
      .filter(function(p){ return p.status !== 'cancelled' && p.pickup_lat && p.pickup_lng; })
      .map(function(p){ return {lat:p.pickup_lat, lng:p.pickup_lng, label:p.pickup_label}; });

    stops.sort(function(a,b){
      return haversine(dLat,dLng,a.lat,a.lng) - haversine(dLat,dLng,b.lat,b.lng);
    });

    if (ride.dropoff_lat && ride.dropoff_lng) stops.push({lat:ride.dropoff_lat, lng:ride.dropoff_lng});

    if (!stops.length) { alert('No passengers with location data yet.'); return; }

    var dest  = stops[stops.length-1];
    var wpts  = stops.slice(0,-1);

    if (isIOS()) {
      var url = 'http://maps.apple.com/?saddr=Current+Location&daddr='+dest.lat+','+dest.lng;
      if (wpts.length) url = 'http://maps.apple.com/?saddr=Current+Location&daddr='+wpts.map(function(w){return w.lat+','+w.lng;}).join('+to:')+'+to:'+dest.lat+','+dest.lng;
      window.open(url, '_blank');
    } else {
      var url = 'https://www.google.com/maps/dir/?api=1&origin=Current+Location&destination='+dest.lat+','+dest.lng+'&travelmode=driving';
      if (wpts.length) url += '&waypoints='+wpts.map(function(w){return w.lat+','+w.lng;}).join('|');
      window.open(url, '_blank');
    }
  }, function(){ alert('Could not get your location. Please allow location access and try again.'); });
}

// ═══════════════════════════════════════════
// RIDE STATUS ACTIONS
// ═══════════════════════════════════════════
async function startRide() {
  var btn = document.getElementById('d-start');
  if (btn) { btn.disabled=true; btn.textContent='Starting…'; }
  await db.from('driver_routines').update({ride_status:'started'}).eq('id',RIDE_ID);
  ride.ride_status = 'started';
  renderDriverTop(document.getElementById('main-view'));
  renderTab();
}
async function endRide() {
  if (!confirm('End this ride?')) return;
  await db.from('driver_routines').update({ride_status:'ended'}).eq('id',RIDE_ID);
  ride.ride_status = 'ended';
  var pill=document.getElementById('status-pill');pill.textContent='Ended';pill.className='status-pill status-ended';
  renderDriverTop(document.getElementById('main-view'));
  renderTab();
}
async function toggleClose() {
  var newSt = ride.ride_status === 'closed' ? 'open' : 'closed';
  await db.from('driver_routines').update({ride_status:newSt}).eq('id',RIDE_ID);
  ride.ride_status = newSt;
  renderDriverTop(document.getElementById('main-view'));
  renderTab();
}

// ═══════════════════════════════════════════
// MAPBOX LOCATION FIELD
// ═══════════════════════════════════════════
function setupLocField(inputId, sugId, tagId, tagTxtId, cacheKey) {
  var input = document.getElementById(inputId);
  var sug   = document.getElementById(sugId);
  if (!input || !sug) return;

  input.addEventListener('input', function() {
    geoCache[cacheKey] = null;
    input.classList.remove('confirmed');
    var tag = document.getElementById(tagId); if(tag) tag.classList.remove('show');
    clearTimeout(geoTimers[cacheKey]);
    var q = input.value.trim();
    if (q.length < 3) { sug.classList.remove('show'); sug.innerHTML=''; return; }
    sug.innerHTML = '<div class="suggestion-item loading-item">Searching…</div>';
    sug.classList.add('show');
    var sid = window._SB_SID || (window._SB_SID = 'pf-ride-'+Date.now());
    geoTimers[cacheKey] = setTimeout(function() {
      fetch('https://api.mapbox.com/search/searchbox/v1/suggest?q='+encodeURIComponent(q)
        +'&access_token='+MAPBOX_TOKEN+'&session_token='+sid
        +'&language=en&limit=6&country=CA,US&proximity=-79.3832,43.6532')
        .then(function(r){return r.json();})
        .then(function(d){
          sug.innerHTML='';
          var items=(d&&d.suggestions)||[];
          if(!items.length){sug.innerHTML='<div class="suggestion-item loading-item">No results</div>';return;}
          items.forEach(function(item){
            var name=item.name||'';
            var ctx=item.place_formatted||item.full_address||'';
            if(ctx.toLowerCase().startsWith(name.toLowerCase()+', '))ctx=ctx.slice(name.length+2);
            var el=document.createElement('div');
            el.className='suggestion-item';
            el.innerHTML='<div class="sug-main">'+name+'</div>'+(ctx?'<div class="sug-ctx">'+ctx+'</div>':'');
            el.addEventListener('click',function(){
              input.value=name+(ctx?', '+ctx:'');
              sug.classList.remove('show');sug.innerHTML='';
              fetch('https://api.mapbox.com/search/searchbox/v1/retrieve/'+item.mapbox_id
                +'?access_token='+MAPBOX_TOKEN+'&session_token='+sid)
                .then(function(r){return r.json();})
                .then(function(rd){
                  var f=rd.features&&rd.features[0];
                  var c=f&&f.geometry&&f.geometry.coordinates;
                  if(!c)return;
                  geoCache[cacheKey]={lat:c[1],lng:c[0],label:name+(ctx?', '+ctx:'')};
                  input.classList.add('confirmed');
                  var tg2=document.getElementById(tagId);if(tg2)tg2.classList.add('show');
                  var tt=document.getElementById(tagTxtId);if(tt)tt.textContent=name;
                });
            });
            sug.appendChild(el);
          });
          sug.classList.add('show');
        })
        .catch(function(){sug.innerHTML='<div class="suggestion-item loading-item">Connection error</div>';});
    },400);
  });
  document.addEventListener('click',function(e){
    if(!input.contains(e.target)&&!sug.contains(e.target))sug.classList.remove('show');
  });
}
