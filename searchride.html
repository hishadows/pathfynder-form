<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pathfynder — Find Rides</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e1117;--surface:#161b27;--surface2:#1e2535;--border:#2a3348;
  --accent:#4f8ef7;--accent-dim:rgba(79,142,247,0.12);--accent-hover:#6ba3ff;
  --green:#22c55e;--green-dim:rgba(34,197,94,0.10);
  --red:#ef4444;--amber:#f59e0b;
  --text:#e8edf5;--text-dim:#8a95a8;--text-muted:#4e5a6e;
  --radius:12px;
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-body)}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px 0;flex-shrink:0}
.header-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.logo{width:34px;height:34px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:18px;height:18px}
.brand{font-family:var(--font-display);font-size:17px;font-weight:700;letter-spacing:-.3px}
.brand span{color:var(--accent)}
.user-pill{margin-left:auto;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px 4px 6px;display:none;align-items:center;gap:6px;font-size:12px;color:var(--text-dim);max-width:130px}
.user-pill.show{display:flex}
.user-avatar{width:20px;height:20px;border-radius:50%;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--accent);flex-shrink:0}
.user-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.view-toggle{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:2px;gap:2px;flex-shrink:0}
.vbtn{width:28px;height:24px;border:none;background:transparent;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all .15s}
.vbtn.active{background:var(--surface2);color:var(--accent)}
.vbtn svg{width:15px;height:15px}

/* SEARCH PANEL */
.search-panel{padding-bottom:12px}
.search-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.sf{position:relative}
.sf-inner{position:relative;width:100%}
.sf-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;z-index:1}
.sf-icon svg{width:14px;height:14px;stroke:var(--text-muted)}
.sf input{width:100%;height:36px;padding:0 10px 0 30px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:13px;outline:none;transition:border-color .15s;-webkit-appearance:none}
.sf input:focus{border-color:var(--accent)}
.sf input::placeholder{color:var(--text-muted)}
.sf input.confirmed{border-color:var(--green)}
.sf input[type="date"]::-webkit-calendar-picker-indicator,
.sf input[type="time"]::-webkit-calendar-picker-indicator{filter:invert(0.4)}
.suggestions{display:none;position:absolute;left:0;right:0;top:calc(100% + 4px);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.suggestions.show{display:block}
.sug-item{padding:10px 12px;font-size:13px;color:var(--text-dim);cursor:pointer;display:flex;align-items:flex-start;gap:8px;border-bottom:1px solid var(--border);line-height:1.4}
.sug-item:last-child{border-bottom:none}
.sug-item:hover{background:var(--accent-dim);color:var(--text)}
.sug-item.loading{cursor:default;color:var(--text-muted);font-style:italic}
.sug-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.sug-name{font-size:13px;color:var(--text)}
.confirmed-tag{display:none;align-items:center;gap:6px;padding:5px 10px;margin-top:4px;border-radius:6px;font-size:11px;color:var(--green);background:var(--green-dim);border:1px solid rgba(34,197,94,.2)}
.confirmed-tag.show{display:flex}
.confirmed-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0}
.controls-row{display:flex;align-items:center;gap:6px}
.radius-wrap{flex:1;display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0 10px;height:34px}
.radius-wrap svg{width:14px;height:14px;stroke:var(--text-muted);flex-shrink:0}
.radius-wrap input[type=range]{flex:1;height:3px;accent-color:var(--accent);cursor:pointer;border:none;background:transparent;padding:0}
.radius-val{font-size:12px;font-weight:600;color:var(--accent);min-width:30px;text-align:right}
.tw-btn{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0 10px;height:34px;cursor:pointer;font-size:12px;color:var(--text-dim);white-space:nowrap;font-family:var(--font-body)}
.tw-btn svg{width:13px;height:13px;stroke:var(--text-muted)}
.tw-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.tw-btn.active svg{stroke:var(--accent)}
.search-btn{height:34px;padding:0 14px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0}
.search-btn:active{opacity:.85}
.search-btn svg{width:14px;height:14px;stroke:#fff}

/* FILTER CHIPS */
.filter-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:12px}
.filter-row::-webkit-scrollbar{display:none}
.chip{display:flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.chip svg{width:12px;height:12px;stroke:currentColor}
.chip.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

/* STATS BAR */
.stats-bar{display:flex;border-top:1px solid var(--border)}
.stat{flex:1;text-align:center;padding:8px 4px 10px;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-n{font-size:16px;font-weight:700;color:var(--text);font-family:var(--font-display);line-height:1}
.stat-l{font-size:10px;color:var(--text-muted);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}

/* WARN / DEBUG BOXES */
.warn-box{margin:10px 16px 0;padding:10px 14px;border-radius:8px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);font-size:12px;color:#f87171;line-height:1.5;display:none}
.warn-box.show{display:block}
.debug-box{margin:10px 16px 0;padding:10px 14px;border-radius:8px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);font-size:11px;color:var(--amber);line-height:1.6;font-family:monospace;display:none;word-break:break-all}
.debug-box.show{display:block}

/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{width:0}

/* SAVED SEARCHES */
.saved-wrap{padding:10px 16px 0;display:none}
.saved-wrap.show{display:block}
.saved-label{font-size:10px;font-weight:600;letter-spacing:.8px;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px}
.saved-pills{display:flex;gap:6px;flex-wrap:wrap}
.saved-pill{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);cursor:pointer;white-space:nowrap}
.saved-pill svg{width:11px;height:11px;stroke:var(--text-muted)}
.pill-x{opacity:.5}

/* SECTION LABEL */
.sec-label{padding:12px 16px 6px;font-size:10px;font-weight:600;letter-spacing:.8px;color:var(--text-muted);text-transform:uppercase;display:flex;align-items:center;gap:6px}
.sec-label svg{width:12px;height:12px;stroke:var(--text-muted)}

/* FALLBACK BANNER */
.fallback-banner{margin:0 16px 8px;padding:10px 12px;background:rgba(79,142,247,.08);border:1px solid rgba(79,142,247,.2);border-radius:8px;font-size:12px;color:var(--accent);line-height:1.4;display:none;align-items:center;gap:8px}
.fallback-banner.show{display:flex}
.fallback-banner svg{width:14px;height:14px;stroke:var(--accent);flex-shrink:0}

/* CARD LIST */
.card-list{padding:0 12px 24px;display:flex;flex-direction:column;gap:8px}

/* RIDE CARD */
.ride-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.ride-card:active{border-color:var(--accent)}
.ride-card.expanded{border-color:var(--accent)}
.card-top{padding:12px 14px}
.card-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pax-info{display:flex;align-items:center;gap:9px;min-width:0}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;font-family:var(--font-display)}
.pax-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.time-ago{font-size:11px;color:var(--text-muted);margin-top:1px}
.badges{display:flex;align-items:center;gap:4px;flex-shrink:0}
.badge{font-size:10px;font-weight:600;padding:3px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em}
.b-pending{background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
.b-matched{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.b-recurring{background:rgba(79,142,247,.1);color:var(--accent);border:1px solid rgba(79,142,247,.25)}
.route-strip{display:flex;align-items:stretch;gap:10px}
.route-nodes{display:flex;flex-direction:column;align-items:center;padding:3px 0;width:14px;flex-shrink:0}
.nd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.nd-o{border:2px solid var(--text-muted);background:transparent}
.nd-d{background:var(--accent)}
.nd-line{flex:1;width:1.5px;background:repeating-linear-gradient(to bottom,var(--accent) 0px,var(--accent) 3px,transparent 3px,transparent 6px);margin:3px 0;min-height:14px;opacity:.5}
.route-labels{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between;gap:6px}
.route-place{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.route-sub{font-size:11px;color:var(--text-muted)}
.route-meta{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;gap:4px}
.ride-time{font-size:17px;font-weight:700;color:var(--text);font-family:var(--font-display);letter-spacing:-.5px}
.ride-date{font-size:11px;color:var(--text-dim);text-align:right}
.card-footer{display:flex;align-items:center;border-top:1px solid var(--border)}
.footer-info{flex:1;display:flex;align-items:center;gap:10px;padding:8px 14px}
.f-chip{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-muted)}
.f-chip svg{width:12px;height:12px;stroke:var(--text-muted)}
.contact-btns{display:flex;border-left:1px solid var(--border)}
.c-btn{width:46px;height:40px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;-webkit-tap-highlight-color:transparent}
.c-btn:first-child{border-right:1px solid var(--border)}
.c-btn:active{background:var(--surface2)}
.c-btn svg{width:20px;height:20px}
.card-detail{border-top:1px solid var(--border);padding:12px 14px;display:none}
.card-detail.open{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.di-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.di-val{font-size:13px;font-weight:500;color:var(--text)}
.detail-note{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.detail-note svg{width:13px;height:13px;stroke:var(--text-muted);margin-top:2px;flex-shrink:0}
.detail-note span{font-size:12px;color:var(--text-dim);line-height:1.5}
.map-link-btn{width:100%;height:32px;border:1px solid var(--border);background:var(--surface2);border-radius:8px;font-size:12px;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:var(--font-body)}
.map-link-btn svg{width:13px;height:13px;stroke:var(--accent)}

/* MAP VIEW */
#map-view{display:none;flex:1;flex-direction:column;position:relative}
#map-view.active{display:flex}
#leaflet-map{flex:1;background:var(--bg)}
.leaflet-tile{filter:brightness(.7) saturate(.8)}
.leaflet-popup-content-wrapper{background:var(--surface2)!important;border:1px solid var(--border)!important;border-radius:var(--radius)!important;box-shadow:0 8px 24px rgba(0,0,0,.5)!important;color:var(--text)!important}
.leaflet-popup-tip{background:var(--surface2)!important}
.leaflet-popup-content{font-family:var(--font-body);font-size:13px;color:var(--text)}
.pop-name{font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.pop-route{color:var(--text-dim);font-size:12px;line-height:1.5}
.pop-time{color:var(--accent);font-size:12px;font-weight:600;margin-top:4px}
.map-tray{background:var(--surface);border-top:1px solid var(--border);max-height:170px;overflow-y:auto;display:none}
.map-tray.open{display:block}
.tray-item{padding:9px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.tray-item:last-child{border-bottom:none}
.tray-item:active{background:var(--surface2)}
.tray-name{font-size:13px;font-weight:600;color:var(--text)}
.tray-route{font-size:12px;color:var(--text-muted);margin-top:2px}

/* EMPTY / SKELETON */
.empty-state{padding:3rem 1rem;text-align:center}
.empty-icon{font-size:38px;margin-bottom:12px;opacity:.4}
.empty-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;font-family:var(--font-display)}
.empty-sub{font-size:13px;color:var(--text-muted);line-height:1.5}
.skel{animation:pulse 1.5s infinite;background:var(--surface);border:1px solid var(--border);border-radius:14px;height:114px;margin-bottom:8px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div id="app">

<!-- HEADER -->
<div class="header">
  <div class="header-row">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
        <circle cx="12" cy="9" r="2.5"/>
      </svg>
    </div>
    <div class="brand">Path<span>fynder</span></div>
    <div class="user-pill" id="userPill">
      <div class="user-avatar" id="userInitial">?</div>
      <span class="user-name" id="userName">—</span>
    </div>
    <div class="view-toggle">
      <button class="vbtn active" id="btn-list" onclick="switchView('list')" aria-label="List">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1"/><circle cx="3" cy="12" r="1"/><circle cx="3" cy="18" r="1"/></svg>
      </button>
      <button class="vbtn" id="btn-map" onclick="switchView('map')" aria-label="Map">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
      </button>
    </div>
  </div>

  <div class="search-panel">
    <div class="search-grid">
      <div class="sf">
        <div class="sf-inner">
          <span class="sf-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="8"/></svg></span>
          <input type="text" id="f-from" placeholder="From…" autocomplete="off"/>
          <div class="suggestions" id="sug-from"></div>
        </div>
        <div class="confirmed-tag" id="con-from"><div class="confirmed-dot"></div><span id="con-from-txt"></span></div>
      </div>
      <div class="sf">
        <div class="sf-inner">
          <span class="sf-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg></span>
          <input type="text" id="f-to" placeholder="To…" autocomplete="off"/>
          <div class="suggestions" id="sug-to"></div>
        </div>
        <div class="confirmed-tag" id="con-to"><div class="confirmed-dot"></div><span id="con-to-txt"></span></div>
      </div>
      <div class="sf">
        <div class="sf-inner">
          <span class="sf-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
          <input type="date" id="f-date" autocomplete="off"/>
        </div>
      </div>
      <div class="sf">
        <div class="sf-inner">
          <span class="sf-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
          <input type="time" id="f-time" autocomplete="off"/>
        </div>
      </div>
    </div>
    <div class="controls-row">
      <div class="radius-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>
        <input type="range" id="radius-slider" min="1" max="25" value="5" step="1" oninput="document.getElementById('rv').textContent=this.value+'km'"/>
        <span class="radius-val" id="rv">5km</span>
      </div>
      <button class="tw-btn" id="tw-btn" onclick="toggleTW()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span id="tw-label">± 2 hr</span>
      </button>
      <button class="search-btn" onclick="runSearch()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search
      </button>
    </div>
  </div>

  <div class="filter-row">
    <div class="chip active" data-f="all" onclick="setFilter('all')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1"/><circle cx="3" cy="12" r="1"/><circle cx="3" cy="18" r="1"/></svg>All</div>
    <div class="chip" data-f="today" onclick="setFilter('today')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Today</div>

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function todayStr() { return new Date().toISOString().slice(0,10); }

function timeAgo(iso) {
  if (!iso) return '';
  var d = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (d < 60)    return 'just now';
  if (d < 3600)  return Math.floor(d/60) + 'm ago';
  if (d < 86400) return Math.floor(d/3600) + 'h ago';
  return Math.floor(d/86400) + 'd ago';
}

function fmtDate(d) {
  if (!d) return '—';
  var t = todayStr();
  if (d === t) return 'Today';
  var tom = new Date(); tom.setDate(tom.getDate()+1);
  if (d === tom.toISOString().slice(0,10)) return 'Tomorrow';
  return new Date(d+'T00:00:00').toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'});
}

function fmtTime(t) {
  if (!t) return '—';
  return String(t).slice(0,5);
}

function timeDiffHrs(t1, t2) {
  var p1 = String(t1).slice(0,5).split(':').map(Number);
  var p2 = String(t2).slice(0,5).split(':').map(Number);
  return Math.abs((p1[0]*60+p1[1]) - (p2[0]*60+p2[1])) / 60;
}

function hav(lat1, lng1, lat2, lng2) {
  var R=6371, dL=(lat2-lat1)*Math.PI/180, dG=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dG/2)*Math.sin(dG/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function getPlaceIcon(type) {

}

// ══════════════════════════════════════════════
// DATA LOADING  ← queries extracted_data_01
// ══════════════════════════════════════════════
async function loadData() {
  try {
    document.getElementById('sec-label-txt').textContent = 'Loading rides…';

    // No date filter on initial load — pull all passenger records.
    // We select only the columns we use to keep payload small.
    var { data, error } = await db
      .from(TABLE)
      .select([
        'id',
        'sender_name',
        'sender_number',
        '"pick up date"',
        '"pick up time"',
        '"D&T of msg"',
        '"additional conditions"',
        'pickup_label',
        'dropoff_label',
        'pickup_lat',
        'pickup_lng',
        'dropoff_lat',
        'dropoff_lng',
        'important_ride',
        'ride_frequency',
        'group_name',
        'Type',
      ].join(','))
      .ilike('Type', 'passenger')      // case-insensitive: matches "Passenger", "passenger"
      .order('"D&T of msg"', { ascending: false })
      .limit(500);

    if (error) throw error;

    if (!data || data.length === 0) {
      showDebug('Supabase returned 0 rows from ' + TABLE + '. Check RLS: run the GRANT policy SQL below.');
      document.getElementById('sec-label-txt').textContent = 'No data — check RLS';
      document.getElementById('card-list').innerHTML =
        '<div class="empty-state"><div class="empty-icon">🔒</div>' +
        '<div class="empty-title">No data returned</div>' +
        '<div class="empty-sub">RLS may be blocking the anon key. Run the policy SQL in Supabase.</div></div>';
      return;
    }

    allData = data.map(normalise);
    renderStats(allData);
    renderCards(allData);
    document.getElementById('sec-label-txt').textContent = 'All passenger requests';

  } catch(e) {
    showDebug('ERROR: ' + e.message);
    document.getElementById('sec-label-txt').textContent = 'Connection error';
    document.getElementById('card-list').innerHTML =
      '<div class="empty-state"><div class="empty-icon">📡</div>' +
      '<div class="empty-title">Connection error</div>' +
      '<div class="empty-sub">' + e.message + '</div></div>';
  }
}

// ══════════════════════════════════════════════
// GEOSPATIAL SEARCH
// When From is geocoded → use PostGIS RPC on extracted_data_01.
// Otherwise → client-side string + date filter on allData.
// ══════════════════════════════════════════════
async function geoSearch(fromLat, fromLng, toLat, toLng, radiusKm, dateVal, timeVal, twHours) {
  // Client-side haversine on already-loaded data (fast, no extra round-trip)
  return allData.filter(function(r) {
    if (!r.pickup_lat || !r.pickup_lng) return false;
    var puOk = hav(fromLat, fromLng, r.pickup_lat, r.pickup_lng) <= radiusKm;
    var doOk = (toLat && r.dropoff_lat) ? hav(toLat, toLng, r.dropoff_lat, r.dropoff_lng) <= radiusKm : true;
    var dOk  = dateVal ? r.date === dateVal : true;
    var tOk  = (timeVal && twHours && r.time) ? timeDiffHrs(r.time, timeVal+':00') <= twHours : true;
    return puOk && doOk && dOk && tOk;
  });
}

// ══════════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════════
async function runSearch() {
  var fromGeo = geoCache['from'];
  var toGeo   = geoCache['to'];
  var dateVal = document.getElementById('f-date').value;
  var timeVal = document.getElementById('f-time').value;
  var radius  = parseInt(document.getElementById('radius-slider').value);
  var fromTxt = document.getElementById('f-from').value.toLowerCase().trim();
  var toTxt   = document.getElementById('f-to').value.toLowerCase().trim();

  var key = [fromGeo?fromGeo.label:fromTxt, toGeo?toGeo.label:toTxt, dateVal].filter(Boolean).join(' → ');
  if (key) saveSearch(key);

  var result;

  if (fromGeo) {
    // Geo radius search (haversine on in-memory data)
    result = await geoSearch(fromGeo.lat, fromGeo.lng, toGeo?toGeo.lat:null, toGeo?toGeo.lng:null, radius, dateVal, timeVal||null, twOn?2:null);
  } else {
    // Plain text + date filter
    result = allData.filter(function(r) {
      var pu = (r.pickup_label||'').toLowerCase();
      var dr = (r.dropoff_label||'').toLowerCase();
      if (fromTxt && !pu.includes(fromTxt)) return false;
      if (toTxt   && !dr.includes(toTxt))   return false;
      if (dateVal && r.date !== dateVal)     return false;
      if (timeVal && twOn && r.time && timeDiffHrs(r.time, timeVal+':00') > 2) return false;
      return true;
    });
  }

  // Filter chip
  var t = todayStr();
  result = result.filter(function(r) {
    var s = (r.status||'pending').toLowerCase();
    if (activeFilter==='today'     && r.date !== t)      return false;
    if (activeFilter==='pending'   && s !== 'pending')   return false;
    if (activeFilter==='matched'   && s !== 'matched')   return false;
    if (activeFilter==='recurring' && !r.ride_frequency) return false;
    return true;
  });

  // Sort: date asc, time asc
  result.sort(function(a,b) {
    if ((a.date||'') < (b.date||'')) return -1;
    if ((a.date||'') > (b.date||'')) return 1;
    return (a.time||'').localeCompare(b.time||'');
  });

  // Fallback: if today filtered → show next day
  var banner    = document.getElementById('fallback-banner');
  var bannerMsg = document.getElementById('fallback-msg');
  if (result.length === 0 && dateVal === t) {
    var tom = new Date(); tom.setDate(tom.getDate()+1);
    var tomStr = tom.toISOString().slice(0,10);
    var nextDay = allData.filter(function(r){ return r.date === tomStr; });
    if (nextDay.length) {
      result = nextDay;
      banner.classList.add('show');
      bannerMsg.textContent = 'No rides today — showing ' + tom.toLocaleDateString('en-CA',{weekday:'long',month:'short',day:'numeric'});
    } else {
      banner.classList.add('show');
      bannerMsg.textContent = 'No rides found for today or tomorrow';
    }
  } else {
    banner.classList.remove('show');
  }

  filtered = result;
  updateResultCount();
  document.getElementById('sec-label-txt').textContent =
    result.length === 0 ? 'No results' : (dateVal ? fmtDate(dateVal)+' rides' : 'All requests');

  renderCards(result);
  if (currentView==='map') renderMap(result);
}

function updateResultCount() {
  document.getElementById('s-total').textContent   = allData.length;
  document.getElementById('s-today').textContent   = allData.filter(function(r){ return r.date===todayStr(); }).length;
  document.getElementById('s-pending').textContent = allData.filter(function(r){ return (r.status||'pending')==='pending'; }).length;
  document.getElementById('s-matched').textContent = allData.filter(function(r){ return r.status==='matched'; }).length;
}

// ══════════════════════════════════════════════
// RENDER STATS
// ══════════════════════════════════════════════
function renderStats(data) {
  document.getElementById('s-total').textContent   = data.length;
  document.getElementById('s-today').textContent   = data.filter(function(r){ return r.date===todayStr(); }).length;
  document.getElementById('s-pending').textContent = data.filter(function(r){ return (r.status||'pending')==='pending'; }).length;
  document.getElementById('s-matched').textContent = data.filter(function(r){ return r.status==='matched'; }).length;
}

// ══════════════════════════════════════════════
// RENDER CARDS
// ══════════════════════════════════════════════
function renderCards(data) {
  var list = document.getElementById('card-list');
  if (!data.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">🗺️</div><div class="empty-title">No rides found</div><div class="empty-sub">Try expanding the radius or adjusting filters.</div></div>';
    return;
  }
  list.innerHTML = data.map(function(r,i) {
    var av       = avColor(i);
    var sta      = (r.status||'pending').toLowerCase();
    var exp      = expandedId === r.id;
    var waNum    = String(r.passenger_wa_id||'').replace(/\D/g,'');
    var tgUsr    = r.telegram_chat_id||'';
    var rTime    = fmtTime(r.time);
    var rDate    = fmtDate(r.date);
    var hasMap   = r.pickup_lat && r.dropoff_lat;
    return [
      '<div class="ride-card'+(exp?' expanded':'')+'" data-id="'+r.id+'" onclick="toggleExpand('+JSON.stringify(r.id)+',event)">',
        '<div class="card-top">',
          '<div class="card-row1">',
            '<div class="pax-info">',
              '<div class="av" style="background:'+av.bg+';color:'+av.color+'">'+initials(r.passenger_name)+'</div>',
              '<div>',
                '<div class="pax-name">'+(r.passenger_name||'Unknown')+'</div>',
                '<div class="time-ago">'+timeAgo(r.created_at)+'</div>',
              '</div>',
            '</div>',
            '<div class="badges">',
              (r.ride_frequency?'<span class="badge b-recurring">'+r.ride_frequency+'</span>':''),
              '<span class="badge '+(sta==='matched'?'b-matched':'b-pending')+'">'+(sta==='matched'?'Matched':'Pending')+'</span>',
            '</div>',
          '</div>',
          '<div class="route-strip">',
            '<div class="route-nodes"><div class="nd nd-o"></div><div class="nd-line"></div><div class="nd nd-d"></div></div>',
            '<div class="route-labels">',
              '<div><div class="route-place">'+(r.pickup_label||'—')+'</div><div class="route-sub">Pickup</div></div>',
              '<div><div class="route-place">'+(r.dropoff_label||'—')+'</div><div class="route-sub">Dropoff</div></div>',
            '</div>',
            '<div class="route-meta">',
              '<div class="ride-time">'+rTime+'</div>',
              '<div class="ride-date">'+rDate+'</div>',
            '</div>',
          '</div>',
        '</div>',
        '<div class="card-footer">',
          '<div class="footer-info">',
            '<div class="f-chip"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'+rDate+'</div>',
            '<div class="f-chip"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'+rTime+'</div>',
            (r.group_name?'<div class="f-chip" style="font-size:10px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+r.group_name+'</div>':''),
          '</div>',
          '<div class="contact-btns">',
            (waNum
              ?'<button class="c-btn" onclick="openWA(\''+waNum+'\',event)"><svg viewBox="0 0 24 24" fill="none" stroke="#25D366" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></button>'
              :'<button class="c-btn" style="opacity:.25"><svg viewBox="0 0 24 24" fill="none" stroke="#25D366" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></button>'),
            (tgUsr
              ?'<button class="c-btn" onclick="openTG(\''+tgUsr+'\',event)"><svg viewBox="0 0 24 24" fill="none" stroke="#2AABEE" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>'
              :'<button class="c-btn" style="opacity:.25"><svg viewBox="0 0 24 24" fill="none" stroke="#2AABEE" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>'),
          '</div>',
        '</div>',
        '<div class="card-detail'+(exp?' open':'')+'">',
          '<div class="detail-grid">',
            '<div><div class="di-label">Date</div><div class="di-val">'+rDate+'</div></div>',
            '<div><div class="di-label">Time</div><div class="di-val">'+rTime+'</div></div>',
            '<div><div class="di-label">Group</div><div class="di-val">'+(r.group_name||'—')+'</div></div>',
            '<div><div class="di-label">Status</div><div class="di-val">'+(r.status||'pending')+'</div></div>',
          '</div>',
          (r.additional_conditions?'<div class="detail-note"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>'+r.additional_conditions+'</span></div>':''),
          (hasMap?'<button class="map-link-btn" onclick="pinOnMap('+JSON.stringify(r.id)+',event)"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>View on map</button>':''),
        '</div>',
      '</div>'
    ].join('');
  }).join('');
}

function toggleExpand(id, e) {
  if (e.target.closest('.c-btn')||e.target.closest('.map-link-btn')) return;
  expandedId = (expandedId===id) ? null : id;
  renderCards(filtered.length ? filtered : allData);
}
function openWA(num,e){ e.stopPropagation(); window.open('https://wa.me/'+num,'_blank'); }
function openTG(u,e)  { e.stopPropagation(); window.open('https://t.me/'+u,'_blank'); }

// ══════════════════════════════════════════════
// FILTER CHIP
// ══════════════════════════════════════════════
function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(function(c){ c.classList.toggle('active', c.dataset.f===f); });
  runSearch();
}

function toggleTW() {
  twOn = !twOn;
  document.getElementById('tw-btn').classList.toggle('active', twOn);
  document.getElementById('tw-label').textContent = twOn ? '± 2 hr' : 'Any time';
  runSearch();
}

// ══════════════════════════════════════════════
// SAVED SEARCHES
// ══════════════════════════════════════════════
function saveSearch(q) {
  if (!q||savedSearches.includes(q)) return;
  savedSearches.unshift(q);
  if (savedSearches.length>6) savedSearches=savedSearches.slice(0,6);
  try{localStorage.setItem('pf_s',JSON.stringify(savedSearches));}catch(e){}
  renderSaved();
}
function removeSaved(q) {
  savedSearches=savedSearches.filter(function(s){return s!==q;});
  try{localStorage.setItem('pf_s',JSON.stringify(savedSearches));}catch(e){}
  renderSaved();
}
function renderSaved() {
  var wrap=document.getElementById('saved-wrap'), pills=document.getElementById('saved-pills');
  if (!savedSearches.length){wrap.classList.remove('show');return;}
  wrap.classList.add('show');
  pills.innerHTML=savedSearches.map(function(s){
    return '<div class="saved-pill" onclick="applySaved(\''+s.replace(/'/g,"\\'")+'\')">'+
      '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>'+
      s+
      '<svg class="pill-x" onclick="event.stopPropagation();removeSaved(\''+s.replace(/'/g,"\\'")+'\');" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'+
    '</div>';
  }).join('');
}
function applySaved(q) {
  var parts=q.split(' → ');
  if(parts[0]) document.getElementById('f-from').value=parts[0];
  if(parts[1]) document.getElementById('f-to').value=parts[1];
  if(parts[2]) document.getElementById('f-date').value=parts[2];
  runSearch();
}

// ══════════════════════════════════════════════
// VIEW SWITCHER
// ══════════════════════════════════════════════
function switchView(v) {
  currentView=v;
  document.getElementById('list-view').style.display = v==='list' ? '' : 'none';
  document.getElementById('map-view').classList.toggle('active', v==='map');
  document.getElementById('btn-list').classList.toggle('active', v==='list');
  document.getElementById('btn-map').classList.toggle('active', v==='map');
  if (v==='map') renderMap(filtered.length?filtered:allData);
}

// ══════════════════════════════════════════════
// MAP
// ══════════════════════════════════════════════
function pinOnMap(id,e) {
  if(e) e.stopPropagation();
  switchView('map');
  var r=allData.find(function(x){return String(x.id)===String(id);});
  if(r&&leafletMap) setTimeout(function(){leafletMap.setView([r.pickup_lat,r.pickup_lng],14);},150);
}
function renderMap(data) {
  if (!leafletMap) {
    leafletMap=L.map('leaflet-map',{zoomControl:true,attributionControl:false}).setView([43.52,-79.75],10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(leafletMap);
  }
  mapLayers.forEach(function(l){l.remove();}); mapLayers=[];
  var tray=document.getElementById('map-tray');
  tray.innerHTML=''; tray.classList.remove('open');
  var rides=data.filter(function(r){return r.pickup_lat&&r.dropoff_lat;});
  if (!rides.length) {
    tray.innerHTML='<div style="padding:12px 16px;font-size:13px;color:var(--text-muted)">No geo-located rides in results</div>';
    tray.classList.add('open'); return;
  }
  var bounds=[];
  var puIcon=L.divIcon({className:'',html:'<div style="width:10px;height:10px;border-radius:50%;border:2.5px solid #8a95a8;background:#1e2535;"></div>',iconSize:[10,10],iconAnchor:[5,5]});
  var doIcon=L.divIcon({className:'',html:'<div style="width:11px;height:11px;border-radius:50%;background:#4f8ef7;border:2px solid #0e1117;box-shadow:0 1px 4px rgba(0,0,0,.5);"></div>',iconSize:[11,11],iconAnchor:[5.5,5.5]});
  rides.forEach(function(r) {
    var puM=L.marker([r.pickup_lat,r.pickup_lng],{icon:puIcon}).addTo(leafletMap)
      .bindPopup('<div class="pop-name">'+(r.passenger_name||'Passenger')+'</div><div class="pop-route">📍 '+(r.pickup_label||'')+'</div><div class="pop-time">'+fmtTime(r.time)+' · '+fmtDate(r.date)+'</div>');
    var doM=L.marker([r.dropoff_lat,r.dropoff_lng],{icon:doIcon}).addTo(leafletMap)
      .bindPopup('<div class="pop-name">'+(r.passenger_name||'Passenger')+'</div><div class="pop-route">🏁 '+(r.dropoff_label||'')+'</div>');
    var line=L.polyline([[r.pickup_lat,r.pickup_lng],[r.dropoff_lat,r.dropoff_lng]],{color:'#4f8ef7',weight:2,opacity:.55,dashArray:'5,6'}).addTo(leafletMap);
    mapLayers.push(puM,doM,line);
    bounds.push([r.pickup_lat,r.pickup_lng],[r.dropoff_lat,r.dropoff_lng]);
    var item=document.createElement('div'); item.className='tray-item';
    item.innerHTML='<div class="tray-name">'+(r.passenger_name||'Unknown')+' · '+fmtTime(r.time)+'</div><div class="tray-route">'+(r.pickup_label||'—')+' → '+(r.dropoff_label||'—')+'</div>';
    item.onclick=function(){leafletMap.setView([r.pickup_lat,r.pickup_lng],14);puM.openPopup();};
    tray.appendChild(item);
  });
  tray.classList.add('open');
  if(bounds.length) leafletMap.fitBounds(bounds,{padding:[24,24]});
  setTimeout(function(){if(leafletMap)leafletMap.invalidateSize();},100);
}

// ══════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════
renderSaved();
loadData();
</script>
